# Gitleaks configuration
# https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

# Allowlist known false positives from old wiki documentation (removed in 2026-02)
# These are example curl commands and rendered HTML, not real secrets
[allowlist]
  paths = [
    '''apps/wiki/''',
    # SOPS-encrypted secret stores: the values are age ciphertext, not plaintext
    # secrets. SOPS rotates the data key on every edit, so the whole file changes
    # each commit -> scanning these high-entropy blobs is slow and only yields
    # false positives. Real plaintext leaks are caught by the toolkit + the
    # detect-private-key hook before they ever reach SOPS.
    '''infra/config/secrets/.*\.enc\.yaml$''',
    '''infra/config/secrets/.*\.pem(\.enc)?$''',
  ]
