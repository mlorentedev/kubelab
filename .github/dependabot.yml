---
# Dependabot governance for the KubeLab monorepo.
#
# Policy (see docs/runbooks/dependency-updates.md):
#   - Security updates flow for EVERY ecosystem automatically, regardless of this file.
#   - Scheduled VERSION updates are enabled only for code that stays in L0.
#   - Apps departing to their own repos (web, api) are security-only here:
#     open-pull-requests-limit: 0 disables version PRs while keeping security
#     updates and ignore rules active. Their new repos carry their own config.
#
# Conventions for the version-update ecosystems:
#   - Weekly (Monday) to batch review and limit churn on the single self-hosted runner.
#   - commit prefix "fix" for runtime deps (release-please rebuilds the image),
#     "chore" for dev deps, "ci" for actions.
#   - minor+patch grouped; majors stay individual for explicit review.
version: 2

updates:
  # ============================================================
  # Version updates ON -- durable L0 (stays in this repo)
  # ============================================================

  # ---- Python toolkit (Poetry) ----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "toolkit"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    groups:
      toolkit-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ---- Container image: edge/errors (edge service, not an app) ----
  - package-ecosystem: "docker"
    directory: "/edge/errors"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "fix"
      include: "scope"
    groups:
      edge-docker-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ---- GitHub Actions ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-all:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
          - "major"

  # ---- Container image: apps/api (in this repo) ----
  # Base images reach EOL and must be tracked regardless of where the code
  # eventually lives — a missed version bump is exactly how alpine:3.18 rotted
  # into a Trivy HIGH/CRITICAL failure. version-updates ON while api is in
  # kubelab. (Go module bumps are churnier and security updates suffice, so the
  # gomod entry below stays security-only.)
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "fix"
      include: "scope"
    groups:
      api-docker-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ============================================================
  # Security-only -- Go module deps (security suffices; avoid churn)
  # (open-pull-requests-limit: 0 -> no version PRs; security still flows)
  # ============================================================

  # ---- Go API modules ----
  - package-ecosystem: "gomod"
    directory: "/apps/api/src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "api"
