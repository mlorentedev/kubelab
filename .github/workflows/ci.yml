---
name: CI

on:
  push:
    branches: [master, 'feature/**', 'fix/**', 'hotfix/**', 'chore/**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate branch name
        if: github.event_name == 'push' && github.ref_name != 'master'
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^(feature|fix|hotfix|chore)/.+ ]]; then
            echo "::error::Branch name must match feature/*, fix/*, hotfix/*, or chore/*"
            exit 1
          fi

      - name: Validate YAML syntax
        run: |
          pip install --quiet yamllint
          yamllint -d '{extends: default,
            rules: {
              line-length: {max: 120},
              document-start: disable,
              truthy: {check-keys: false},
              comments-indentation: disable
            }}' .github/workflows/

      - name: Validate Makefile
        run: make -n help >/dev/null

  detect-changes:
    name: Detect Changes
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      errors: ${{ steps.filter.outputs.errors }}
      any_changed: ${{ steps.check.outputs.any_changed }}
      changed_apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: >-
            ${{ github.event.before != '0000000000000000000000000000000000000000'
            && github.event.before || github.sha }}
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            errors:
              - 'edge/errors/**'

      - name: Check if any app changed
        id: check
        env:
          API: ${{ steps.filter.outputs.api }}
          WEB: ${{ steps.filter.outputs.web }}
          ERRORS: ${{ steps.filter.outputs.errors }}
        run: |
          if [[ "$API" == "true" || "$WEB" == "true" || "$ERRORS" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List changed apps
        id: list
        env:
          API: ${{ steps.filter.outputs.api }}
          WEB: ${{ steps.filter.outputs.web }}
          ERRORS: ${{ steps.filter.outputs.errors }}
        run: |
          apps=()
          [[ "$API" == "true" ]] && apps+=("api")
          [[ "$WEB" == "true" ]] && apps+=("web")
          [[ "$ERRORS" == "true" ]] && apps+=("errors")
          apps_json=$(printf '%s\n' "${apps[@]}" | jq -R . | jq -c -s .)
          echo "apps=${apps_json}" >> "$GITHUB_OUTPUT"

  api-pipeline:
    name: API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: api
    secrets: inherit

  web-pipeline:
    name: Web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: web
    secrets: inherit

  errors-pipeline:
    name: Errors
    needs: detect-changes
    if: needs.detect-changes.outputs.errors == 'true'
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: errors
    secrets: inherit
