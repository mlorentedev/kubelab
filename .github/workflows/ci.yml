---
name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:

  validate:
    name: Validate
    # Fork PRs run on GitHub-hosted (self-hosted has Docker socket access)
    runs-on: >-
      ${{ github.event.pull_request.head.repo.fork
          && 'ubuntu-latest'
          || fromJSON(vars.RUNNER_DOCKER || '"ubuntu-latest"') }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate branch name
        if: github.event_name == 'push' && github.ref_name != 'master'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|hotfix|chore)/.+ ]]; then
            echo "::error::Branch name must match feature/*, fix/*, hotfix/*, or chore/*"
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate YAML syntax
        run: |
          pip install --quiet yamllint
          yamllint -d '{extends: default,
            rules: {
              line-length: {max: 120},
              document-start: disable,
              truthy: {check-keys: false},
              comments-indentation: disable
            }}' .github/workflows/

      - name: Validate Makefile
        run: make -n help >/dev/null

  detect-changes:
    name: Detect Changes
    needs: validate
    runs-on: >-
      ${{ github.event.pull_request.head.repo.fork
          && 'ubuntu-latest'
          || fromJSON(vars.RUNNER_DOCKER || '"ubuntu-latest"') }}
    outputs:
      api: ${{ steps.filter.outputs.api }}
      errors: ${{ steps.filter.outputs.errors }}
      any_changed: ${{ steps.check.outputs.any_changed }}
      changed_apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          base: >-
            ${{ github.event.before != '0000000000000000000000000000000000000000'
            && github.event.before || github.sha }}
          filters: |
            api:
              - 'apps/api/**'
            errors:
              - 'edge/errors/**'

      - name: Check if any app changed
        id: check
        env:
          API: ${{ steps.filter.outputs.api }}
          ERRORS: ${{ steps.filter.outputs.errors }}
        run: |
          if [[ "$API" == "true" || "$ERRORS" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List changed apps
        id: list
        env:
          API: ${{ steps.filter.outputs.api }}
          ERRORS: ${{ steps.filter.outputs.errors }}
        run: |
          apps=()
          [[ "$API" == "true" ]] && apps+=("api")
          [[ "$ERRORS" == "true" ]] && apps+=("errors")
          apps_json=$(printf '%s\n' "${apps[@]}" | jq -R . | jq -c -s .)
          echo "apps=${apps_json}" >> "$GITHUB_OUTPUT"

  api-pipeline:
    name: API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: api
      runner: >-
        ${{ github.event.pull_request.head.repo.fork
            && '"ubuntu-latest"'
            || vars.RUNNER_DOCKER || '"ubuntu-latest"' }}
    secrets: inherit

  errors-pipeline:
    name: Errors
    needs: detect-changes
    if: needs.detect-changes.outputs.errors == 'true'
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: errors
      runner: >-
        ${{ github.event.pull_request.head.repo.fork
            && '"ubuntu-latest"'
            || vars.RUNNER_DOCKER || '"ubuntu-latest"' }}
    secrets: inherit
