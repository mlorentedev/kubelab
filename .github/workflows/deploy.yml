name: Deploy to VPS

on:
  workflow_call:
    inputs:
      environment: { type: string, required: true }
      tag:         { type: string, required: true }
    secrets:
      ANSIBLE_VAULT_PASS: { required: true }
      SLACK_WEBHOOK:      { required: true }

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible/deploy.yml
          directory: ./ansible
          inventory: ansible/inventory
          vault_password: ${{ secrets.ANSIBLE_VAULT_PASS }}
          options: >
            --extra-vars "env=${{ inputs.environment }} tag=${{ inputs.tag }}"

      - name: Smoke test
        run: curl -fsSL https://mlorente.dev/health || exit 1

      # 🔔 Slack post-deploy
      - name: Notify Slack
        if: always()
        uses: rtCamp/action-slack-notify@v2   # :contentReference[oaicite:1]{index=1}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE:  "Deploy (${{ inputs.environment }})"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status }}
            *Tag:* `${{ inputs.tag }}` → `${{ inputs.environment }}`
