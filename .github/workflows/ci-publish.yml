name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string   
      context:
        required: true
        type: string     

jobs:
  docker-image-publish:
    name: Publish Docker Image for ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag exists and delete it
        run: |
          TAG_NAME=${{ steps.tag_version.outputs.new_version }}
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Deleting..."
            git tag -d "$TAG_NAME"
            git push origin --delete "$TAG_NAME"
          fi  

      - name: Build and Push Image for ${{ inputs.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true          
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${{ inputs.tag}}-${{ inputs.sha }}     
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:latest

      - name: Create deployment bundle
        run: |
          mkdir -p deployment
          cp -r scripts infra deployment/

          for app in apps/*; do
            name=$(basename "$app")
            mkdir -p deployment/$name
            cp -r "$app"/docker-compose.*.yml "$app"/.env.example deployment/$name/ 2>/dev/null || true
          done

          cd deployment
          zip -r ../release-${{ inputs.tag }}.zip .

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: release-${{ inputs.tag }}.zip

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          artifacts: release-${{ inputs.tag }}.zip
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Notify via Webhook (optional)
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -d "app=${{ inputs.app }}&version=${{ inputs.tag }}&sha_short=${{ inputs.sha }}"
