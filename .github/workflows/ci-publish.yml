---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
      context:
        required: true
        type: string

jobs:
  docker-image-publish:
    name: Publish Docker Image for ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Complete Docker debug
        run: |
          echo "=== DOCKER DEBUG ==="
          echo "Docker version: $(docker --version)"
          echo "Raw username: '$DOCKERHUB_USERNAME'"
          echo "Username length: ${#DOCKERHUB_USERNAME}"
          echo "Username hex dump:"
          echo -n "$DOCKERHUB_USERNAME" | hexdump -C       
          echo "Token length: ${#DOCKERHUB_TOKEN}"
          echo "Token prefix: ${DOCKERHUB_TOKEN:0:12}..."

          echo "=== CONNECTIVITY TEST ==="
          curl -v https://index.docker.io/v1/search?q=hello-world 2>&1 | head -10

          # Test manual más verboso
          echo "=== VERBOSE LOGIN TEST ==="
          echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin -v 2>&1 || true
          
          # Test con diferentes registries
          echo "=== TEST WITH EXPLICIT REGISTRY ==="
          echo "$DOCKERHUB_TOKEN" | docker login index.docker.io --username "$DOCKERHUB_USERNAME" --password-stdin || true

        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}  

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image for ${{ inputs.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${{ inputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${{ inputs.tag}}-${{ inputs.sha }}     
            ${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:latest

      - name: Create deployment bundle
        run: |
          mkdir -p deployment
          cp -r scripts infra deployment/

          for app in apps/*; do
            name=$(basename "$app")
            mkdir -p deployment/$name
            cp -r "$app"/docker-compose.*.yml "$app"/.env.example deployment/$name/ 2>/dev/null || true
          done

          cd deployment
          zip -r ../release-${{ inputs.tag }}.zip .

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: release-${{ inputs.tag }}.zip

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          artifacts: release-${{ inputs.tag }}.zip
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          allowUpdates: true
          prerelease: ${{ contains(github.ref, 'feature/') || contains(github.ref, 'hotfix/') }}

      - name: Notify via Webhook (optional)
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -d "app=${{ inputs.app }}&version=${{ inputs.tag }}&sha_short=${{ inputs.sha }}"
