---
name: Manual Test

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to test?'
        required: true
        type: choice
        options:
          - blog
          - api
          - web
        default: 'blog'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-app:
    name: Test ${{ github.event.inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.tag_version.outputs.new_version }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fail if app is unsupported
        if: github.event.inputs.app != 'blog' && github.event.inputs.app != 'api' && github.event.inputs.app != 'web'
        run: |
          echo "Unsupported app: ${{ github.event.inputs.app }}"
          exit 1

      # Blog Jekyll site validation
      - name: Set up Ruby
        if: ${{ github.event.inputs.app == 'blog' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: './apps/blog/jekyll-site'

      - name: Install dependencies (blog)
        if: ${{ github.event.inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        run: bundle install

      - name: Build Jekyll site
        if: ${{ github.event.inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # API Go validation
      - name: Set up Go (for api)
        if: ${{ github.event.inputs.app == 'api' }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Run tests (api)
        if: ${{ github.event.inputs.app == 'api' }}
        working-directory: ./apps/api
        run: go test ./...

      - name: Build Go binary (api)
        if: ${{ github.event.inputs.app == 'api' }}
        working-directory: ./apps/api/src
        run: go build -o ../bin/api .

      # Web Astro validation
      - name: Set up Node.js (for web)
        if: ${{ github.event.inputs.app == 'web' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/astro-site/package-lock.json'

      - name: Install dependencies (web)
        if: ${{ github.event.inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm ci

      - name: Build Astro site
        if: ${{ github.event.inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm run build

      # Common steps for all apps
      - name: Determine Docker context
        id: context
        run: |
          case "${{ github.event.inputs.app }}" in
            blog)
              echo "context=./apps/blog/jekyll-site" >> $GITHUB_OUTPUT
              ;;
            api)
              echo "context=./apps/api/src" >> $GITHUB_OUTPUT
              ;;
            web)
              echo "context=./apps/web/astro-site" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported app context"
              exit 1
              ;;
          esac

      - name: Tag version (mock for testing)
        id: tag_version
        run: |
          # Mock version for testing - don't create real tags
          echo "new_version=test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "✅ Mock version created: test-$(date +%Y%m%d-%H%M%S)"

      - name: Extract short SHA
        id: short_sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Docker build test
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry (with mock credentials for testing)
        run: |
          echo "🔐 Login step (skipped in test mode)"
          echo "In real pipeline, this would login to Docker Hub"

      - name: Build Docker Image for ${{ github.event.inputs.app }} (test mode)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.context.outputs.context }}
          file: ./apps/${{ github.event.inputs.app }}/Dockerfile
          platforms: linux/amd64
          push: false  # Don't push in test mode
          tags: |
            mlorente-${{ github.event.inputs.app }}:${{ steps.tag_version.outputs.new_version }}
            mlorente-${{ github.event.inputs.app }}:latest

      - name: Create deployment bundle (test)
        run: |
          echo "📦 Creating deployment bundle..."
          mkdir -p deployment-test
          # Copy relevant files (mock)
          echo "app: ${{ github.event.inputs.app }}" > deployment-test/app-info.txt
          echo "version: ${{ steps.tag_version.outputs.new_version }}" >> deployment-test/app-info.txt
          echo "sha: ${{ steps.short_sha.outputs.sha }}" >> deployment-test/app-info.txt
          echo "✅ Deployment bundle created (test mode)"

      - name: Test Summary
        run: |
          echo "🎉 TEST COMPLETED SUCCESSFULLY!"
          echo "================================="
          echo "App: ${{ github.event.inputs.app }}"
          echo "Version: ${{ steps.tag_version.outputs.new_version }}"
          echo "SHA: ${{ steps.short_sha.outputs.sha }}"
          echo "Context: ${{ steps.context.outputs.context }}"
          echo "================================="
          echo ""
          echo "✅ Build completed"
          echo "✅ Tests passed"
          echo "✅ Docker image built"
          echo "✅ Deployment bundle ready"
          echo ""
          echo "🚀 This app is ready for deployment!"

      - name: Notify (test mode)
        run: |
          echo "📡 Webhook notification (test mode)"
          echo "In real pipeline, this would notify deployment systems"
          echo "App: ${{ github.event.inputs.app }} is ready!"
