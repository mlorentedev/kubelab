---
name: Validation

on:
  push:
    branches: [feature/, hotfix/]

jobs:
  validate-yaml:
    name: Validate YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: find .github/workflows -name "*.yml" -exec yamllint {} \;

  validate-makefiles:
    name: Validate Makefiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check Makefile syntax
        run: make -n help >/dev/null

  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify required files exist
        run: |
          # Define app lists as bash arrays
          APPS_WITH_DOCKERFILES=(api blog web wiki workers)
          APPS_WITH_COMPOSE=(api blog web wiki workers)
          ENVIRONMENTS=(dev staging prod)

          # Check if required Dockerfiles exist
          echo "Validating Dockerfiles..."
          for app in "${APPS_WITH_DOCKERFILES[@]}"; do
            if [ ! -f "apps/$app/Dockerfile" ]; then
              echo "❌ Missing Dockerfile for $app"
              exit 1
            fi
            echo "✅ apps/$app/Dockerfile"
          done

          # Check if .env.example files exist for all environments
          echo ""
          echo "Validating deployment configs..."
          for app in "${APPS_WITH_COMPOSE[@]}"; do
            for env in "${ENVIRONMENTS[@]}"; do
              env_file="infra/stacks/apps/$app/.env.$env.example"
              if [ ! -f "$env_file" ]; then
                echo "❌ Missing $env_file"
                exit 1
              fi
              echo "✅ $env_file"
            done
          done

          echo ""
          echo "✅ All prerequisite files validated successfully!"
