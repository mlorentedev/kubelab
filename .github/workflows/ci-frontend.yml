name: Frontend CI

on:
  push:
    branches: [master, develop, 'feature/*', 'hotfix/*']
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'services/frontend/**'

jobs:
  set-vars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      skip:    ${{ steps.skip.outputs.skip }}
    steps:
      - id: skip
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "skip=true"  >>"$GITHUB_OUTPUT"
          else
            echo "skip=false" >>"$GITHUB_OUTPUT"
          fi
      - id: calc
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          case "$REF" in
            master)   echo "version=latest"   >>"$GITHUB_OUTPUT" ;;
            develop)  echo "version=develop"  >>"$GITHUB_OUTPUT" ;;
            feature/*|hotfix/*)
                      echo "version=${REF//\//-}" >>"$GITHUB_OUTPUT" ;;
            *)        echo "version=${GITHUB_SHA::8}" >>"$GITHUB_OUTPUT" ;;
          esac

  build:
    if: needs.set-vars.outputs.skip != 'true'
    needs: set-vars
    uses: ./.github/workflows/test-build-push.yml
    with:
      service: frontend
      version: ${{ needs.set-vars.outputs.version }}
    secrets: inherit
