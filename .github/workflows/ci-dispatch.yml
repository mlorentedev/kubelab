---
name: CI Dispatcher per App

on:
  push:
    branches: [develop, feature/*, hotfix/*]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  test-secrets:
    name: Test Docker Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Debug Docker secrets only
        run: |
          echo "=== SIMPLE SECRET TEST ==="
          echo "Username: '${{ secrets.DOCKERHUB_USERNAME }}'"
          echo "Username length: $( [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && echo "${#{{ secrets.DOCKERHUB_USERNAME }}}" || echo 0 )"
          echo "Token: '${{ secrets.DOCKERHUB_TOKEN }}'"
          echo "Token length: $( [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && echo "${#{{ secrets.DOCKERHUB_TOKEN }}}" || echo 0 )"
          
      - name: Test with environment variables
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "=== ENV VAR TEST ==="
          echo "Username: '$DOCKERHUB_USERNAME'"
          echo "Username length: ${#DOCKERHUB_USERNAME}"
          echo "Username hex:"
          echo -n "$DOCKERHUB_USERNAME" | hexdump -C
          echo "Token: '$DOCKERHUB_TOKEN'"
          echo "Token length: ${#DOCKERHUB_TOKEN}"
          echo "Token hex:"
          echo -n "$DOCKERHUB_TOKEN" | hexdump -C
          
      - name: Simple Docker login test
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "=== SIMPLE LOGIN TEST ==="
          if [ ${#DOCKERHUB_USERNAME} -eq 1 ] && [ ${#DOCKERHUB_TOKEN} -eq 1 ]; then
            echo "❌ Both secrets are 1 char - problem confirmed"
            exit 1
          fi
          
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  detect-changed-apps:
    name: Detect Changed Applications
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }} 
          filters: |
            blog:
              - 'apps/blog/jekyll-site/**'
              - 'apps/blog/Dockerfile'
              - 'apps/blog/docker-compose*.yml'
            api:
              - 'apps/api/src/**'
              - 'apps/api/go.mod'
              - 'apps/api/go.sum'
              - 'apps/api/Dockerfile'
              - 'apps/api/docker-compose*.yml'
            web:
              - 'apps/web/astro-site/**'
              - 'apps/web/Dockerfile'
              - 'apps/web/docker-compose*.yml'

  run-blog-pipeline:
    name: Run Full Pipeline for Blog
    needs: detect-changed-apps
    if: ${{ needs.detect-changed-apps.outputs.blog == 'true' }}
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: blog
    secrets: inherit

  run-api-pipeline:
    name: Run Full Pipeline for API
    needs: detect-changed-apps
    if: ${{ needs.detect-changed-apps.outputs.api == 'true' }}
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: api
    secrets: inherit

  run-web-pipeline:
    name: Run Full Pipeline for Web
    needs: detect-changed-apps
    if: ${{ needs.detect-changed-apps.outputs.web == 'true' }}
    uses: ./.github/workflows/ci-pipeline.yml
    with:
      app: web
    secrets: inherit
