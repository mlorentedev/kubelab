name: Test → Build → Push

on:
  workflow_call:
    inputs:
      service: { type: string, required: true }
      version: { type: string, required: true }
    secrets:
      DOCKERHUB_USERNAME: { required: true }
      DOCKERHUB_TOKEN:    { required: true }
      SLACK_WEBHOOK:      { required: true }

env:
  DOCKER_REG: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Quality gates idénticos a los originales
      - name: Run quality checks
        run: |
          case "${{ inputs.service }}" in
            static)
              gem install bundler-audit
              cd services/static
              bundle install --jobs 4
              bundle exec jekyll build --drafts
              bundle-audit check --update
            ;;
            frontend)
              cd services/frontend
              npm ci
              npm run lint
              npm run astro check
              npm test --if-present
            ;;
            backend)
              cd services/backend
              go vet ./...
              go test ./...
              staticcheck ./...
            ;;
          esac

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REG }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ inputs.service }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_REG }}/mlorente-${{ inputs.service }}:${{ inputs.version }}
            ${{ env.DOCKER_REG }}/mlorente-${{ inputs.service }}:${{ github.sha }}
            ${{ env.DOCKER_REG }}/mlorente-${{ inputs.service }}:${{ github.ref_name }}

      - name: Notify Slack
        if: always()
        uses: rtCamp/action-slack-notify@v2   # :contentReference[oaicite:0]{index=0}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE:  "${{ inputs.service }} — Build ${{ inputs.version }}"
          SLACK_MESSAGE: |
            *Status:* ${{ job.status }}
            *Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>
