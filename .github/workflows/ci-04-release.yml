---
name: Create Global Release

on:
  workflow_call:
    inputs:
      changed_apps:
        required: true
        type: string
        description: "JSON array of changed apps"
      blog_docker_version:
        required: false
        type: string
        default: ""
      api_docker_version:
        required: false
        type: string
        default: ""
      web_docker_version:
        required: false
        type: string
        default: ""
      blog_sha:
        required: false
        type: string
        default: ""
      api_sha:
        required: false
        type: string
        default: ""
      web_sha:
        required: false
        type: string
        default: ""

jobs:
  create-global-release:
    name: Create Global Release
    runs-on: ubuntu-latest
    outputs:
      global_version: ${{ steps.create_global_tag.outputs.new_version }}
      release_created: ${{ steps.create_global_tag.outputs.tag_created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect global release strategy
        id: release_strategy
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Current branch: $BRANCH_NAME"
          
          case "$BRANCH_NAME" in
            feature/*|hotfix/*)
              echo "::notice::Feature/Hotfix branch - No global release will be created"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "::notice::Develop branch - Will create prerelease"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=prerelease" >> "$GITHUB_OUTPUT"
              ;;
            master|main)
              echo "::notice::Main branch - Will create stable release"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=stable" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::warning::Unknown branch - No release will be created"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create global version tag
        id: create_global_tag
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          STRATEGY="${{ steps.release_strategy.outputs.strategy }}"
          
          case "$STRATEGY" in
            "prerelease")
              # Develop branch: Calculate SEMVER and create RC
              LAST_STABLE=$(git tag -l "v*" --sort=-version:refname | grep -v "rc\|alpha\|beta" | head -n1 || echo "v0.0.0")
              echo "Last stable global version: $LAST_STABLE"
              
              # Analyze commits since last stable across entire monorepo
              if [ "$LAST_STABLE" != "v0.0.0" ]; then
                COMMITS=$(git log ${LAST_STABLE}..HEAD --oneline)
              else
                COMMITS=$(git log --oneline)
              fi
              
              echo "Analyzing global commits since $LAST_STABLE:"
              echo "$COMMITS"
              
              # Determine SEMVER bump for entire project
              if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                BUMP_TYPE="major"
                echo "::notice::Global SEMVER: Breaking change detected - MAJOR bump"
              elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                BUMP_TYPE="minor"
                echo "::notice::Global SEMVER: Feature detected - MINOR bump"
              else
                BUMP_TYPE="patch"
                echo "::notice::Global SEMVER: Patch/fix detected - PATCH bump"
              fi
              
              # Calculate new base version for project
              CURRENT_VERSION=$(echo "$LAST_STABLE" | sed "s/v//")
              if [ "$CURRENT_VERSION" = "0.0.0" ]; then
                case "$BUMP_TYPE" in
                  major) BASE_VERSION="1.0.0" ;;
                  minor) BASE_VERSION="0.1.0" ;;
                  *) BASE_VERSION="0.0.1" ;;
                esac
              else
                IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
                MAJOR=${VERSION_PARTS[0]:-0}
                MINOR=${VERSION_PARTS[1]:-0}
                PATCH=${VERSION_PARTS[2]:-0}
                
                case "$BUMP_TYPE" in
                  major)
                    MAJOR=$((MAJOR + 1))
                    MINOR=0
                    PATCH=0
                    ;;
                  minor)
                    MINOR=$((MINOR + 1))
                    PATCH=0
                    ;;
                  *)
                    PATCH=$((PATCH + 1))
                    ;;
                esac
                BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
              fi
              
              # Find next RC number for global project
              LATEST_RC=$(git tag -l "v${BASE_VERSION}-rc.*" --sort=-version:refname | head -n1)
              if [ -z "$LATEST_RC" ]; then
                RC_NUMBER=1
              else
                RC_NUMBER=$(echo "$LATEST_RC" | sed "s/v${BASE_VERSION}-rc\.//")
                RC_NUMBER=$((RC_NUMBER + 1))
              fi
              
              NEW_VERSION="v${BASE_VERSION}-rc.${RC_NUMBER}"
              echo "::notice::Generated global RC version: $NEW_VERSION (base: $BASE_VERSION)"
              ;;
              
            "stable")
              # Master branch: Promote latest RC to stable (or create first stable)
              LATEST_RC=$(git tag -l "v*-rc.*" --sort=-version:refname | head -n1)
              
              if [ -z "$LATEST_RC" ]; then
                # No RC found - this might be the first release
                echo "::warning::No RC version found. Creating first stable release."

                # Analyze commits to determine first version
                COMMITS=$(git log --oneline)
                if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                  NEW_VERSION="v1.0.0"
                elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                  NEW_VERSION="v0.1.0"
                else
                  NEW_VERSION="v0.0.1"
                fi
                
                echo "::notice::Creating first stable release: $NEW_VERSION"
              else
                # Standard RC promotion
                BASE_VERSION=$(echo "$LATEST_RC" | sed "s/v//" | sed "s/-rc\..*//")
                NEW_VERSION="v${BASE_VERSION}"
                
                # Check if stable version already exists
                if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
                  echo "::error::Stable version $NEW_VERSION already exists!"
                  exit 1
                fi
                
                echo "::notice::Promoting RC to stable: $LATEST_RC → $NEW_VERSION"
              fi
              ;;
              
            *)
              echo "::error::Unknown strategy: $STRATEGY"
              exit 1
              ;;
          esac
          
          # Verify tag doesn't exist
          if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
            echo "::error::Global tag $NEW_VERSION already exists!"
            exit 1
          fi
          
          # Create and push global tag
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
          
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Successfully created and pushed global tag: $NEW_VERSION"

      - name: Create comprehensive deployment bundle
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          mkdir -p deployment
          # Copy infrastructure and scripts
          if [ -d "scripts" ]; then
            cp -r scripts deployment/
          fi
          if [ -d "infra" ]; then
            cp -r infra deployment/
          fi
          if [ -f "Makefile" ]; then
            cp Makefile deployment/
          fi
          if [ -f "README.md" ]; then
            cp README.md deployment/
          fi
          if [ -f ".env.example" ]; then
            cp .env.example deployment/
          fi
          for app in apps/*; do
            if [ -d "$app" ]; then
              name=$(basename "$app")
              mkdir -p "deployment/apps/$name"
              find "$app" -name "docker-compose*.yml" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
              find "$app" -name ".env.example" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
            fi
          done
          
          # Create version manifest with Docker versions
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo "## Changed Applications"
            echo '${{ inputs.changed_apps }}' | jq -r '.[]' | sed 's/^/- /'
            echo ""
            echo "## Docker Image Versions"
            # Add Docker versions for changed apps
            if [ -n "${{ inputs.blog_docker_version }}" ]; then
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-blog:${{ inputs.blog_docker_version }}\` (SHA: ${{ inputs.blog_sha }})"
            fi
            if [ -n "${{ inputs.api_docker_version }}" ]; then
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-api:${{ inputs.api_docker_version }}\` (SHA: ${{ inputs.api_sha }})"
            fi
            if [ -n "${{ inputs.web_docker_version }}" ]; then
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-web:${{ inputs.web_docker_version }}\` (SHA: ${{ inputs.web_sha }})"
            fi
            echo ""
            echo "## Deployment Instructions"
            echo "1. Extract this bundle to your deployment environment"
            echo "2. Review the VERSION_MANIFEST.md for changed components"
            echo "3. Update your docker-compose files with the new image tags above"
            echo "4. Run deployment scripts from the scripts/ directory"
            echo ""
            echo "## Global Project Version"
            echo "- **Project Version**: ${{ steps.create_global_tag.outputs.new_version }}"
            echo "- **Branch**: ${{ github.ref_name }}"
            echo "- **Commit**: ${{ github.sha }}"
          } > deployment/VERSION_MANIFEST.md
          
          # Create deployment bundle
          cd deployment
          zip -r ../global-release-${{ steps.create_global_tag.outputs.new_version }}.zip .
          ls -la ../global-release-${{ steps.create_global_tag.outputs.new_version }}.zip

      - name: Upload global deployment artifacts
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: global-deployment-bundle-${{ steps.create_global_tag.outputs.new_version }}
          path: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          retention-days: 90

      - name: Create comprehensive release notes
        id: release_notes
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo ""
            echo "## Changed Applications"
            echo '${{ inputs.changed_apps }}' | jq -r '.[]' | sed 's/^/- **/' | sed 's/$/**: Updated/'
            echo ""
            echo "## Docker Images Updated"
            if [ -n "${{ inputs.blog_docker_version }}" ]; then
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-blog:${{ inputs.blog_docker_version }}\`"
            fi
            if [ -n "${{ inputs.api_docker_version }}" ]; then
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-api:${{ inputs.api_docker_version }}\`"
            fi
            if [ -n "${{ inputs.web_docker_version }}" ]; then
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/mlorente-web:${{ inputs.web_docker_version }}\`"
            fi
            echo ""
            echo "## What's Included"
            echo "- Complete deployment bundle with all applications"
            echo "- Infrastructure configuration"
            echo "- Deployment scripts"
            echo "- Version manifest with detailed component information"
            echo ""
            echo "## Deployment"
            echo "Download the \`global-release-${{ steps.create_global_tag.outputs.new_version }}.zip\` asset and follow the instructions in VERSION_MANIFEST.md"
          } > release_notes.md
          
          # Set output for use in release
          {
            echo 'RELEASE_NOTES<<EOF'
            cat release_notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.create_global_tag.outputs.new_version }}
          name: "Release ${{ steps.create_global_tag.outputs.new_version }}"
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          artifacts: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ steps.release_strategy.outputs.strategy == 'prerelease' }}
          makeLatest: ${{ steps.release_strategy.outputs.strategy == 'stable' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify global deployment
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          # Create comprehensive payload
          cat <<EOF > payload.json
          {
            "type": "global_release",
            "version": "${{ steps.create_global_tag.outputs.new_version }}",
            "strategy": "${{ steps.release_strategy.outputs.strategy }}",
            "changed_apps": ${{ inputs.changed_apps }},
            "docker_versions": {
              "blog": "${{ inputs.blog_docker_version }}",
              "api": "${{ inputs.api_docker_version }}",
              "web": "${{ inputs.web_docker_version }}"
            },
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}"
          }
          EOF
          
          # Send notification with retry logic
          for i in {1..3}; do
            if curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d @payload.json \
              --max-time 30 \
              --retry 2; then
              echo "Global release notification sent successfully"
              break
            else
              echo "Notification attempt $i failed, retrying..."
              sleep 5
            fi
          done || echo "All notification attempts failed, but global release was successful"

      - name: Workflow Summary
        run: |
          echo "## Global Release Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: ${{ steps.release_strategy.outputs.strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Created**: ${{ steps.release_strategy.outputs.create_release }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.release_strategy.outputs.create_release }}" = "true" ]; then
            echo "- **Global Version**: ${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Apps & Docker Versions" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.blog_docker_version }}" ]; then
            echo "- **blog**: ${{ inputs.blog_docker_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.api_docker_version }}" ]; then
            echo "- **api**: ${{ inputs.api_docker_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.web_docker_version }}" ]; then
            echo "- **web**: ${{ inputs.web_docker_version }}" >> $GITHUB_STEP_SUMMARY
          fi