---
name: Create Global Release

on:
  workflow_call:
    inputs:
      changed_apps:
        required: true
        type: string
        description: "JSON array of changed apps"
      blog_docker_version:
        required: false
        type: string
        default: ""
      api_docker_version:
        required: false
        type: string
        default: ""
      web_docker_version:
        required: false
        type: string
        default: ""
      wiki_docker_version:
        required: false
        type: string
        default: ""
      blog_sha:
        required: false
        type: string
        default: ""
      api_sha:
        required: false
        type: string
        default: ""
      web_sha:
        required: false
        type: string
        default: ""
      wiki_sha:
        required: false
        type: string
        default: ""

jobs:
  validate-versions:
    name: Validate Version Consistency
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.validate.outputs.has_changes }}
      version_summary: ${{ steps.validate.outputs.version_summary }}
    steps:
      - name: Validate Docker versions format
        id: validate
        run: |
          # Collect non-empty and non-skip Docker versions
          versions=()
          changed_apps=()
          
          # Check each app version
          if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
            versions+=("blog:${{ inputs.blog_docker_version }}")
            changed_apps+=("blog")
          fi
          
          if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
            versions+=("api:${{ inputs.api_docker_version }}")
            changed_apps+=("api")
          fi
          
          if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
            versions+=("web:${{ inputs.web_docker_version }}")
            changed_apps+=("web")
          fi

          if [ -n "${{ inputs.wiki_docker_version }}" ] && [ "${{ inputs.wiki_docker_version }}" != "skip" ]; then
            versions+=("wiki:${{ inputs.wiki_docker_version }}")
            changed_apps+=("wiki")
          fi

          if [ ${#valid_versions[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No app changes detected - no global release needed"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Apps with version changes (${#changed_apps[@]} total):"
          for version in "${versions[@]}"; do
            echo "  - $version"
          done

          # Create version summary for outputs
          VERSION_SUMMARY=$(printf "%s," "${changed_apps[@]}")
          VERSION_SUMMARY=${VERSION_SUMMARY%,}  # Remove trailing comma
          echo "version_summary=${VERSION_SUMMARY}" >> "$GITHUB_OUTPUT"

  create-global-release:
    name: Create Global Release
    runs-on: ubuntu-latest
    needs: validate-versions
    if: needs.validate-versions.outputs.has_changes == 'true'
    outputs:
      global_version: ${{ steps.create_global_tag.outputs.new_version }}
      release_created: ${{ steps.create_global_tag.outputs.tag_created }}
      strategy: ${{ steps.release_strategy.outputs.strategy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect global release strategy
        id: release_strategy
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Current branch: $BRANCH_NAME"

          case "$BRANCH_NAME" in
            feature/*|hotfix/*)
              echo "::notice::Feature/Hotfix branch - No global release (only app-level pre-releases)"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "::notice::Develop branch - Will create global RC"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=rc" >> "$GITHUB_OUTPUT"
              ;;
            master|main)
              echo "::notice::Main branch - Will create stable global release"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=stable" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::warning::Unknown branch - No release will be created"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create global version tag
        id: create_global_tag
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          STRATEGY="${{ steps.release_strategy.outputs.strategy }}"

          case "$STRATEGY" in
            "rc")
              # Develop branch: Simple RC versioning
              LAST_STABLE=$(git tag -l "v*" --sort=-version:refname | grep -v "rc\|pre" | head -n1 || echo "v0.0.0")
              echo "Last stable global version: $LAST_STABLE"

              # Simple semantic analysis for global project
              if [ "$LAST_STABLE" != "v0.0.0" ]; then
                GLOBAL_COMMITS=$(git log ${LAST_STABLE}..HEAD --oneline)
              else
                GLOBAL_COMMITS=$(git log --oneline)
              fi

              echo "Analyzing global commits since $LAST_STABLE:"
              echo "$GLOBAL_COMMITS"

              # Simplified SEMVER bump logic
              if echo "$GLOBAL_COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                BUMP_TYPE="major"
              elif echo "$GLOBAL_COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi

              echo "::notice::Global SEMVER bump type: $BUMP_TYPE"

              # Calculate new base version
              CURRENT_VERSION=$(echo "$LAST_STABLE" | sed "s/v//")
              if [ "$CURRENT_VERSION" = "0.0.0" ]; then
                case "$BUMP_TYPE" in
                  major) GLOBAL_BASE="1.0.0" ;;
                  minor) GLOBAL_BASE="0.1.0" ;;
                  *) GLOBAL_BASE="0.0.1" ;;
                esac
              else
                IFS='.' read -ra parts <<< "$CURRENT_VERSION"
                MAJOR=${parts[0]:-0}
                MINOR=${parts[1]:-0}
                PATCH=${parts[2]:-0}

                case "$BUMP_TYPE" in
                  major) GLOBAL_BASE="$((MAJOR + 1)).0.0" ;;
                  minor) GLOBAL_BASE="${MAJOR}.$((MINOR + 1)).0" ;;
                  patch) GLOBAL_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
                esac
              fi

              # Simple RC counter
              RC_NUM=$(git rev-list --count HEAD ^origin/main 2>/dev/null || echo "1")
              [ "$RC_NUM" -eq 0 ] && RC_NUM=1

              NEW_VERSION="v${GLOBAL_BASE}-rc.${RC_NUM}"
              echo "::notice::Generated global RC: $NEW_VERSION"
              ;;

            "stable")
              # Master branch: Find latest RC and promote, or create first stable
              LATEST_RC=$(git tag -l "v*-rc.*" --sort=-version:refname | head -n1)

              if [ -z "$LATEST_RC" ]; then
                echo "::warning::No RC found, creating first stable release"
                
                # Analyze all commits for first stable version
                GLOBAL_COMMITS=$(git log --oneline)
                if echo "$GLOBAL_COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                  NEW_VERSION="v1.0.0"
                elif echo "$GLOBAL_COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                  NEW_VERSION="v0.1.0"
                else
                  NEW_VERSION="v0.0.1"
                fi
                
                echo "::notice::Creating first stable release: $NEW_VERSION"
              else
                # Promote RC to stable (remove -rc.X suffix)
                GLOBAL_BASE=$(echo "$LATEST_RC" | sed "s/v//" | sed "s/-rc\..*//")
                NEW_VERSION="v${GLOBAL_BASE}"
                
                echo "::notice::Promoting RC to stable: $LATEST_RC → $NEW_VERSION"
              fi
              ;;

            *)
              echo "::error::Unknown strategy: $STRATEGY"
              exit 1
              ;;
          esac

          # Verify global tag doesn't exist
          if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
            echo "::error::Global tag $NEW_VERSION already exists!"
            exit 1
          fi

          # Create and push global tag
          git tag -a "$NEW_VERSION" -m "Global release $NEW_VERSION with apps: ${{ needs.validate-versions.outputs.version_summary }}"
          git push origin "$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Successfully created and pushed global tag: $NEW_VERSION"

      - name: Create comprehensive deployment bundle
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          mkdir -p deployment

          # Copy essential files only
          [ -d "scripts" ] && cp -r scripts deployment/
          [ -d "infra" ] && cp -r infra deployment/
          [ -f "Makefile" ] && cp Makefile deployment/
          [ -f "README.md" ] && cp README.md deployment/
          [ -f ".env.example" ] && cp .env.example deployment/

          for app in apps/*; do
            if [ -d "$app" ]; then
              name=$(basename "$app")
              mkdir -p "deployment/apps/$name"
              find "$app" -name "docker-compose*.yml" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
              find "$app" -name ".env.example" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
            fi
          done

          # Create version manifest with Docker versions
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo ""
            echo "**Strategy**: ${{ steps.release_strategy.outputs.strategy }} (simplified versioning)"
            echo "**Changed Apps**: ${{ needs.validate-versions.outputs.version_summary }}"
            echo ""
            echo "## Docker Images with Simplified Versioning"
            
            # Show all apps with their status
            if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.blog_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-blog:${{ inputs.blog_docker_version }}\` ($TAG_TYPE) ✅"
            else
              echo "- **blog**: No changes"
            fi
            
            if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.api_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-api:${{ inputs.api_docker_version }}\` ($TAG_TYPE) ✅"
            else
              echo "- **api**: No changes"
            fi
            
            if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.web_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-web:${{ inputs.web_docker_version }}\` ($TAG_TYPE) ✅"
            else
              echo "- **web**: No changes"
            fi
            
            if [ -n "${{ inputs.wiki_docker_version }}" ] && [ "${{ inputs.wiki_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.wiki_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **wiki**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-wiki:${{ inputs.wiki_docker_version }}\` ($TAG_TYPE) ✅"
            else
              echo "- **wiki**: No changes"
            fi
            
            echo ""
            echo "## Versioning Strategy Summary"
            echo "- **Pre-releases** (\`-pre.X\`): Feature and hotfix branches (unified)"
            echo "- **Release Candidates** (\`-rc.X\`): Develop branch"
            echo "- **Stable** (no suffix): Master branch with semantic versioning"
            echo ""
            echo "## Deployment"
            echo "1. Extract bundle to deployment environment"
            echo "2. Update docker-compose files with new image tags"
            echo "3. Run: \`make deploy ENV=<environment>\`"
            echo ""
            echo "**Global Version**: ${{ steps.create_global_tag.outputs.new_version }}"
            echo "**Branch**: ${{ github.ref_name }}"
            echo "**Commit**: ${{ github.sha }}"
          } > deployment/VERSION_MANIFEST.md

          # Create deployment bundle
          cd deployment
          zip -r ../global-release-${{ steps.create_global_tag.outputs.new_version }}.zip .

      - name: Upload global deployment artifacts
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: global-deployment-bundle-${{ steps.create_global_tag.outputs.new_version }}
          path: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          retention-days: 90

      - name: Create comprehensive release notes
        id: release_notes
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo ""
            echo "## Simplified Versioning Strategy"
            case "${{ steps.release_strategy.outputs.strategy }}" in
              "rc")
                echo "This is a **Release Candidate** from the develop branch."
                ;;
              "stable")
                echo "This is a **Stable Release** from the master branch with semantic versioning."
                ;;
            esac
            echo ""
            echo "## Changed Applications"
            echo '${{ inputs.changed_apps }}' | jq -r '.[]' | sed 's/^/- **/' | sed 's/$/**: Updated/'
            echo ""
            echo "## Docker Images"
            
            # Show updated apps with their version types
            if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.blog_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-blog:${{ inputs.blog_docker_version }}\` (\`$TAG_TYPE\`)"
            fi
            if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.api_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-api:${{ inputs.api_docker_version }}\` (\`$TAG_TYPE\`)"
            fi
            if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.web_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-web:${{ inputs.web_docker_version }}\` (\`$TAG_TYPE\`)"
            fi
            if [ -n "${{ inputs.wiki_docker_version }}" ] && [ "${{ inputs.wiki_docker_version }}" != "skip" ]; then
              TAG_TYPE=$(echo "${{ inputs.wiki_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
              echo "- **wiki**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-wiki:${{ inputs.wiki_docker_version }}\` (\`$TAG_TYPE\`)"
            fi
            
            echo ""
            echo "## What's Included"
            echo "- Complete deployment bundle"
            echo "- Infrastructure configuration"
            echo "- Deployment scripts and Makefile"
            echo "- Simplified version manifest"
            echo ""
            echo "## Deployment"
            echo "Download the deployment bundle and follow VERSION_MANIFEST.md instructions."
          } > release_notes.md

          # Set output for GitHub release
          {
            echo 'RELEASE_NOTES<<EOF'
            cat release_notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.create_global_tag.outputs.new_version }}
          name: "Release ${{ steps.create_global_tag.outputs.new_version }}"
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          artifacts: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ steps.release_strategy.outputs.strategy == 'rc' }}
          makeLatest: ${{ steps.release_strategy.outputs.strategy == 'stable' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify global deployment
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          # Create comprehensive payload
          PAYLOAD=$(cat <<EOF
          {
            "type": "global_release",
            "version": "${{ steps.create_global_tag.outputs.new_version }}",
            "strategy": "${{ steps.release_strategy.outputs.strategy }}",
            "changed_apps": ${{ inputs.changed_apps }},
            "docker_versions": {
              "blog": "${{ inputs.blog_docker_version }}",
              "api": "${{ inputs.api_docker_version }}",
              "web": "${{ inputs.web_docker_version }}",
              "wiki": "${{ inputs.wiki_docker_version }}"
            },
            "versioning_approach": "simplified_unified",
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}"
          }
          EOF
          )

          # Send notification with retry logic and better error handling
          WEBHOOK_URL="${{ secrets.N8N_WEBHOOK_URL }}"
          WEBHOOK_TOKEN="${{ secrets.N8N_DEPLOY_TOKEN }}"

          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::warning::Webhook URL or token not configured, skipping notification"
            exit 0
          fi

          for i in {1..3}; do
            echo "Sending notification attempt $i/3..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $WEBHOOK_TOKEN" \
              -d "$PAYLOAD" \
              --max-time 30 \
              --retry 0 2>/dev/null)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Global release notification sent successfully (HTTP $HTTP_CODE)"
              break
            else
              echo "❌ Notification attempt $i failed (HTTP $HTTP_CODE)"
              [ $i -lt 3 ] && echo "Retrying in 5 seconds..." && sleep 5
            fi
          done || echo "⚠️ All notification attempts failed, but global release was successful"

      - name: Workflow Summary
        run: |
          echo "## Global Release Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: ${{ steps.release_strategy.outputs.strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Created**: ${{ steps.release_strategy.outputs.create_release }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.release_strategy.outputs.create_release }}" = "true" ]; then
            echo "- **Global Version**: ${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Simplified App Versioning" >> $GITHUB_STEP_SUMMARY
          echo "**Changed Apps**: ${{ needs.validate-versions.outputs.version_summary }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show version types
          if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
            TAG_TYPE=$(echo "${{ inputs.blog_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
            echo "- **blog**: ${{ inputs.blog_docker_version }} (\`$TAG_TYPE\`)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
            TAG_TYPE=$(echo "${{ inputs.api_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
            echo "- **api**: ${{ inputs.api_docker_version }} (\`$TAG_TYPE\`)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
            TAG_TYPE=$(echo "${{ inputs.web_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
            echo "- **web**: ${{ inputs.web_docker_version }} (\`$TAG_TYPE\`)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.wiki_docker_version }}" ] && [ "${{ inputs.wiki_docker_version }}" != "skip" ]; then
            TAG_TYPE=$(echo "${{ inputs.wiki_docker_version }}" | grep -o "\(pre\|rc\)" || echo "stable")
            echo "- **wiki**: ${{ inputs.wiki_docker_version }} (\`$TAG_TYPE\`)" >> $GITHUB_STEP_SUMMARY
          fi