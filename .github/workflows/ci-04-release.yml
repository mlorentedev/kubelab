---
name: Create Global Release

on:
  workflow_call:
    inputs:
      changed_apps:
        required: true
        type: string
        description: "JSON array of changed apps"
      blog_docker_version:
        required: false
        type: string
        default: ""
      api_docker_version:
        required: false
        type: string
        default: ""
      web_docker_version:
        required: false
        type: string
        default: ""
      blog_sha:
        required: false
        type: string
        default: ""
      api_sha:
        required: false
        type: string
        default: ""
      web_sha:
        required: false
        type: string
        default: ""

jobs:
  validate-versions:
    name: Validate Version Consistency
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.validate.outputs.base_version }}
    steps:
      - name: Validate Docker versions format
        id: validate
        run: |
          # Collect non-empty and non-skip Docker versions
          versions=()
          valid_versions=()
          
          # Check each app version
          if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
            versions+=("blog:${{ inputs.blog_docker_version }}")
            valid_versions+=("${{ inputs.blog_docker_version }}")
          fi
          
          if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
            versions+=("api:${{ inputs.api_docker_version }}")
            valid_versions+=("${{ inputs.api_docker_version }}")
          fi
          
          if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
            versions+=("web:${{ inputs.web_docker_version }}")
            valid_versions+=("${{ inputs.web_docker_version }}")
          fi

          if [ ${#valid_versions[@]} -eq 0 ]; then
            echo "::error::No valid Docker versions provided (all apps skipped)"
            exit 1
          fi

          echo "::notice::Apps with version changes:"
          for version in "${versions[@]}"; do
            echo "  - $version"
          done

          # For independent versioning, we don't need base version validation
          # Each app can have its own version
          echo "base_version=independent" >> $GITHUB_OUTPUT
          echo "::notice::Independent app versioning - no base version validation needed"

  create-global-release:
    name: Create Global Release
    runs-on: ubuntu-latest
    needs: validate-versions
    outputs:
      global_version: ${{ steps.create_global_tag.outputs.new_version }}
      release_created: ${{ steps.create_global_tag.outputs.tag_created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect global release strategy
        id: release_strategy
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Current branch: $BRANCH_NAME"

          case "$BRANCH_NAME" in
            feature/*|hotfix/*)
              echo "::notice::Feature/Hotfix branch - No global release will be created"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
            develop)
              echo "::notice::Develop branch - Will create prerelease"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=prerelease" >> "$GITHUB_OUTPUT"
              ;;
            master|main)
              echo "::notice::Main branch - Will create stable release"
              echo "create_release=true" >> "$GITHUB_OUTPUT"
              echo "strategy=stable" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::warning::Unknown branch - No release will be created"
              echo "create_release=false" >> "$GITHUB_OUTPUT"
              echo "strategy=skip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create global version tag
        id: create_global_tag
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          STRATEGY="${{ steps.release_strategy.outputs.strategy }}"

          case "$STRATEGY" in
            "prerelease")
              # Develop branch: Calculate SEMVER and create RC
              LAST_GLOBAL=$(git tag -l "v*" --sort=-version:refname | grep -v "rc\|alpha\|beta" | head -n1 || echo "v0.0.0")
              echo "Last stable global version: $LAST_GLOBAL"

              # For global release, analyze commits from all changed apps
              if [ "$LAST_GLOBAL" != "v0.0.0" ]; then
                GLOBAL_COMMITS=$(git log ${LAST_GLOBAL}..HEAD --oneline)
              else
                GLOBAL_COMMITS=$(git log --oneline)
              fi

              echo "Analyzing global commits since $LAST_GLOBAL:"
              echo "$GLOBAL_COMMITS"

              # Determine SEMVER bump for global project
              if echo "$GLOBAL_COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                BUMP_TYPE="major"
                echo "::notice::Global SEMVER: Breaking change detected - MAJOR bump"
              elif echo "$GLOBAL_COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                BUMP_TYPE="minor"
                echo "::notice::Global SEMVER: Feature detected - MINOR bump"
              else
                BUMP_TYPE="patch"
                echo "::notice::Global SEMVER: Patch/fix detected - PATCH bump"
              fi

              # Calculate new base version for global project
              CURRENT_VERSION=$(echo "$LAST_GLOBAL" | sed "s/v//")
              if [ "$CURRENT_VERSION" = "0.0.0" ]; then
                case "$BUMP_TYPE" in
                  major) GLOBAL_BASE="1.0.0" ;;
                  minor) GLOBAL_BASE="0.1.0" ;;
                  *) GLOBAL_BASE="0.0.1" ;;
                esac
              else
                IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
                MAJOR=${VERSION_PARTS[0]:-0}
                MINOR=${VERSION_PARTS[1]:-0}
                PATCH=${VERSION_PARTS[2]:-0}

                case "$BUMP_TYPE" in
                  major)
                    MAJOR=$((MAJOR + 1))
                    MINOR=0
                    PATCH=0
                    ;;
                  minor)
                    MINOR=$((MINOR + 1))
                    PATCH=0
                    ;;
                  *)
                    PATCH=$((PATCH + 1))
                    ;;
                esac
                GLOBAL_BASE="${MAJOR}.${MINOR}.${PATCH}"
              fi

              # Find next RC number for global project
              RC_TAGS=$(git tag -l "v${GLOBAL_BASE}-rc.*" --sort=-version:refname)

              if [ -z "$RC_TAGS" ]; then
                RC_NUMBER=1
                echo "::notice::No existing global RC tags found for v${GLOBAL_BASE}, starting with RC.1"
              else
                # Get the highest RC number for this base version
                LATEST_RC=$(echo "$RC_TAGS" | head -n1)
                echo "::notice::Found existing global RC tags for v${GLOBAL_BASE}, latest: $LATEST_RC"

                # Extract RC number more safely
                RC_NUMBER=$(echo "$LATEST_RC" | grep -o 'rc\.[0-9]*$' | cut -d'.' -f2)

                # Validate extracted number and increment
                if [[ "$RC_NUMBER" =~ ^[0-9]+$ ]]; then
                  RC_NUMBER=$((RC_NUMBER + 1))
                else
                  echo "::warning::Could not parse RC number from $LATEST_RC, defaulting to 1"
                  RC_NUMBER=1
                fi
              fi

              NEW_VERSION="v${GLOBAL_BASE}-rc.${RC_NUMBER}"
              echo "::notice::Generated global RC version: $NEW_VERSION (base: $GLOBAL_BASE)"
              ;;

            "stable")
              # Master branch: Promote latest RC to stable (or create first stable)
              LATEST_GLOBAL_RC=$(git tag -l "v*-rc.*" --sort=-version:refname | head -n1)

              if [ -z "$LATEST_GLOBAL_RC" ]; then
                # No RC found - create first stable release
                echo "::warning::No global RC version found. Creating first stable release."

                # Analyze commits to determine first version
                GLOBAL_COMMITS=$(git log --oneline)
                if echo "$GLOBAL_COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
                  NEW_VERSION="v1.0.0"
                elif echo "$GLOBAL_COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
                  NEW_VERSION="v0.1.0"
                else
                  NEW_VERSION="v0.0.1"
                fi

                echo "::notice::Creating first global stable release: $NEW_VERSION"
              else
                # Standard RC promotion
                GLOBAL_BASE=$(echo "$LATEST_GLOBAL_RC" | sed "s/v//" | sed "s/-rc\..*//")
                NEW_VERSION="v${GLOBAL_BASE}"

                # Check if stable version already exists
                if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
                  echo "::error::Global stable version $NEW_VERSION already exists!"
                  exit 1
                fi

                echo "::notice::Promoting global RC to stable: $LATEST_GLOBAL_RC → $NEW_VERSION"
              fi
              ;;

            *)
              echo "::error::Unknown strategy: $STRATEGY"
              exit 1
              ;;
          esac

          # Verify global tag doesn't exist
          if git rev-parse "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
            echo "::error::Global tag $NEW_VERSION already exists!"
            exit 1
          fi

          # Create and push global tag
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Successfully created and pushed global tag: $NEW_VERSION"

      - name: Create comprehensive deployment bundle
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          mkdir -p deployment
          # Copy infrastructure and scripts
          if [ -d "scripts" ]; then
            cp -r scripts deployment/
          fi
          if [ -d "infra" ]; then
            cp -r infra deployment/
          fi
          if [ -f "Makefile" ]; then
            cp Makefile deployment/
          fi
          if [ -f "README.md" ]; then
            cp README.md deployment/
          fi
          if [ -f ".env.example" ]; then
            cp .env.example deployment/
          fi
          for app in apps/*; do
            if [ -d "$app" ]; then
              name=$(basename "$app")
              mkdir -p "deployment/apps/$name"
              find "$app" -name "docker-compose*.yml" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
              find "$app" -name ".env.example" -exec cp {} "deployment/apps/$name/" \; 2>/dev/null || true
            fi
          done

          # Create version manifest with Docker versions
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo "## Changed Applications"
            echo '${{ inputs.changed_apps }}' | jq -r '.[]' | sed 's/^/- /'
            echo ""
            echo "## Docker Image Versions (Independent Versioning)"
            echo "This release includes the following app versions:"
            echo ""
            # Add Docker versions for changed apps
            if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-blog:${{ inputs.blog_docker_version }}\` (SHA: ${{ inputs.blog_sha }}) ✅ **Updated**"
            else
              echo "- **blog**: No changes - using previous version"
            fi
            if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-api:${{ inputs.api_docker_version }}\` (SHA: ${{ inputs.api_sha }}) ✅ **Updated**"
            else
              echo "- **api**: No changes - using previous version"
            fi
            if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-web:${{ inputs.web_docker_version }}\` (SHA: ${{ inputs.web_sha }}) ✅ **Updated**"
            else
              echo "- **web**: No changes - using previous version"
            fi
            echo ""
            echo "## Deployment Instructions"
            echo "1. Extract this bundle to your deployment environment"
            echo "2. Review the VERSION_MANIFEST.md for changed components"
            echo "3. Update your docker-compose files with the new image tags above"
            echo "4. Run deployment scripts from the scripts/ directory"
            echo ""
            echo "## Global Project Version"
            echo "- **Project Version**: ${{ steps.create_global_tag.outputs.new_version }}"
            echo "- **Branch**: ${{ github.ref_name }}"
            echo "- **Commit**: ${{ github.sha }}"
          } > deployment/VERSION_MANIFEST.md

          # Create deployment bundle
          cd deployment
          zip -r ../global-release-${{ steps.create_global_tag.outputs.new_version }}.zip .
          ls -la ../global-release-${{ steps.create_global_tag.outputs.new_version }}.zip

      - name: Upload global deployment artifacts
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: global-deployment-bundle-${{ steps.create_global_tag.outputs.new_version }}
          path: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          retention-days: 90

      - name: Create comprehensive release notes
        id: release_notes
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          {
            echo "# Global Release ${{ steps.create_global_tag.outputs.new_version }}"
            echo ""
            echo "## Changed Applications"
            echo '${{ inputs.changed_apps }}' | jq -r '.[]' | sed 's/^/- **/' | sed 's/$/**: Updated/'
            echo ""
            echo "## Docker Images (Independent Versioning)"
            if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
              echo "- **blog**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-blog:${{ inputs.blog_docker_version }}\` ✅ Updated"
            else
              echo "- **blog**: No changes (using previous version)"
            fi
            if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
              echo "- **api**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-api:${{ inputs.api_docker_version }}\` ✅ Updated"
            else
              echo "- **api**: No changes (using previous version)"
            fi
            if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
              echo "- **web**: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.REGISTRY_PREFIX || 'mlorente' }}-web:${{ inputs.web_docker_version }}\` ✅ Updated"
            else
              echo "- **web**: No changes (using previous version)"
            fi
            echo ""
            echo "## What's Included"
            echo "- Complete deployment bundle with all applications"
            echo "- Infrastructure configuration"
            echo "- Deployment scripts"
            echo "- Version manifest with detailed component information"
            echo ""
            echo "## Deployment"
            echo "Download the \`global-release-${{ steps.create_global_tag.outputs.new_version }}.zip\` asset and follow the instructions in VERSION_MANIFEST.md"
          } > release_notes.md

          # Set output for use in release
          {
            echo 'RELEASE_NOTES<<EOF'
            cat release_notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release_strategy.outputs.create_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.create_global_tag.outputs.new_version }}
          name: "Release ${{ steps.create_global_tag.outputs.new_version }}"
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          artifacts: global-release-${{ steps.create_global_tag.outputs.new_version }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ steps.release_strategy.outputs.strategy == 'prerelease' }}
          makeLatest: ${{ steps.release_strategy.outputs.strategy == 'stable' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify global deployment
        if: steps.release_strategy.outputs.create_release == 'true'
        run: |
          # Create comprehensive payload
          PAYLOAD=$(cat <<EOF
          {
            "type": "global_release",
            "version": "${{ steps.create_global_tag.outputs.new_version }}",
            "strategy": "${{ steps.release_strategy.outputs.strategy }}",
            "changed_apps": ${{ inputs.changed_apps }},
            "docker_versions": {
              "blog": "${{ inputs.blog_docker_version }}",
              "api": "${{ inputs.api_docker_version }}",
              "web": "${{ inputs.web_docker_version }}"
            },
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}"
          }
          EOF
          )

          # Send notification with retry logic and better error handling
          WEBHOOK_URL="${{ secrets.N8N_WEBHOOK_URL }}"
          WEBHOOK_TOKEN="${{ secrets.N8N_DEPLOY_TOKEN }}"

          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::warning::Webhook URL or token not configured, skipping notification"
            exit 0
          fi

          for i in {1..3}; do
            echo "Sending notification attempt $i/3..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $WEBHOOK_TOKEN" \
              -d "$PAYLOAD" \
              --max-time 30 \
              --retry 0 2>/dev/null)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Global release notification sent successfully (HTTP $HTTP_CODE)"
              break
            else
              echo "❌ Notification attempt $i failed (HTTP $HTTP_CODE)"
              [ $i -lt 3 ] && echo "Retrying in 5 seconds..." && sleep 5
            fi
          done || echo "⚠️ All notification attempts failed, but global release was successful"

      - name: Workflow Summary
        run: |
          echo "## Global Release Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: ${{ steps.release_strategy.outputs.strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Created**: ${{ steps.release_strategy.outputs.create_release }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.release_strategy.outputs.create_release }}" = "true" ]; then
            echo "- **Global Version**: ${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_global_tag.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Apps & Independent Versions" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.blog_docker_version }}" ] && [ "${{ inputs.blog_docker_version }}" != "skip" ]; then
            echo "- **blog**: ${{ inputs.blog_docker_version }} ✅ Updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **blog**: No changes" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.api_docker_version }}" ] && [ "${{ inputs.api_docker_version }}" != "skip" ]; then
            echo "- **api**: ${{ inputs.api_docker_version }} ✅ Updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **api**: No changes" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ inputs.web_docker_version }}" ] && [ "${{ inputs.web_docker_version }}" != "skip" ]; then
            echo "- **web**: ${{ inputs.web_docker_version }} ✅ Updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **web**: No changes" >> $GITHUB_STEP_SUMMARY
          fi
