---
name: Debug Filter Only

on:
  push:
    branches: [feature/static-jekyll]
  workflow_dispatch:

jobs:
  debug-only:
    name: Debug Path Filter
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Show changed files
        run: |
          echo "=== CHANGED FILES ==="
          git diff --name-only HEAD~1 HEAD
          echo "=== END CHANGED FILES ==="
          
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            blog:
              - 'apps/blog/**'
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
              
      - name: Debug outputs (raw)
        run: |
          echo "=== RAW OUTPUTS ==="
          echo "blog: '${{ steps.filter.outputs.blog }}'"
          echo "api: '${{ steps.filter.outputs.api }}'"
          echo "web: '${{ steps.filter.outputs.web }}'"
          echo "changes: '${{ steps.filter.outputs.changes }}'"
          
      - name: Debug outputs (length)
        run: |
          echo "=== OUTPUT LENGTHS ==="
          echo "blog length: $(echo -n '${{ steps.filter.outputs.blog }}' | wc -c)"
          echo "api length: $(echo -n '${{ steps.filter.outputs.api }}' | wc -c)"
          echo "web length: $(echo -n '${{ steps.filter.outputs.web }}' | wc -c)"
          
      - name: Debug outputs (hex)
        run: |
          echo "=== HEX DUMP ==="
          echo -n '${{ steps.filter.outputs.blog }}' | hexdump -C
          echo -n '${{ steps.filter.outputs.api }}' | hexdump -C
          echo -n '${{ steps.filter.outputs.web }}' | hexdump -C

  test-conditions:
    name: Test All Conditions
    needs: debug-only
    runs-on: ubuntu-latest
    steps:
      - name: Test condition variations
        run: |
          echo "=== CONDITION TESTS ==="
          
          # Test 1: Direct value
          if [ "${{ needs.debug-only.outputs.blog }}" ]; then
            echo "✅ Blog: Direct value is truthy"
          else
            echo "❌ Blog: Direct value is falsy"
          fi
          
          # Test 2: String comparison
          if [ "${{ needs.debug-only.outputs.blog }}" = "true" ]; then
            echo "✅ Blog: String equals 'true'"
          else
            echo "❌ Blog: String NOT equals 'true'"
          fi
          
          # Test 3: Empty check
          if [ -z "${{ needs.debug-only.outputs.blog }}" ]; then
            echo "❌ Blog: Output is empty"
          else
            echo "✅ Blog: Output is not empty"
          fi
          
          echo "=== API TESTS ==="
          if [ "${{ needs.debug-only.outputs.api }}" = "true" ]; then
            echo "❌ API: Should be false but equals 'true'"
          else
            echo "✅ API: Correctly not 'true'"
          fi
          
          echo "=== WEB TESTS ==="
          if [ "${{ needs.debug-only.outputs.web }}" = "true" ]; then
            echo "❌ Web: Should be false but equals 'true'"
          else
            echo "✅ Web: Correctly not 'true'"
          fi

  conditional-jobs:
    name: Test Conditional Execution
    needs: debug-only
    strategy:
      matrix:
        app: [blog, api, web]
        include:
          - app: blog
            should_run: ${{ needs.debug-only.outputs.blog == 'true' }}
          - app: api  
            should_run: ${{ needs.debug-only.outputs.api == 'true' }}
          - app: web
            should_run: ${{ needs.debug-only.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    if: ${{ github.matrix.should_run }}
    steps:
      - name: Show execution
        run: |
          echo "🎯 ${{ matrix.app }} job is executing"
          echo "Should run: ${{ matrix.should_run }}"
          echo "Output value: ${{ needs.debug-only.outputs[matrix.app] }}"