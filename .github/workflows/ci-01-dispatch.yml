---
name: CI Dispatcher per App

on:
  push:
    branches: [develop, feature/*, hotfix/*]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:

  detect-changed-apps:
    name: Detect Changed Applications
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      any_app_changed: ${{ steps.check_changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            blog:
              - 'apps/blog/jekyll-site/**'
              - 'apps/blog/Dockerfile'
              - 'apps/blog/docker-compose*.yml'
            api:
              - 'apps/api/src/**'
              - 'apps/api/go.mod'
              - 'apps/api/go.sum'
              - 'apps/api/Dockerfile'
              - 'apps/api/docker-compose*.yml'
            web:
              - 'apps/web/astro-site/**'
              - 'apps/web/Dockerfile'
              - 'apps/web/docker-compose*.yml'
      - name: Check if any app changed
        id: check_changes
        env:
          BLOG_CHANGED: ${{ steps.filter.outputs.blog }}
          API_CHANGED: ${{ steps.filter.outputs.api }}
          WEB_CHANGED: ${{ steps.filter.outputs.web }}
          GITHUB_OUTPUT: ${{ github.env }}
        run: |
          if [[ "$BLOG_CHANGED" == "true" || "$API_CHANGED" == "true" || "$WEB_CHANGED" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi
            
  run-blog-pipeline:
    name: Blog Pipeline
    needs: detect-changed-apps
    if: ${{ needs.detect-changed-apps.outputs.blog == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: blog
    secrets: inherit

  run-api-pipeline:
    name: API Pipeline
    needs: [detect-changed-apps, run-blog-pipeline]
    if: ${{ always() && needs.detect-changed-apps.outputs.api == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: api
    secrets: inherit

  run-web-pipeline:
    name: Web Pipeline
    needs: [detect-changed-apps, run-blog-pipeline, run-api-pipeline]
    if: ${{ always() && needs.detect-changed-apps.outputs.web == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: web
    secrets: inherit