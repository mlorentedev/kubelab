---
name: CI Dispatcher per App

on:
  push:
    branches: [develop, feature/*, hotfix/*]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  detect-changed-apps:
    name: Detect Changed Applications
    runs-on: ubuntu-latest
    outputs:
      blog: ${{ steps.filter.outputs.blog }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      any_app_changed: ${{ steps.check_changes.outputs.any_changed }}
      changed_apps: ${{ steps.list_changes.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            blog:
              - 'apps/blog/jekyll-site/**'
              - 'apps/blog/Dockerfile'
              - 'apps/blog/docker-compose*.yml'
            api:
              - 'apps/api/src/**'
              - 'apps/api/go.mod'
              - 'apps/api/go.sum'
              - 'apps/api/Dockerfile'
              - 'apps/api/docker-compose*.yml'
            web:
              - 'apps/web/astro-site/**'
              - 'apps/web/Dockerfile'
              - 'apps/web/docker-compose*.yml'

      - name: Check if any app changed
        id: check_changes
        env:
          BLOG_CHANGED: ${{ steps.filter.outputs.blog }}
          API_CHANGED: ${{ steps.filter.outputs.api }}
          WEB_CHANGED: ${{ steps.filter.outputs.web }}
        run: |
          if [[ "$BLOG_CHANGED" == "true" || "$API_CHANGED" == "true" || "$WEB_CHANGED" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List changed apps
        id: list_changes
        env:
          BLOG_CHANGED: ${{ steps.filter.outputs.blog }}
          API_CHANGED: ${{ steps.filter.outputs.api }}
          WEB_CHANGED: ${{ steps.filter.outputs.web }}
        run: |
          apps=()
          [[ "$BLOG_CHANGED" == "true" ]] && apps+=("blog")
          [[ "$API_CHANGED" == "true" ]] && apps+=("api")
          [[ "$WEB_CHANGED" == "true" ]] && apps+=("web")
          # Convert array to JSON format
          apps_json=$(printf '%s\n' "${apps[@]}" | jq -R . | jq -c -s .)
          echo "apps=${apps_json}" >> "$GITHUB_OUTPUT"

  run-blog-pipeline:
    name: Blog Pipeline
    needs: detect-changed-apps
    if: ${{ needs.detect-changed-apps.outputs.blog == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: blog
    secrets: inherit

  run-api-pipeline:
    name: API Pipeline
    needs: [detect-changed-apps, run-blog-pipeline]
    if: ${{ always() && needs.detect-changed-apps.outputs.api == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: api
    secrets: inherit

  run-web-pipeline:
    name: Web Pipeline
    needs: [detect-changed-apps, run-blog-pipeline, run-api-pipeline]
    if: ${{ always() && needs.detect-changed-apps.outputs.web == 'true' }}
    uses: ./.github/workflows/ci-02-pipeline.yml
    with:
      app: web
    secrets: inherit

  create-global-release:
    name: Create Global Release
    needs: [detect-changed-apps, run-blog-pipeline, run-api-pipeline, run-web-pipeline]
    if: ${{ always() && needs.detect-changed-apps.outputs.any_app_changed == 'true' }}
    uses: ./.github/workflows/ci-04-release.yml
    with:
      changed_apps: ${{ needs.detect-changed-apps.outputs.changed_apps }}
      blog_docker_version: ${{ needs.run-blog-pipeline.outputs.docker_version || '' }}
      api_docker_version: ${{ needs.run-api-pipeline.outputs.docker_version || '' }}
      web_docker_version: ${{ needs.run-web-pipeline.outputs.docker_version || '' }}
      blog_sha: ${{ needs.run-blog-pipeline.outputs.sha_short || '' }}
      api_sha: ${{ needs.run-api-pipeline.outputs.sha_short || '' }}
      web_sha: ${{ needs.run-web-pipeline.outputs.sha_short || '' }}
    secrets: inherit
