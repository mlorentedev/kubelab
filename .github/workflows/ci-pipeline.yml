---
name: CI + Build for App

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    outputs:
      tag_version:
        description: "Generated version tag"
        value: ${{ jobs.app-pipeline.outputs.tag_version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.app-pipeline.outputs.sha_short }}
      context:
        description: "Docker build context"
        value: ${{ jobs.app-pipeline.outputs.context }}

jobs:
  app-pipeline:
    name: CI + Build for ${{ inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.tag_version.outputs.new_version }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
      context: ${{ steps.context.outputs.context }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fail if app is unsupported
        if: inputs.app != 'blog' && inputs.app != 'api' && inputs.app != 'web'
        run: |
          echo "Unsupported app: ${{ inputs.app }}"
          exit 1

      # Blog Jekyll site validation
      - name: Set up Ruby
        if: ${{ inputs.app == 'blog' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: './apps/blog/jekyll-site'

      - name: Install dependencies
        if: ${{ inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        run: bundle install

      - name: Build Jekyll site
        if: ${{ inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # API
      - name: Set up Go (for api)
        if: ${{ inputs.app == 'api' }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
          cache-dependency-path: './apps/api/src/go.sum'

      - name: Run tests (api)
        if: ${{ inputs.app == 'api' }}
        working-directory: ./apps/api
        run: go test ./...

      # Web
      - name: Set up Node.js (for web)
        if: ${{ inputs.app == 'web' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/astro-site/package-lock.json'

      - name: Install dependencies (web)
        if: ${{ inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm ci

      - name: Build Astro site
        if: ${{ inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm run build

      - name: Determine Docker context
        id: context
        run: |
          case "${{ inputs.app }}" in
            blog)
              echo "context=./apps/blog" >> $GITHUB_OUTPUT
              ;;
            api)
              echo "context=./apps/api" >> $GITHUB_OUTPUT
              ;;
            web)
              echo "context=./apps/web" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unsupported app context"
              exit 1
              ;;
          esac

      - name: Tag version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master,main,develop
          pre_release_branches: feature/*,hotfix/*

      - name: Check if tag exists and delete it
        run: |
          TAG_NAME=${{ steps.tag_version.outputs.new_version }}
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Deleting..."
            git tag -d "$TAG_NAME"
            git push origin --delete "$TAG_NAME"
          fi

      - name: Extract short SHA
        id: short_sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  call-publish:
    name: Build and Push Docker Image for ${{ inputs.app }}
    needs: app-pipeline
    uses: ./.github/workflows/ci-publish.yml
    with:
      app: ${{ inputs.app }}
      tag: ${{ needs.app-pipeline.outputs.tag_version }}
      sha: ${{ needs.app-pipeline.outputs.sha_short }}
      context: ${{ needs.app-pipeline.outputs.context }}
    secrets: inherit
