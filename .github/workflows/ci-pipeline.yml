---
name: CI + Build for App

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    outputs:
      docker_version:
        description: "Generated Docker version for this app"
        value: ${{ jobs.app-pipeline.outputs.docker_version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.app-pipeline.outputs.sha_short }}
      context:
        description: "Docker build context"
        value: ${{ jobs.app-pipeline.outputs.context }}
      should_build:
        description: "Whether the app should be built"
        value: ${{ jobs.app-pipeline.outputs.should_build }}
      extra_build_args:
        description: "Extra build args for Docker (web app PUBLIC_* vars)"
        value: ${{ jobs.app-pipeline.outputs.extra_build_args }}


jobs:
  app-pipeline:
    name: CI + Build for ${{ inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      docker_version: ${{ steps.docker_version.outputs.version }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
      context: ${{ steps.context.outputs.context }}
      should_build: ${{ steps.changes.outputs.should_build }}
      extra_build_args: ${{ steps.web_build_args.outputs.args }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate app and detect changes
        id: changes
        run: |
          APP="${{ inputs.app }}"
          echo "Validating app: $APP"

          # Resolve source directory (edge services vs platform apps)
          case "$APP" in
            errors) SOURCE_DIR="edge/$APP" ;;
            *)      SOURCE_DIR="apps/$APP" ;;
          esac

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Source directory $SOURCE_DIR does not exist, skipping"
            exit 0
          fi

          if [ ! -f "$SOURCE_DIR/Dockerfile" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::error::Dockerfile not found in $SOURCE_DIR"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "source_dir=$SOURCE_DIR" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------------
      # VERSIONING STRATEGY
      # ------------------------------------------------------------------------
      - name: Ensure baseline tag exists
        if: steps.changes.outputs.should_build == 'true'
        run: |
          TAG_PREFIX="${{ inputs.app }}-v"
          if ! git tag -l "${TAG_PREFIX}*" | grep -q .; then
            echo "::notice::No tags found for ${TAG_PREFIX}*, creating baseline ${TAG_PREFIX}0.0.0"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG_PREFIX}0.0.0" -m "Baseline tag for ${{ inputs.app }}"
            git push origin "${TAG_PREFIX}0.0.0"
          fi

      - name: Calculate Semantic Version
        id: semver
        if: steps.changes.outputs.should_build == 'true'
        uses: paulhatch/semantic-version@v5.4.0
        with:
          # Prefix to distinguish apps in monorepo (e.g., "api-v1.0.0")
          tag_prefix: "${{ inputs.app }}-v"
          # Folder to watch for changes
          change_path: "${{ steps.changes.outputs.source_dir }}"
          # Branch definition
          branch: "master"
          # Version format for releases
          version_format: "${major}.${minor}.${patch}"
          # Bump version on every commit to ensure unique RC numbers
          bump_each_commit: true
          # Search commit messages for 'fix:', 'feat:', etc.
          search_commit_body: true

      - name: Determine Final Docker Tag
        id: docker_version
        if: steps.changes.outputs.should_build == 'true'
        run: |
          APP="${{ inputs.app }}"
          BRANCH="${{ github.ref_name }}"
          SEMVER="${{ steps.semver.outputs.version }}"
          INCREMENT="${{ steps.semver.outputs.increment }}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          # -----------------------------------------------------------
          # STRATEGY DEFINITION
          # -----------------------------------------------------------

          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            # [PROD] Main Branch -> Stable Release (e.g., 1.2.0)
            FINAL_VERSION="$SEMVER"
            echo "::notice::[PROD] Stable Release: $FINAL_VERSION"
          else
            # [RC] Feature/Fix/Hotfix Branches -> Release Candidate (e.g., 1.3.0-rc.42)
            FINAL_VERSION="${SEMVER}-rc.${INCREMENT}"
            echo "::notice::[RC] Release Candidate: $FINAL_VERSION"
          fi

          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"

      # API
      - name: Set up Go (for api)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
          cache-dependency-path: './apps/api/src/go.sum'

      - name: Lint API code
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: go vet ./...

      - name: Build API binary
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: go build -o api-binary ./cmd/server

      # Web
      - name: Set up Node.js (for web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/site/package-lock.json'

      - name: Install dependencies (web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/site'
        run: npm ci

      - name: Build Astro site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/site'
        run: npm run build

      # Security Scanning - Secret Detection
      - name: Run gitleaks secret scanner
        if: steps.changes.outputs.should_build == 'true'
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      # Security Scanning - Python (toolkit)
      - name: Set up Python for security scanning
        if: steps.changes.outputs.should_build == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python security tools
        if: steps.changes.outputs.should_build == 'true'
        run: |
          pip install --upgrade pip
          pip install bandit[toml] pip-audit

      - name: Run bandit SAST scanner on toolkit
        if: steps.changes.outputs.should_build == 'true'
        run: |
          echo "Running bandit on toolkit/"
          bandit -r toolkit/ -f json -o bandit-report.json || true
          bandit -r toolkit/ || true

      - name: Run pip-audit on toolkit dependencies
        if: steps.changes.outputs.should_build == 'true'
        run: |
          echo "Checking toolkit dependencies for vulnerabilities"
          pip-audit --desc --require pyproject.toml || echo "::warning::Vulnerabilities found in Python dependencies"

      # Security Scanning - Go (API)
      - name: Install gosec for API
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec SAST scanner on API
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: |
          echo "Running gosec on API code"
          gosec -fmt json -out gosec-report.json ./... || true
          gosec ./... || true

      - name: Run govulncheck on API
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: |
          echo "Checking API dependencies for vulnerabilities"
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::Vulnerabilities found in Go dependencies"

      # Security Scanning - Node.js (Web)
      - name: Run npm audit on web dependencies
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/site'
        run: |
          echo "Checking web dependencies for vulnerabilities"
          npm audit --audit-level=moderate || echo "::warning::Vulnerabilities found in npm dependencies"

      - name: Determine Docker context
        id: context
        run: |
          case "${{ inputs.app }}" in
            api)
              echo "context=./apps/api" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "context=./apps/web" >> "$GITHUB_OUTPUT"
              ;;
            errors)
              echo "context=./edge/errors" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported app: ${{ inputs.app }}"
              exit 1
              ;;
          esac

      - name: Extract web build args from config
        id: web_build_args
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            ENV_FILE="infra/config/values/prod.yaml"
          else
            ENV_FILE="infra/config/values/staging.yaml"
          fi
          COMMON="infra/config/values/common.yaml"

          # Helper: read from env yaml first, fall back to common yaml
          get_val() {
            local val
            val=$(yq "$1" "$ENV_FILE" 2>/dev/null)
            if [ "$val" = "null" ] || [ -z "$val" ]; then
              val=$(yq "$1" "$COMMON" 2>/dev/null)
            fi
            echo "$val"
          }

          WEB=".apps.platform.web"
          ARGS=""
          ARGS+="PUBLIC_SITE_TITLE=$(get_val "${WEB}.site_title")"$'\n'
          ARGS+="PUBLIC_SITE_DESCRIPTION=$(get_val "${WEB}.site_description")"$'\n'
          ARGS+="PUBLIC_SITE_DOMAIN=$(get_val "${WEB}.site_domain")"$'\n'
          ARGS+="PUBLIC_SITE_URL=$(get_val "${WEB}.site_url")"$'\n'
          ARGS+="PUBLIC_SITE_MAIL=$(get_val "${WEB}.site_mail")"$'\n'
          ARGS+="PUBLIC_SITE_AUTHOR=$(get_val "${WEB}.site_author")"$'\n'
          ARGS+="PUBLIC_SITE_KEYWORDS=$(get_val "${WEB}.site_keywords")"$'\n'
          ARGS+="PUBLIC_TWITTER_URL=$(get_val "${WEB}.twitter_url")"$'\n'
          ARGS+="PUBLIC_YOUTUBE_URL=$(get_val "${WEB}.youtube_url")"$'\n'
          ARGS+="PUBLIC_GITHUB_URL=$(get_val "${WEB}.github_url")"$'\n'
          ARGS+="PUBLIC_CALENDLY_URL=$(get_val "${WEB}.calendly_url")"$'\n'
          ARGS+="PUBLIC_BUY_ME_A_COFFEE_URL=$(get_val "${WEB}.buy_me_a_coffee_url")"$'\n'
          ARGS+="PUBLIC_GOOGLE_ANALYTICS_ID=$(get_val "${WEB}.google_analytics_id")"$'\n'
          ARGS+="PUBLIC_GOOGLE_TAG_MANAGER_ID=$(get_val "${WEB}.google_tag_manager_id")"$'\n'
          ARGS+="PUBLIC_ENABLE_BLOG=$(get_val "${WEB}.enable_blog")"$'\n'
          ARGS+="PUBLIC_ENABLE_HOMELABS=$(get_val "${WEB}.enable_homelabs")"$'\n'
          ARGS+="PUBLIC_ENABLE_CONTACT=$(get_val "${WEB}.enable_contact")"$'\n'
          ARGS+="PUBLIC_ALLOWED_HOSTS=$(get_val "${WEB}.allowed_hosts")"$'\n'
          ARGS+="BACKEND_URL=$(get_val "${WEB}.backend_url")"

          {
            echo "args<<ENDOFARGS"
            echo "$ARGS"
            echo "ENDOFARGS"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag for stable releases
        if: >-
          steps.changes.outputs.should_build == 'true' &&
          steps.docker_version.outputs.version != 'skip' &&
          (github.ref_name == 'master' || github.ref_name == 'main')
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ steps.docker_version.outputs.version }}"
          APP_TAG="${APP}-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/$APP_TAG" >/dev/null 2>&1; then
            echo "::warning::App tag $APP_TAG already exists, skipping"
          else
            git tag -a "$APP_TAG" -m "Release $APP v$VERSION"
            git push origin "$APP_TAG"
            echo "::notice::Created stable release tag: $APP_TAG"
          fi
      - name: Extract short SHA
        id: short_sha
        if: steps.changes.outputs.should_build == 'true'
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  call-publish:
    name: Build and Push Docker Image for ${{ inputs.app }}
    needs: app-pipeline
    if: needs.app-pipeline.outputs.should_build == 'true' && needs.app-pipeline.outputs.docker_version != 'skip'
    uses: ./.github/workflows/ci-publish.yml
    with:
      app: ${{ inputs.app }}
      tag: ${{ needs.app-pipeline.outputs.docker_version }}
      sha: ${{ needs.app-pipeline.outputs.sha_short }}
      context: ${{ needs.app-pipeline.outputs.context }}
      extra_build_args: ${{ needs.app-pipeline.outputs.extra_build_args }}
    secrets: inherit

  # ------------------------------------------------------------------------
  # GITOPS: INFRASTRUCTURE UPDATE
  # ------------------------------------------------------------------------
  update-infrastructure:
    name: GitOps Update (${{ inputs.app }})
    needs: [app-pipeline, call-publish]
    runs-on: ubuntu-latest
    # Only run on main — feature branches are developer-owned, no CI auto-commits
    if: >-
      needs.app-pipeline.outputs.should_build == 'true' &&
      (github.ref_name == 'master' || github.ref_name == 'main')
    permissions:
      contents: write  # Required to push changes to repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update Environment Config
        id: update_yaml
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ needs.app-pipeline.outputs.docker_version }}"
          BRANCH="${{ github.ref_name }}"

          # Determine which file to update based on Branch Strategy
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            TARGET_FILE="infra/config/values/prod.yaml"
            ENV_NAME="PROD"
          else
            echo "::warning::GitOps update only runs on master"
            exit 0
          fi

          echo "::notice::🔄 Updating $ENV_NAME config ($TARGET_FILE) for $APP to $VERSION"

          # Resolve config path based on app type
          case "$APP" in
            errors) CONFIG_PATH=".edge.errors.version" ;;
            *)      CONFIG_PATH=".apps.platform.${APP}.version" ;;
          esac

          yq -i "${CONFIG_PATH} = \"${VERSION}\"" "$TARGET_FILE"

          # Verify change
          NEW_VAL=$(yq "${CONFIG_PATH}" "$TARGET_FILE")
          echo "::notice::✅ Verification: $APP is now set to $NEW_VAL in $TARGET_FILE"

          echo "file=$TARGET_FILE" >> "$GITHUB_OUTPUT"

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: >-
            chore(infra): update ${{ inputs.app }} version to
            ${{ needs.app-pipeline.outputs.docker_version }} [skip ci]
          file_pattern: "${{ steps.update_yaml.outputs.file }}"
          branch: ${{ github.head_ref || github.ref_name }}

      - name: Tag Version in Git
        if: github.ref_name == 'main' || github.ref_name == 'master'
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ needs.app-pipeline.outputs.docker_version }}"
          TAG_NAME="${APP}-v${VERSION}"

          echo "::notice::🏷️ Creating Git Tag: $TAG_NAME"

          # Check if tag already exists to avoid errors
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG_NAME already exists. Skipping."
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi
