---
name: Config Drift Gate

# CI-GATE-002/003. Prevents the SEC-K8S-001 class of bug: generator code
# evolves but committed `generated/` files are never refreshed, so
# `kubectl apply -k` uses stale manifests and tests that assert on
# generator-implied invariants silently regress months after the original
# closure.
#
# Strategy: for each env, run `make config-check-drift ENV=<env>`. The
# target regenerates configs via the toolkit and compares against the
# committed files. Any non-empty diff fails the job, with the diff
# printed in the log so the fix is obvious (commit the regenerated files).
#
# Scope: ingress.yaml + Ansible hosts.yml (CI-GATE-002) + configmaps.yaml
# (CI-GATE-003). All SOPS-independent — no age key needed in CI.
#
# See Makefile config-check-drift target for the rationale on what's NOT
# included (deployments.yaml, middlewares.yml, configuration.yml) and the
# SSOT-018 follow-up for deployments.yaml drift coverage.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # Nightly at 06:00 UTC — catches drift introduced by force-pushes,
    # squash-merges that bypassed PR checks, or manual edits to generated/.
    - cron: '0 6 * * *'
  workflow_dispatch:

# Cancel a superseded run on the same ref — the drift check is idempotent and
# read-only, so a newer commit's run supersedes the older (ADR-030 amendment).
concurrency:
  group: drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  drift-check:
    name: Drift / ${{ matrix.env }}
    # Fork PRs run on GitHub-hosted (self-hosted has Docker socket access).
    runs-on: >-
      ${{ github.event.pull_request.head.repo.fork
          && 'ubuntu-latest'
          || fromJSON(vars.RUNNER_DOCKER || '"ubuntu-latest"') }}
    strategy:
      fail-fast: false
      matrix:
        env: [staging, prod]
    env:
      TARGET_ENV: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        # pipx is not preinstalled on the self-hosted runner; use pip
        # directly. `--user` keeps the install in the runner's per-job
        # tool cache without needing root.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry>=1.8,<2.0"
          poetry --version

      - name: Install project deps
        # `--only main` skips the dev group (lint/test). DO NOT add
        # `--no-root` — toolkit/__init__.py calls
        # importlib.metadata.version("toolkit"), which requires the
        # package itself to be installed.
        run: poetry install --only main

      - name: Check ${{ matrix.env }} for generator drift
        run: make config-check-drift ENV="$TARGET_ENV"

      - name: Hint on failure
        if: failure()
        run: |
          echo "::error::Generator output drifted from committed files. Locally run:"
          echo "::error::  make config-generate ENV=$TARGET_ENV"
          echo "::error::Review the diff, then commit the regenerated files."

      # Base kustomization image tags are synced from common.yaml (env-independent),
      # so gate once. The generator drift check above covers overlays only — this
      # catches a manual common.yaml image bump that skipped `make sync-k8s-images`
      # (e.g. edge.errors.version or a third-party tag). #792.
      - name: Check base kustomization image sync (#792)
        if: matrix.env == 'prod'
        run: poetry run toolkit sync images --check

      - name: Hint on image-sync drift
        if: failure() && matrix.env == 'prod'
        run: |
          echo "::error::Base kustomization image tags drifted from common.yaml. Locally run:"
          echo "::error::  make sync-k8s-images"
          echo "::error::Review the diff, then commit infra/k8s/base/kustomization.yaml."

      # Headscale ACL policy is prod-only (single control plane, ADR-015), so gate once.
      - name: Validate Headscale ACL policy (ADR-041 / VPN-ACL-002)
        if: matrix.env == 'prod'
        run: poetry run toolkit infra headscale policy-check

  windows-sync-check:
    name: Sync check (Windows)
    # GitHub-hosted: ADR-030's self-hosted runner is Linux-only, so this can't
    # route through fromJSON(vars.RUNNER_DOCKER). TOOL-020: proves
    # `toolkit sync all --check` — the `make validate-sync` / `make deploy-k8s`
    # prerequisite — stays green on the ADR-052 Windows operator workstation,
    # not just Linux/CI. No SOPS/age key needed: `oidc` skips gracefully when
    # SOPS is unavailable (see _sops_available() in toolkit/cli/sync.py).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry>=1.8,<2.0"
          poetry --version

      - name: Install project deps
        run: poetry install --only main

      - name: toolkit sync all --check --env staging
        run: poetry run toolkit sync all --check --env staging
