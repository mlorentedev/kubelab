name: CI – Build & Push

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'apps/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            blog-jekyll:  apps/blog/**
            web:          apps/web/**
            n8n:          apps/n8n/**
            api:          apps/api/**
      - id: set
        run: echo "matrix=$(jq -nc --argjson f '${{ steps.filter.outputs.changes }}' '$f')" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      app: ${{ matrix }}
      environment: ${{ matrix }}-prod
