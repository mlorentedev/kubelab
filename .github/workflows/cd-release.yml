---
name: Auto Deploy

on:
  workflow_call:
    inputs:
      blog_tag:
        required: false
        type: string
        default: 'latest'
      api_tag:
        required: false
        type: string
        default: 'latest'
      web_tag:
        required: false
        type: string
        default: 'latest'
      force_deploy:
        required: false
        type: boolean
        default: false
        description: 'Force deployment even if checks fail'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yamllint

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker paramiko
          ansible-galaxy collection install community.docker

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

      - name: Create main environment file
        run: |
          # Replicate the main .env file that Makefile uses
          cat > .env << EOF
          ENVIRONMENT=production
          SCRIPTS_PATH=./scripts
          ANSIBLE_PATH=./infra/ansible
          TRAEFIK_PATH=./infra/traefik
          WEB_PATH=./apps/web
          BLOG_PATH=./apps/blog
          API_PATH=./apps/api
          N8N_PATH=./infra/n8n
          MONITORING_PATH=./infra/monitoring
          PORTAINER_PATH=./infra/portainer
          NGINX_PATH=./infra/nginx
          
          # Docker registry
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
          
          # Server connection
          SSH_KEY=~/.ssh/id_rsa
          EOF

      - name: Create Ansible environment file
        run: |
          # Create the specific .env file that generate-ansible-config.sh expects
          mkdir -p infra/ansible
          cat > infra/ansible/.env << EOF
          DOMAIN=${{ secrets.DOMAIN }}
          PRODUCTION_DOMAIN=${{ secrets.DOMAIN }}
          PRODUCTION_DEPLOY_PATH=/opt/${{ secrets.DOMAIN }}
          ANSIBLE_SSH_USER=${{ secrets.ANSIBLE_SSH_USER }}
          ANSIBLE_HOST=${{ secrets.ANSIBLE_HOST }}
          ANSIBLE_HOST_PORT=${{ secrets.ANSIBLE_HOST_PORT || '22' }}
          
          # Application names (from your current setup)
          APP_BLOG_NAME=blog
          APP_WEB_NAME=web
          APP_API_NAME=api
          APP_N8N_NAME=n8n
          APP_GRAFANA_NAME=grafana
          APP_LOKI_NAME=loki
          APP_UPTIME_KUMA_NAME=uptime-kuma
          APP_PORTAINER_NAME=portainer
          EOF

      - name: Update app Docker tags
        run: |
          # Update Docker tags in app .env files if they exist
          for app in blog api web; do
            if [ -f "apps/$app/.env" ]; then
              tag_var="$(echo $app | tr '[:lower:]' '[:upper:]')_TAG"
              case $app in
                blog) tag="${{ inputs.blog_tag }}" ;;
                api) tag="${{ inputs.api_tag }}" ;;
                web) tag="${{ inputs.web_tag }}" ;;
              esac
              
              if grep -q "^DOCKER_TAG=" "apps/$app/.env"; then
                sed -i "s/^DOCKER_TAG=.*/DOCKER_TAG=$tag/" "apps/$app/.env"
              else
                echo "DOCKER_TAG=$tag" >> "apps/$app/.env"
              fi
              
              echo "Updated apps/$app/.env with DOCKER_TAG=$tag"
            fi
          done

      - name: Run prerequisite checks (make check equivalent)
        run: |
          # Replicate make check
          echo "Verifying prerequisites..."
          
          check_command() {
            if ! command -v "$1" >/dev/null 2>&1; then
              echo "❌ $1 is not installed"
              exit 1
            else
              echo "✅ $1 is available"
            fi
          }
          
          check_command ansible
          check_command docker
          check_command python3
          check_command jq
          
          echo "✅ All requirements are met"

      - name: Generate configuration (make generate-config equivalent)
        run: |
          # Make scripts executable
          chmod +x scripts/*.sh
          
          # Run the same scripts that make generate-config runs
          echo "🔧 Generating Traefik credentials..."
          if [ -f "scripts/generate-traefik-credentials.sh" ]; then
            ./scripts/generate-traefik-credentials.sh || echo "Warning: Traefik credentials generation failed"
          fi
          
          echo "🔧 Generating Traefik config..."
          if [ -f "scripts/generate-traefik-config.sh" ]; then
            ./scripts/generate-traefik-config.sh || echo "Warning: Traefik config generation failed"
          fi
          
          echo "🔧 Generating Ansible config..."
          if [ -f "scripts/generate-ansible-config.sh" ]; then
            ./scripts/generate-ansible-config.sh
          else
            echo "❌ generate-ansible-config.sh not found"
            exit 1
          fi

      - name: Verify Ansible configuration
        run: |
          # Verify that the inventory file was generated correctly
          if [ ! -f "infra/ansible/inventories/hosts.yml" ]; then
            echo "❌ Inventory file not found"
            exit 1
          fi
          
          echo "✅ Inventory file exists"
          echo "📋 Inventory content:"
          cat infra/ansible/inventories/hosts.yml
          
          # Test connectivity (equivalent to ansible ping)
          echo "🔌 Testing server connectivity..."
          ansible all -i infra/ansible/inventories/hosts.yml -m ping

      - name: Deploy application (make deploy equivalent)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          # This replicates exactly: make deploy
          echo "🚀 Deploying to production..."
          
          # Use the exact same command structure as your Makefile
          ansible-playbook infra/ansible/playbooks/deploy.yml \
            -i infra/ansible/inventories/hosts.yml \
            --limit production \
            -e "env=production" \
            -e "domain=${{ secrets.DOMAIN }}" \
            -e "deploy_path=/opt/${{ secrets.DOMAIN }}" \
            --private-key ~/.ssh/id_rsa \
            -v

      - name: Verify deployment
        run: |
          # Give extra time for all services to fully start
          echo "⏳ Waiting for services to fully initialize..."
          sleep 30
          
          # Basic connectivity checks (your deploy.yml already does health checks)
          DOMAIN="${{ secrets.DOMAIN }}"
          
          echo "🔍 Quick connectivity verification for key services..."
          
          # Simple connectivity tests (not replacing Ansible's health checks)
          check_connectivity() {
            local name=$1
            local url=$2
            echo "Checking $name connectivity..."
            
            if curl -f -s --max-time 10 --retry 2 "$url" > /dev/null 2>&1; then
              echo "✅ $name is reachable"
            else
              echo "⚠️  $name not immediately reachable (may still be starting)"
            fi
          }
          
          # Quick checks (non-blocking)
          check_connectivity "Main site" "https://${DOMAIN}/"
          check_connectivity "API" "https://api.${DOMAIN}/health"
          check_connectivity "Blog" "https://blog.${DOMAIN}/"
          
          echo "📝 Note: Detailed health checks were performed by Ansible during deployment"
          echo "✅ Basic connectivity verification completed"

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain**: ${{ secrets.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Blog Image**: ${{ inputs.blog_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Image**: ${{ inputs.api_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Image**: ${{ inputs.web_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed At**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify success
        if: success()
        run: |
          if [ -n "${{ secrets.N8N_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d '{
                "status": "success",
                "environment": "production",
                "domain": "${{ secrets.DOMAIN }}",
                "blog_tag": "${{ inputs.blog_tag }}",
                "api_tag": "${{ inputs.api_tag }}",
                "web_tag": "${{ inputs.web_tag }}",
                "commit": "${{ github.sha }}",
                "actor": "${{ github.actor }}",
                "deployed_at": "'$(date -u)'"
              }' || echo "Notification failed but deployment was successful"
          fi

      - name: Notify failure
        if: failure()
        run: |
          if [ -n "${{ secrets.N8N_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d '{
                "status": "failed",
                "environment": "production",
                "domain": "${{ secrets.DOMAIN }}",
                "commit": "${{ github.sha }}",
                "actor": "${{ github.actor }}",
                "failed_at": "'$(date -u)'",
                "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }' || echo "Notification failed"
          fi