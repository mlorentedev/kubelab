---
name: Trigger Production Deployment via n8n

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        type: string
      tag:
        description: "Version tag to deploy"
        required: true
        type: string

jobs:
  notify-n8n:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger n8n Deployment Webhook
        run: |
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d '{"app": "'"${{ github.event.inputs.app }}"'", "tag": "'"${{ github.event.inputs.tag }}"'"}'
