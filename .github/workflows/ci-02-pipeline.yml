---
name: CI + Build for App

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    outputs:
      docker_version:
        description: "Generated Docker version for this app"
        value: ${{ jobs.app-pipeline.outputs.docker_version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.app-pipeline.outputs.sha_short }}
      context:
        description: "Docker build context"
        value: ${{ jobs.app-pipeline.outputs.context }}
      should_build:
        description: "Whether the app should be built"
        value: ${{ jobs.app-pipeline.outputs.should_build }}


jobs:
  app-pipeline:
    name: CI + Build for ${{ inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      docker_version: ${{ steps.docker_version.outputs.version }}
      is_pre_release: ${{ steps.docker_version.outputs.is_pre_release }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
      context: ${{ steps.context.outputs.context }}
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate app and detect changes
        id: changes
        run: |
          APP="${{ inputs.app }}"
          echo "Validating app: $APP"

          if [ ! -d "apps/$APP" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::warning::App directory apps/$APP does not exist, skipping"
            exit 0
          fi

          if [ ! -f "apps/$APP/Dockerfile" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::error::Dockerfile not found for app $APP"
            exit 0
          fi

          if ! ls apps/$APP/docker-compose*.yml 1> /dev/null 2>&1; then
            echo "::warning::No docker-compose files found for app $APP"
            echo "This is not critical but may affect local development"
          fi

      - name: Calculate Docker version for app
        id: docker_version
        if: steps.changes.outputs.should_build == 'true'
        run: |
          APP="${{ inputs.app }}"
          BRANCH="${{ github.ref_name }}"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${APP}"

          echo "::notice::Fetching last tag from Docker Hub for $APP"
          LAST_TAG=$(curl -s -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            "https://hub.docker.com/v2/repositories/${REGISTRY}/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+(-dev|-rc)?$' \
            | sort -V \
            | tail -n1)
          
          BASE_VERSION=${LAST_TAG#v} 
          [ -z "$BASE_VERSION" ] && BASE_VERSION="0.0.0"
          echo "::notice::Last Docker Hub tag for $APP: $BASE_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            PATCH=$((PATCH+1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          elif [[ "$BRANCH" == develop ]]; then
            PATCH=$((PATCH+1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.1"
          else
            PATCH=$((PATCH+1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.1"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Determined version for $APP: $VERSION"

      - name: Pre-release git tag for non-main branches
        if: steps.changes.outputs.should_build == 'true' && steps.docker_version.outputs.version != 'skip' && github.ref_name != 'master' && github.ref_name != 'main'
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ steps.docker_version.outputs.version }}"
          LAST_PRE_TAG=$(git tag -l "${APP}-v*-pre.*" --sort=-v:refname | head -n1)
          NEXT_PRE=1
          if [ -n "$LAST_PRE_TAG" ]; then
            LAST_NUM=$(echo "$LAST_PRE_TAG" | sed -E "s/${APP}-v[0-9]+\.[0-9]+\.[0-9]+-pre\.([0-9]+)/\1/")
            NEXT_PRE=$((LAST_NUM + 1))
          fi
          NEW_TAG="${APP}-v${VERSION}-pre.${NEXT_PRE}"
          git tag "$NEW_TAG"
          echo "::notice::Created pre-release tag locally: $NEW_TAG"
                    
      # Blog Jekyll site validation
      - name: Set up Ruby
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: './apps/blog/jekyll-site'

      - name: Install dependencies
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        working-directory: './apps/blog/jekyll-site'
        run: bundle install

      - name: Build Jekyll site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        working-directory: './apps/blog/jekyll-site'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # API
      - name: Set up Go (for api)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
          cache-dependency-path: './apps/api/src/go.sum'

      - name: Build API binary
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: go build -o api-binary ./cmd/server

      # Web
      - name: Set up Node.js (for web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/astro-site/package-lock.json'

      - name: Install dependencies (web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/astro-site'
        run: npm ci

      - name: Build Astro site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/astro-site'
        run: npm run build

      # Wiki
      - name: Set up Python (for wiki)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        run: |
          pip install --upgrade pip
          pip install \
          mkdocs mkdocs-material \
          mkdocs-minify-plugin \
          mkdocs-redirects \
          mkdocs-awesome-pages-plugin \
          mkdocs-include-markdown-plugin \
          mkdocs-glightbox \
          mkdocs-enumerate-headings-plugin \
          mkdocs-macros-plugin \
          mkdocs-section-index

      - name: Install zsh
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        run: sudo apt-get update && sudo apt-get install -y zsh
      
      - name: Build wiki multiversion site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        run: zsh scripts/generate-wiki.sh build    
      - name: Upload generated site for wiki
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        uses: actions/upload-artifact@v4
        with:
          name: wiki-site
          path: apps/wiki/site
          retention-days: 90

      - name: Determine Docker context
        id: context
        run: |
          case "${{ inputs.app }}" in
            blog)
              echo "context=./apps/blog" >> "$GITHUB_OUTPUT"
              ;;
            api)
              echo "context=./apps/api" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "context=./apps/web" >> "$GITHUB_OUTPUT"
              ;;
            wiki)
              echo "context=./apps/wiki" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported app context"
              exit 1
              ;;
          esac
          
      - name: Create git tag for stable releases
        if: steps.changes.outputs.should_build == 'true' && steps.docker_version.outputs.version != 'skip' && (github.ref_name == 'master' || github.ref_name == 'main')
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ steps.docker_version.outputs.version }}"
          APP_TAG="${APP}-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/$APP_TAG" >/dev/null 2>&1; then
            echo "::warning::App tag $APP_TAG already exists, skipping"
          else
            git tag -a "$APP_TAG" -m "Release $APP v$VERSION"
            git push origin "$APP_TAG"
            echo "::notice::Created stable release tag: $APP_TAG"
          fi
      - name: Extract short SHA
        id: short_sha
        if: steps.changes.outputs.should_build == 'true'
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  call-publish:
    name: Build and Push Docker Image for ${{ inputs.app }}
    needs: app-pipeline
    if: needs.app-pipeline.outputs.should_build == 'true' && needs.app-pipeline.outputs.docker_version != 'skip'
    uses: ./.github/workflows/ci-03-publish.yml
    with:
      app: ${{ inputs.app }}
      tag: ${{ needs.app-pipeline.outputs.docker_version }}
      sha: ${{ needs.app-pipeline.outputs.sha_short }}
      context: ${{ needs.app-pipeline.outputs.context }}
    secrets: inherit
