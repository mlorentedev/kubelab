---
name: CI + Build for App

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    outputs:
      docker_version:
        description: "Generated Docker version for this app"
        value: ${{ jobs.app-pipeline.outputs.docker_version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.app-pipeline.outputs.sha_short }}
      context:
        description: "Docker build context"
        value: ${{ jobs.app-pipeline.outputs.context }}
      should_build:
        description: "Whether the app should be built"
        value: ${{ jobs.app-pipeline.outputs.should_build }}


jobs:
  app-pipeline:
    name: CI + Build for ${{ inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      docker_version: ${{ steps.docker_version.outputs.version }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
      context: ${{ steps.context.outputs.context }}
      should_build: ${{ steps.changes.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate app and detect changes
        id: changes
        run: |
          APP="${{ inputs.app }}"
          echo "Validating app: $APP"

          # Check if app directory exists
          if [ ! -d "apps/$APP" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::warning::App directory apps/$APP does not exist, skipping"
            exit 0
          fi

          # Check if Dockerfile exists
          if [ ! -f "apps/$APP/Dockerfile" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "::error::Dockerfile not found for app $APP"
            exit 0
          fi

          # Check if docker-compose files exist (at least one should exist)
          if ! ls apps/$APP/docker-compose*.yml 1> /dev/null 2>&1; then
            echo "::warning::No docker-compose files found for app $APP"
            echo "This is not critical but may affect local development"
          fi

          echo "::notice::App $APP validated successfully"
          echo "- Directory: apps/$APP ✅"
          echo "- Dockerfile: apps/$APP/Dockerfile ✅"

          # Simple change detection
          if [ "${{ github.event_name }}" == "push" ]; then
            # For push events, check if there are changes since last commit
            if git diff --quiet HEAD~1 HEAD -- apps/$APP/; then
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No changes detected for $APP, skipping build"
              exit 0
            fi
          fi

          # If we get here, we should build
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Changes detected for $APP, proceeding with build"

      - name: Calculate Docker version for app
        id: docker_version
        if: steps.changes.outputs.should_build == 'true'
        run: |
          APP="${{ inputs.app }}"
          BRANCH="${{ github.ref_name }}"
          
          echo "Calculating simplified version for $APP on branch $BRANCH"
          
          # Get last stable version (no pre-releases)
          LAST_STABLE=$(git describe --tags --match "${APP}-v*" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_STABLE" ]; then
            BASE_VERSION="0.0.0"
            echo "::notice::No previous stable tag found, starting at $BASE_VERSION"
          else
            BASE_VERSION=${LAST_STABLE#$APP-v}
            echo "::notice::Last stable version: $BASE_VERSION"
          fi

          if [ -n "$LAST_STABLE" ]; then
            COMMITS=$(git log $LAST_STABLE..HEAD --pretty=format:%s -- apps/$APP/)
          else
            COMMITS=$(git log --pretty=format:%s -- apps/$APP/)
          fi

          if [ -z "$COMMITS" ]; then
            echo "::notice::No new commits, skipping version bump"
            echo "version=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -q "^feat"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -q "^fix"; then
            BUMP="patch"
          else
            BUMP="none"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          case "$BUMP" in
            major) VERSION="$((MAJOR+1)).0.0" ;;
            minor) VERSION="$MAJOR.$((MINOR+1)).0" ;;
            patch) VERSION="$MAJOR.$MINOR.$((PATCH+1))" ;;
            none) VERSION="$BASE_VERSION" ;;
          esac

          # Pre-release for non-main branches
          if [[ "$BRANCH" != "main" && "$BRANCH" != "master" ]]; then
            COUNT=$(git rev-list --count HEAD ^origin/main -- apps/$APP/)
            [ "$COUNT" -eq 0 ] && COUNT=1
            VERSION="${VERSION}-pre.${COUNT}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Determined version for $APP: $VERSION"

      # Blog Jekyll site validation
      - name: Set up Ruby
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: './apps/blog/jekyll-site'

      - name: Install dependencies
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        working-directory: './apps/blog/jekyll-site'
        run: bundle install

      - name: Build Jekyll site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'blog'
        working-directory: './apps/blog/jekyll-site'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # API
      - name: Set up Go (for api)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
          cache-dependency-path: './apps/api/src/go.sum'

      - name: Build API binary
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'api'
        working-directory: ./apps/api/src
        run: go build -o api-binary ./cmd/server

      # Web
      - name: Set up Node.js (for web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/astro-site/package-lock.json'

      - name: Install dependencies (web)
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/astro-site'
        run: npm ci

      - name: Build Astro site
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'web'
        working-directory: './apps/web/astro-site'
        run: npm run build

      # Wiki
      - name: Upload generated site for wiki
        if: steps.changes.outputs.should_build == 'true' && inputs.app == 'wiki'
        uses: actions/upload-artifact@v4
        with:
          name: wiki-site
          path: apps/wiki/site
          retention-days: 90

      - name: Determine Docker context
        id: context
        run: |
          case "${{ inputs.app }}" in
            blog)
              echo "context=./apps/blog" >> "$GITHUB_OUTPUT"
              ;;
            api)
              echo "context=./apps/api" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "context=./apps/web" >> "$GITHUB_OUTPUT"
              ;;
            wiki)
              echo "context=./apps/wiki" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported app context"
              exit 1
              ;;
          esac

      - name: Log versioning decision
        if: steps.changes.outputs.should_build == 'true'
        run: |
          echo "## Docker Versioning Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Version**: ${{ steps.docker_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          case "${{ github.ref_name }}" in
            master|main)
              echo "**Strategy**: Semantic versioning (stable release)" >> $GITHUB_STEP_SUMMARY
              echo "- Analyzed conventional commits for version bump" >> $GITHUB_STEP_SUMMARY
              ;;
            develop)
              echo "**Strategy**: Release candidate with commit counter" >> $GITHUB_STEP_SUMMARY
              ;;
            *)
              echo "**Strategy**: Pre-release with commit counter" >> $GITHUB_STEP_SUMMARY
              echo "- Unified approach for all feature/hotfix branches" >> $GITHUB_STEP_SUMMARY
              ;;
          esac
          
      - name: Create git tag for stable releases
        if: steps.changes.outputs.should_build == 'true' && steps.docker_version.outputs.version != 'skip' && (github.ref_name == 'master' || github.ref_name == 'main')
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ steps.docker_version.outputs.version }}"
          
          APP_TAG="${APP}-v${VERSION}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists
          if git rev-parse "refs/tags/$APP_TAG" >/dev/null 2>&1; then
            echo "::warning::App tag $APP_TAG already exists, skipping tag creation"
          else
            # Create and push app-specific tag for stable releases only
            git tag -a "$APP_TAG" -m "Release $APP v$VERSION"
            git push origin "$APP_TAG"
            echo "::notice::Successfully created stable release tag: $APP_TAG"
          fi

      - name: Extract short SHA
        id: short_sha
        if: steps.changes.outputs.should_build == 'true'
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  call-publish:
    name: Build and Push Docker Image for ${{ inputs.app }}
    needs: app-pipeline
    if: needs.app-pipeline.outputs.should_build == 'true' && needs.app-pipeline.outputs.docker_version != 'skip'
    uses: ./.github/workflows/ci-03-publish.yml
    with:
      app: ${{ inputs.app }}
      tag: ${{ needs.app-pipeline.outputs.docker_version }}
      sha: ${{ needs.app-pipeline.outputs.sha_short }}
      context: ${{ needs.app-pipeline.outputs.context }}
    secrets: inherit
