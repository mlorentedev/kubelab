---
name: CI + Build for App

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
    outputs:
      docker_version:
        description: "Generated Docker version for this app"
        value: ${{ jobs.app-pipeline.outputs.docker_version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.app-pipeline.outputs.sha_short }}
      context:
        description: "Docker build context"
        value: ${{ jobs.app-pipeline.outputs.context }}

jobs:
  app-pipeline:
    name: CI + Build for ${{ inputs.app }}
    runs-on: ubuntu-latest
    outputs:
      docker_version: ${{ steps.docker_version.outputs.version }}
      sha_short: ${{ steps.short_sha.outputs.sha }}
      context: ${{ steps.context.outputs.context }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate app exists and has required files
        run: |
          APP="${{ inputs.app }}"
          echo "Validating app: $APP"

          # Check if app directory exists
          if [ ! -d "apps/$APP" ]; then
            echo "::error::App directory apps/$APP does not exist"
            echo "Available apps:"
            ls -la apps/ || echo "No apps directory found"
            exit 1
          fi

          # Check if Dockerfile exists
          if [ ! -f "apps/$APP/Dockerfile" ]; then
            echo "::error::Dockerfile not found for app $APP"
            echo "Required file: apps/$APP/Dockerfile"
            exit 1
          fi

          # Check if docker-compose files exist (at least one should exist)
          if ! ls apps/$APP/docker-compose*.yml 1> /dev/null 2>&1; then
            echo "::warning::No docker-compose files found for app $APP"
            echo "This is not critical but may affect local development"
          fi

          echo "::notice::App $APP validated successfully"
          echo "- Directory: apps/$APP ✅"
          echo "- Dockerfile: apps/$APP/Dockerfile ✅"

      - name: Detect branch type and versioning strategy
        id: branch_detection
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Current branch: $BRANCH_NAME"

          case "$BRANCH_NAME" in
            feature/*)
              echo "branch_type=feature" >> "$GITHUB_OUTPUT"
              echo "version_strategy=alpha" >> "$GITHUB_OUTPUT"
              echo "use_semver=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Feature branch detected - will use alpha versioning"
              ;;
            hotfix/*)
              echo "branch_type=hotfix" >> "$GITHUB_OUTPUT"
              echo "version_strategy=beta" >> "$GITHUB_OUTPUT"
              echo "use_semver=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Hotfix branch detected - will use beta versioning"
              ;;
            develop)
              echo "branch_type=develop" >> "$GITHUB_OUTPUT"
              echo "version_strategy=rc" >> "$GITHUB_OUTPUT"
              echo "use_semver=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Develop branch detected - will use SEMVER with RC"
              ;;
            master|main)
              echo "branch_type=main" >> "$GITHUB_OUTPUT"
              echo "version_strategy=stable" >> "$GITHUB_OUTPUT"
              echo "use_semver=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Main branch detected - will create stable version"
              ;;
            *)
              echo "::warning::Unrecognized branch pattern: $BRANCH_NAME - defaulting to patch behavior"
              echo "branch_type=other" >> "$GITHUB_OUTPUT"
              echo "version_strategy=patch" >> "$GITHUB_OUTPUT"
              echo "use_semver=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Calculate Docker version for app
        id: docker_version
        run: |
          APP="${{ inputs.app }}"
          BRANCH_TYPE="${{ steps.branch_detection.outputs.branch_type }}"
          VERSION_STRATEGY="${{ steps.branch_detection.outputs.version_strategy }}"

          echo "Calculating Docker version for app: $APP"
          echo "Strategy: $VERSION_STRATEGY"

          # Get current stable version
          get_current_version() {
            local app=$1
            local last_tag=$(git tag -l "${app}-v*" --sort=-version:refname | grep -v "rc\|alpha\|beta" | head -n1)
            if [ -z "$last_tag" ]; then
              echo "0.0.0"
            else
              echo "$last_tag" | sed "s/${app}-v//"
            fi
          }

          # Analyze commits and determine bump type
          analyze_commits() {
            local app=$1
            local base_ref=$2
            
            if [ -n "$base_ref" ]; then
              local commits=$(git log ${base_ref}..HEAD --oneline -- apps/${app}/ 2>/dev/null || echo "")
            else
              local commits=$(git log --oneline -- apps/${app}/ 2>/dev/null || echo "")
            fi
            
            # Skip if no app changes
            if [ -z "$(echo "$commits" | grep -v '^$')" ]; then
              echo "skip"
              return
            fi
            
            # Determine bump type
            if echo "$commits" | grep -q "BREAKING CHANGE\|!:"; then
              echo "major"
            elif echo "$commits" | grep -qE "^[a-f0-9]+ feat(\(.*\))?:"; then
              echo "minor"
            else
              echo "patch"
            fi
          }

          # Calculate next version
          bump_version() {
            local current=$1
            local bump_type=$2
            
            if [ "$current" = "0.0.0" ]; then
              case "$bump_type" in
                major) echo "1.0.0" ;;
                minor) echo "0.1.0" ;;
                *) echo "0.0.1" ;;
              esac
              return
            fi
            
            IFS='.' read -ra parts <<< "$current"
            local major=${parts[0]:-0}
            local minor=${parts[1]:-0}
            local patch=${parts[2]:-0}
            
            case "$bump_type" in
              major)
                echo "$((major + 1)).0.0"
                ;;
              minor)
                echo "${major}.$((minor + 1)).0"
                ;;
              patch)
                echo "${major}.${minor}.$((patch + 1))"
                ;;
            esac
          }

          # Count commits for prerelease numbers
          count_commits() {
            local app=$1
            local base_ref=$2
            local count=$(git rev-list --count HEAD ^${base_ref} -- apps/${app}/ 2>/dev/null || echo "1")
            [ "$count" -eq 0 ] && count=1
            echo "$count"
          }

          # Main version calculation
          CURRENT_VERSION=$(get_current_version "$APP")
          
          case "$VERSION_STRATEGY" in
            alpha)
              BASE_REF=$(git merge-base HEAD origin/develop 2>/dev/null || git merge-base HEAD origin/main 2>/dev/null || echo "HEAD~10")
              BUMP_TYPE=$(analyze_commits "$APP" "$BASE_REF")
              ;;
            beta)
              BASE_REF=$(git merge-base HEAD origin/main 2>/dev/null || git merge-base HEAD origin/master 2>/dev/null || echo "HEAD~10")
              BUMP_TYPE="patch"  # Hotfixes are always patches
              ;;
            rc|stable)
              LAST_TAG=$(git tag -l "${APP}-v*" --sort=-version:refname | grep -v "rc\|alpha\|beta" | head -n1)
              BASE_REF="$LAST_TAG"
              BUMP_TYPE=$(analyze_commits "$APP" "$BASE_REF")
              ;;
          esac

          # Skip if no changes
          if [ "$BUMP_TYPE" = "skip" ]; then
            echo "version=skip" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes detected for $APP"
            exit 0
          fi

          # Calculate base version
          BASE_VERSION=$(bump_version "$CURRENT_VERSION" "$BUMP_TYPE")
          
          # Apply strategy suffix
          case "$VERSION_STRATEGY" in
            alpha)
              NUMBER=$(count_commits "$APP" "$BASE_REF")
              DOCKER_VERSION="${BASE_VERSION}-alpha.${NUMBER}"
              ;;
            beta)
              NUMBER=$(count_commits "$APP" "$BASE_REF")
              DOCKER_VERSION="${BASE_VERSION}-beta.${NUMBER}"
              ;;
            rc)
              NUMBER=$(count_commits "$APP" "$BASE_REF")
              DOCKER_VERSION="${BASE_VERSION}-rc.${NUMBER}"
              ;;
            stable)
              DOCKER_VERSION="$BASE_VERSION"
              ;;
          esac

          echo "version=$DOCKER_VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Generated version for $APP: $DOCKER_VERSION (base: $BASE_VERSION, type: $BUMP_TYPE)"

      # Blog Jekyll site validation
      - name: Set up Ruby
        if: ${{ inputs.app == 'blog' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: './apps/blog/jekyll-site'

      - name: Install dependencies
        if: ${{ inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        run: bundle install

      - name: Build Jekyll site
        if: ${{ inputs.app == 'blog' }}
        working-directory: './apps/blog/jekyll-site'
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      # API
      - name: Set up Go (for api)
        if: ${{ inputs.app == 'api' }}
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
          cache-dependency-path: './apps/api/src/go.sum'

      - name: Build API binary
        if: ${{ inputs.app == 'api' }}
        working-directory: ./apps/api/src
        run: go build -o api-binary ./cmd/server

      # Web
      - name: Set up Node.js (for web)
        if: ${{ inputs.app == 'web' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/web/astro-site/package-lock.json'

      - name: Install dependencies (web)
        if: ${{ inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm ci

      - name: Build Astro site
        if: ${{ inputs.app == 'web' }}
        working-directory: './apps/web/astro-site'
        run: npm run build

      # Wiki
      - name: Set up Python (for wiki)
        if: ${{ inputs.app == 'wiki' }}
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        if: ${{ inputs.app == 'wiki' }}
        run: |
          pip install --upgrade pip
          pip install \
          mkdocs mkdocs-material \
          mkdocs-minify-plugin \
          mkdocs-redirects \
          mkdocs-awesome-pages-plugin \
          mkdocs-include-markdown-plugin \
          mkdocs-glightbox \
          mkdocs-enumerate-headings-plugin \
          mkdocs-macros-plugin \
          mkdocs-section-index

      - name: Install zsh
        if: ${{ inputs.app == 'wiki' }}
        run: sudo apt-get update && sudo apt-get install -y zsh
      
      - name: Build wiki multiversion site
        if: ${{ inputs.app == 'wiki' }}
        run: zsh scripts/wiki.sh sync

      - name: Determine Docker context
        id: context
        run: |
          case "${{ inputs.app }}" in
            blog)
              echo "context=./apps/blog" >> "$GITHUB_OUTPUT"
              ;;
            api)
              echo "context=./apps/api" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "context=./apps/web" >> "$GITHUB_OUTPUT"
              ;;
            wiki)
              echo "context=./apps/wiki" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported app context"
              exit 1
              ;;
          esac

      - name: Log versioning decision
        run: |
          echo "## Docker Versioning Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Type**: ${{ steps.branch_detection.outputs.branch_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: ${{ steps.branch_detection.outputs.version_strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Use SEMVER**: ${{ steps.branch_detection.outputs.use_semver }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Version**: ${{ steps.docker_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: This workflow calculates Docker image versions only. GitHub tags are managed by the global release workflow." >> $GITHUB_STEP_SUMMARY

      - name: Create app-specific tag
        if: steps.docker_version.outputs.version != 'skip' && (steps.branch_detection.outputs.version_strategy == 'stable' || steps.branch_detection.outputs.version_strategy == 'rc')
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ steps.docker_version.outputs.version }}"
          STRATEGY="${{ steps.branch_detection.outputs.version_strategy }}"
          
          APP_TAG="${APP}-v${VERSION}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists
          if git rev-parse "refs/tags/$APP_TAG" >/dev/null 2>&1; then
            echo "::error::App tag $APP_TAG already exists!"
            exit 1
          fi
          
          # Create and push app-specific tag
          git tag "$APP_TAG"
          git push origin "$APP_TAG"
          
          echo "::notice::Successfully created app tag: $APP_TAG"

      - name: Extract short SHA
        id: short_sha
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  call-publish:
    name: Build and Push Docker Image for ${{ inputs.app }}
    needs: app-pipeline
    if: needs.app-pipeline.outputs.docker_version != 'skip'
    uses: ./.github/workflows/ci-03-publish.yml
    with:
      app: ${{ inputs.app }}
      tag: ${{ needs.app-pipeline.outputs.docker_version }}
      sha: ${{ needs.app-pipeline.outputs.sha_short }}
      context: ${{ needs.app-pipeline.outputs.context }}
    secrets: inherit
