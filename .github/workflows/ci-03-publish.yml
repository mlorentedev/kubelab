---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
      context:
        required: true
        type: string

jobs:
  docker-image-publish:
    name: Publish Docker Image for ${{ inputs.app }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags
        id: docker_tags
        run: |
          TAG="${{ inputs.tag }}"
          BASE_TAG=$(echo "$TAG" | cut -d'-' -f1)
          if [[ "${{ github.ref }}" == 'refs/heads/master' || "${{ github.ref }}" == 'refs/heads/develop' ]]; then
            TAGS="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${TAG}"
            TAGS+=",${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:latest"
            TAGS+=",${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${BASE_TAG}"
            echo "tags=$TAGS" >> "$GITHUB_OUTPUT"        
          else
            # Convert pre-release to rc.X
            RC_TAG=$(echo "$TAG" | sed -E 's/-.*\.(.*)$/-rc.\1/')
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${RC_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Image for ${{ inputs.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

      - name: Create deployment bundle
        run: |
          mkdir -p deployment
          cp -r scripts infra deployment/

          for app in apps/*; do
            name=$(basename "$app")
            mkdir -p deployment/$name
            cp -r "$app"/docker-compose.*.yml "$app"/.env.example deployment/$name/ 2>/dev/null || true
          done

          cd deployment
          zip -r ../release-${{ inputs.tag }}.zip .

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: release-${{ inputs.tag }}.zip

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          artifacts: release-${{ inputs.tag }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/hotfix/') }}
          token: ${{ secrets.GITHUB_TOKEN }}

      #- name: Notify via Webhook (optional)
      #  run: |
      #    curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
      #      -d "app=${{ inputs.app }}&version=${{ inputs.tag }}&sha_short=${{ inputs.sha }}"
