---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
      context:
        required: true
        type: string

jobs:
  docker-build-push:
    name: Build & Push ${{ inputs.app }}:${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags and convert pre-release to rc.X
        id: docker_tags
        run: |
          TAG="${{ inputs.tag }}"
          BASE_TAG=$(echo "$TAG" | cut -d'-' -f1)
          if [[ "${{ github.ref }}" == 'refs/heads/master' || "${{ github.ref }}" == 'refs/heads/develop' ]]; then
            TAGS="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${TAG}"
            TAGS+=",${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:latest"
            TAGS+=",${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${BASE_TAG}"
            echo "tags=$TAGS" >> "$GITHUB_OUTPUT"        
          else
            RC_TAG=$(echo "$TAG" | sed -E 's/-.*\.(.*)$/-rc.\1/')
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}:${RC_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=mlorente-${{ inputs.app }}
            org.opencontainers.image.description=${{ inputs.app }} service for mlorente.dev
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  create-deployment-bundle:
    name: Create Deployment Bundle
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create deployment bundle
        run: |
          mkdir -p deployment
          
          if [ -d "scripts" ]; then
            cp -r scripts deployment/
          fi
          if [ -d "infra" ]; then
            cp -r infra deployment/
          fi

          for app in apps/*; do
            if [ -d "$app" ]; then
              name=$(basename "$app")
              mkdir -p "deployment/$name"
              find "$app" -name "docker-compose*.yml" -exec cp {} "deployment/$name/" \; 2>/dev/null || true
              find "$app" -name ".env.example" -exec cp {} "deployment/$name/" \; 2>/dev/null || true
            fi
          done

          cd deployment
          zip -r ../release-${{ inputs.tag }}.zip .
          ls -la ../release-${{ inputs.tag }}.zip

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-${{ inputs.app }}-${{ inputs.tag }}
          path: release-${{ inputs.tag }}.zip
          retention-days: 30
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-build-push, create-deployment-bundle]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-bundle-${{ inputs.app }}-${{ inputs.tag }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          artifacts: release-${{ inputs.tag }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ github.ref != 'refs/heads/master' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: always() && (needs.docker-build-push.result == 'success')
    steps:
      - name: Notify via Webhook
        run: |
          cat <<EOF > payload.json
          {
            "app": "${{ inputs.app }}",
            "tag": "${{ inputs.tag }}",
            "sha": "${{ inputs.sha }}",
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}"
          }
          EOF

          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
            -d @payload.json

