---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
      context:
        required: true
        type: string      

jobs:
  docker-build-push:
    name: Build & Push ${{ inputs.app }}:${{ inputs.tag }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.docker_tags.outputs.actual_tag }}
      registry_url: ${{ steps.docker_tags.outputs.registry }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags and convert pre-release to rc.X
        id: docker_tags
        run: |
          TAG="${{ inputs.tag }}"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}"
          CLEAN_TAG="${TAG#${{ inputs.app }}-}"
          BASE_TAG="${CLEAN_TAG%%-*}"
          if [[ "${{ github.ref }}" =~ ^refs/heads/(master|develop)$ ]]; then
            echo "tags=${REGISTRY}:${CLEAN_TAG},${REGISTRY}:latest" >> "$GITHUB_OUTPUT"
            echo "actual_tag=${CLEAN_TAG}" >> "$GITHUB_OUTPUT"
          else
            RC_TAG="${BASE_TAG}-rc"
            echo "tags=${REGISTRY}:${RC_TAG}" >> "$GITHUB_OUTPUT"
            echo "actual_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=production
          labels: |
            org.opencontainers.image.title=mlorente-${{ inputs.app }}
            org.opencontainers.image.description=${{ inputs.app }} service for mlorente.dev
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Log build success
        run: |
          echo "Successfully built and pushed:"
          echo "   Registry: ${{ steps.docker_tags.outputs.registry }}"
          echo "   Tags: ${{ steps.docker_tags.outputs.tags }}"
          echo "   Final tag: ${{ steps.docker_tags.outputs.actual_tag }}"          

  notify-build-completion:
    name: Notify Build Completion
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: always() && (needs.docker-build-push.result == 'success')
    steps:
      - name: Notify via Webhook
        run: |
          # Create payload for build completion (not release)
          cat <<EOF > payload.json
          {
            "type": "build_completed",
            "app": "${{ inputs.app }}",
            "original_tag": "${{ inputs.tag }}",
            "image_tag": "${{ needs.docker-build-push.outputs.image_tag }}",
            "registry": "${{ needs.docker-build-push.outputs.registry_url }}",
            "sha": "${{ inputs.sha }}",
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          # Send notification with retry logic
          for i in {1..3}; do
            if curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d @payload.json \
              --max-time 30 \
              --retry 2; then
              echo "Build completion notification sent successfully"
              break
            else
              echo "Build notification attempt $i failed, retrying..."
              sleep 5
            fi
          done || echo "All notification attempts failed, but build was successful"
