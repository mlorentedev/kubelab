---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha:
        required: true
        type: string
      context:
        required: true
        type: string

jobs:
  docker-build-push:
    name: Build & Push ${{ inputs.app }}:${{ inputs.tag }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.docker_tags.outputs.actual_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags and convert pre-release to rc.X
        id: docker_tags
        run: |
          TAG="${{ inputs.tag }}"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}"
          CLEAN_TAG=$(echo "$TAG" | sed "s/^${{ inputs.app }}-//")
          BASE_TAG=$(echo "$CLEAN_TAG" | cut -d'-' -f1)
          if [[ "${{ github.ref }}" =~ ^refs/heads/(master|develop)$ ]]; then
            echo "tags=${REGISTRY}:${CLEAN_TAG},${REGISTRY}:latest" >> "$GITHUB_OUTPUT"
            echo "actual_tag=${CLEAN_TAG}" >> "$GITHUB_OUTPUT"
          else
            RC_TAG="${BASE_TAG}-rc"
            echo "tags=${REGISTRY}:${RC_TAG}" >> "$GITHUB_OUTPUT"
            echo "actual_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=production
          labels: |
            org.opencontainers.image.title=mlorente-${{ inputs.app }}
            org.opencontainers.image.description=${{ inputs.app }} service for mlorente.dev
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  create-deployment-bundle:
    name: Create Deployment Bundle
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create deployment bundle
        run: |
          mkdir -p deployment
          
          if [ -d "scripts" ]; then
            cp -r scripts deployment/
          fi
          if [ -d "infra" ]; then
            cp -r infra deployment/
          fi

          for app in apps/*; do
            if [ -d "$app" ]; then
              name=$(basename "$app")
              mkdir -p "deployment/$name"
              find "$app" -name "docker-compose*.yml" -exec cp {} "deployment/$name/" \; 2>/dev/null || true
              find "$app" -name ".env.example" -exec cp {} "deployment/$name/" \; 2>/dev/null || true
            fi
          done

          cd deployment
          zip -r ../release-${{ needs.docker-build-push.outputs.image_tag }}.zip .
          ls -la ../release-${{ needs.docker-build-push.outputs.image_tag }}.zip

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-${{ inputs.app }}-${{ needs.docker-build-push.outputs.image_tag }}
          path: release-${{ needs.docker-build-push.outputs.image_tag }}.zip
          retention-days: 30
          
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-bundle-${{ inputs.app }}-${{ needs.docker-build-push.outputs.image_tag }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.docker-build-push.outputs.image_tag }}
          name: Release ${{ needs.docker-build-push.outputs.image_tag }}
          artifacts: release-${{ needs.docker-build-push.outputs.image_tag }}.zip
          generateReleaseNotes: true
          allowUpdates: true
          prerelease: ${{ !contains(github.ref, 'refs/heads/master') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: always() && (needs.docker-build-push.result == 'success')
    steps:
      - name: Notify via Webhook
        run: |
          # Create payload with proper error handling
          cat <<EOF > payload.json
          {
            "app": "${{ inputs.app }}",
            "original_tag": "${{ inputs.tag }}",
            "tag": "${{ needs.docker-build-push.outputs.image_tag }}",
            "sha": "${{ inputs.sha }}",
            "branch": "${{ github.ref_name }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          # Send notification with retry logic
          for i in {1..3}; do
            if curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d @payload.json \
              --max-time 30 \
              --retry 2; then
              echo "Notification sent successfully"
              break
            else
              echo "Notification attempt $i failed, retrying..."
              sleep 5
            fi
          done || echo "All notification attempts failed, but deployment was successful"

