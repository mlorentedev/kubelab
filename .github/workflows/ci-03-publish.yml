---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      tag:
        required: true
        type: string
        description: "Docker version (e.g., 1.3.0-alpha.123, 1.3.0-rc.45, 1.3.0)"
      sha:
        required: true
        type: string
      context:
        required: true
        type: string       

jobs:
  docker-build-push:
    name: Build & Push ${{ inputs.app }}:${{ inputs.tag }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.docker_tags.outputs.final_tag }}
      registry_url: ${{ steps.docker_tags.outputs.registry }}
      full_image: ${{ steps.docker_tags.outputs.full_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker tags for new versioning system
        id: docker_tags
        run: |          
          DOCKER_VERSION="${{ inputs.tag }}"
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}/mlorente-${{ inputs.app }}"
          BRANCH_NAME="${{ github.ref_name }}"
          
          echo "Processing Docker version: $DOCKER_VERSION"
          echo "Registry: $REGISTRY"
          echo "Branch: $BRANCH_NAME"
          
          # Determine tag strategy based on version format and branch
          case "$DOCKER_VERSION" in
            *-alpha.*)
              # Feature branch: 1.3.0-alpha.123
              FINAL_TAG="$DOCKER_VERSION"
              DOCKER_TAGS="${REGISTRY}:${FINAL_TAG}"
              echo "::notice::Alpha version detected: $FINAL_TAG"
              ;;
            *-beta.*)
              # Hotfix branch: 1.2.6-beta.45  
              FINAL_TAG="$DOCKER_VERSION"
              DOCKER_TAGS="${REGISTRY}:${FINAL_TAG}"
              echo "::notice::Beta version detected: $FINAL_TAG"
              ;;
            *-rc.*)
              # Develop branch: 1.3.0-rc.123
              FINAL_TAG="$DOCKER_VERSION"
              DOCKER_TAGS="${REGISTRY}:${FINAL_TAG}"
              echo "::notice::RC version detected: $FINAL_TAG"
              ;;
            *)
              # Master branch: 1.3.0 (stable)
              FINAL_TAG="$DOCKER_VERSION"
              DOCKER_TAGS="${REGISTRY}:${FINAL_TAG},${REGISTRY}:latest"
              echo "::notice::Stable version detected: $FINAL_TAG"
              ;;
          esac
          
          # Set outputs
          echo "tags=${DOCKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "final_tag=${FINAL_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "full_image=${REGISTRY}:${FINAL_TAG}" >> "$GITHUB_OUTPUT"
          
          echo "::notice::Final Docker tags: $DOCKER_TAGS"

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ./apps/${{ inputs.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=production
            VERSION=${{ inputs.tag }}
            COMMIT_SHA=${{ inputs.sha }}            
          labels: |
            org.opencontainers.image.title=mlorente-${{ inputs.app }}
            org.opencontainers.image.description=${{ inputs.app }} service for mlorente.dev
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Log build success
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ steps.docker_tags.outputs.registry }}" >> $GITHUB_STEP_SUMMARY
          echo "- **All Tags**: ${{ steps.docker_tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Primary Image**: ${{ steps.docker_tags.outputs.full_image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ inputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY  

  notify-build-completion:
    name: Notify Build Completion
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: always() && (needs.docker-build-push.result == 'success')
    steps:
      - name: Notify via Webhook
        run: |
          # Create enhanced payload for build completion
          cat <<EOF > payload.json
          {
            "type": "docker_build_completed",
            "app": "${{ inputs.app }}",
            "docker_version": "${{ inputs.tag }}",
            "full_image": "${{ needs.docker-build-push.outputs.full_image }}",
            "registry": "${{ needs.docker-build-push.outputs.registry_url }}",
            "all_tags": "${{ needs.docker-build-push.outputs.image_tag }}",
            "sha": "${{ inputs.sha }}",
            "branch": "${{ github.ref_name }}",
            "context": "${{ inputs.context }}",
            "status": "success",
            "timestamp": "${{ github.event.head_commit.timestamp }}",
            "build_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          
          # Send notification with retry logic
          for i in {1..3}; do
            if curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.N8N_DEPLOY_TOKEN }}" \
              -d @payload.json \
              --max-time 30 \
              --retry 2; then
              echo "Docker build notification sent successfully"
              break
            else
              echo "Notification attempt $i failed, retrying..."
              sleep 5
            fi
          done || echo "All notification attempts failed, but build was successful"
