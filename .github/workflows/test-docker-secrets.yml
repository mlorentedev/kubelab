---
name: Test Docker Secrets Only

on:
  workflow_dispatch:

jobs:
  test-secrets:
    name: Test Docker Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Debug Docker secrets only
        run: |
          echo "=== SIMPLE SECRET TEST ==="
          echo "Username: '${{ secrets.DOCKERHUB_USERNAME }}'"
          echo "Username length: $( [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && echo "${#{{ secrets.DOCKERHUB_USERNAME }}}" || echo 0 )"
          echo "Token: '${{ secrets.DOCKERHUB_TOKEN }}'"
          echo "Token length: $( [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && echo "${#{{ secrets.DOCKERHUB_TOKEN }}}" || echo 0 )"
          
      - name: Test with environment variables
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "=== ENV VAR TEST ==="
          echo "Username: '$DOCKERHUB_USERNAME'"
          echo "Username length: ${#DOCKERHUB_USERNAME}"
          echo "Username hex:"
          echo -n "$DOCKERHUB_USERNAME" | hexdump -C
          echo "Token: '$DOCKERHUB_TOKEN'"
          echo "Token length: ${#DOCKERHUB_TOKEN}"
          echo "Token hex:"
          echo -n "$DOCKERHUB_TOKEN" | hexdump -C
          
      - name: Simple Docker login test
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "=== SIMPLE LOGIN TEST ==="
          if [ ${#DOCKERHUB_USERNAME} -eq 1 ] && [ ${#DOCKERHUB_TOKEN} -eq 1 ]; then
            echo "❌ Both secrets are 1 char - problem confirmed"
            exit 1
          fi
          
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin