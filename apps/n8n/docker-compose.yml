services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - ./.env
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - proxy

  git_sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.3
    container_name: git_sync
    restart: unless-stopped
    environment:
      GIT_SYNC_REPO: https://github.com/mlorentedev/second-brain.git
      GIT_SYNC_BRANCH: main
      GIT_SYNC_DEPTH: "1"
      GIT_SYNC_PERIOD: 30s
      GIT_SYNC_ROOT: /git
      GIT_SYNC_SINGLE_BRANCH: "true"
    volumes:
      - vault:/git
    networks:
      - proxy

volumes:
  n8n_data:
  vault:

networks:
  proxy:
    external: true