server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  autoindex off;

  add_header X-Served-By "wiki-nginx" always;

  location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|ttf|otf|eot|woff|woff2)$ {
      try_files $uri =404;
      access_log off;
      add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.(?:json|xml|txt|gz)$ {
      try_files $uri =404;
      add_header Cache-Control "public, max-age=300";
  }

  location / {
      try_files $uri $uri/ $uri/index.html =404;
  }

  error_page 403 =404 /404.html;
  location = /404.html { internal; }
}