services:
  wiki:
    image: "${REGISTRY}/${IMAGE_NAME}:${TAG}"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME}
    restart: always
    expose:
      - ${PORT}  
    env_file:
      - ./.env.prod
    networks:
      - proxy      

networks:
  proxy:
    external: true
