site_name: Wiki of mlorente.dev
site_url: http://wiki.mlorente.dev
docs_dir: docs
use_directory_urls: true

nav:
  - Home: index.md
  - Applications:
    - apps/index.md
    - 1.1 API: apps/api/index.md
    - 1.2 Web: apps/web/index.md
    - 1.3 Blog: apps/blog/index.md
    - 1.4 Wiki: apps/wiki/index.md
    - 1.5 Portainer: apps/portainer/index.md
    - 1.6 Grafana: apps/grafana/index.md
    - 1.7 n8n: apps/n8n/index.md
    - 1.8 Uptime Kuma: apps/uptime/index.md
    - 1.9 Loki: apps/loki/index.md
    - 1.10 MinIO: apps/minio/index.md
  - Infrastructure:
    - infra/index.md
    - 2.1 Traefik: infra/traefik/index.md
    - 2.2 Nginx: infra/nginx/index.md
    - 2.3 Ansible: infra/ansible/index.md
  - Scripts:
    - scripts/index.md
  - Guides:
    - guides/index.md
    - 4.1 HOW-TO: guides/HOW-TO/index.md
    - 4.2 Architecture: guides/ARCHITECTURE-AND-DECISIONS/index.md
    - 4.3 CI/CD: guides/CI-CD/index.md
    - 4.4 Deployment: guides/DEPLOYMENT/index.md
    - 4.5 Troubleshooting: guides/TROUBLESHOOTING/index.md
    - 4.6 Contributing: guides/CONTRIBUTING/index.md
    - 4.7 Versioning: guides/VERSIONING/index.md
    - 4.8 CubeLab: guides/CUBELAB/index.md
    - 4.9 Wiki Management: guides/WIKI/index.md
    - 4.10 Makefile: guides/MAKEFILE/index.md

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: default
    primary: teal
    accent: cyan
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

extra_javascript:
  - assets/navigation.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/minimal.css

extra:
  homepage: http://wiki.mlorentedev.test
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mlorente
      name: GitHub Profile
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/manulorente
      name: LinkedIn Profile
    - icon: fontawesome/solid/globe
      link: https://mlorente.dev
      name: Portfolio Website
  version:
    provider: mike
    default: latest
  status:
    new: Recently added
    deprecated: Deprecated

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang: 
        - es
        - en
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true
        reduce_boolean_attributes: true
        remove_optional_attribute_quotes: true
  - include-markdown:
      preserve_includer_indent: true
      dedent: false
      trailing_newlines: true
      comments: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: true
      caption_position: bottom
      background: none
      shadow: true
      manual: false
  - section-index

markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Enlace permanente
  - tables
  - fenced_code
  - admonition
  - footnotes
  - attr_list
  - def_list
  - md_in_html
  - abbr
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
