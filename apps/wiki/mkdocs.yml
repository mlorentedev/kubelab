site_name: "{{ APPS_PLATFORM_WIKI_MKDOCS_SITE_NAME }}"
site_description: "{{ APPS_PLATFORM_WIKI_MKDOCS_SITE_DESCRIPTION }}"
site_author: "{{ APPS_PLATFORM_WIKI_MKDOCS_SITE_AUTHOR }}"
site_url: "{{ APPS_PLATFORM_WIKI_MKDOCS_SITE_URL }}"

repo_name: "{{ APPS_PLATFORM_WIKI_MKDOCS_REPO_NAME }}"
repo_url: "{{ APPS_PLATFORM_WIKI_MKDOCS_REPO_URL }}"
edit_uri: "{{ APPS_PLATFORM_WIKI_MKDOCS_EDIT_URI }}"

# Copyright footer
copyright: "{{ APPS_PLATFORM_WIKI_MKDOCS_COPYRIGHT }}"

theme:
  name: material
  custom_dir: generated_docs/overrides

  # Branding
  logo: "{{ APPS_PLATFORM_WIKI_MKDOCS_LOGO_PATH }}"
  favicon: "{{ APPS_PLATFORM_WIKI_MKDOCS_FAVICON_PATH }}"

  # Color Palette (Dark/Light toggle)
  palette:
    # Dark mode (Default)
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  # Typography (Matching Web App)
  font:
    text: Roboto
    code: JetBrains Mono

  # User Interface Features
  features:
    - navigation.instant      # SPA-like feeling (no reload)
    - navigation.tracking     # Update URL on scroll
    - navigation.tabs         # Top level tabs
    - navigation.tabs.sticky  # Tabs stay visible
    - navigation.sections     # Collapsible sections
    - navigation.expand       # Expand menu
    - navigation.top          # Back to top button
    - navigation.path         # Breadcrumbs
    - navigation.footer       # Next/Prev links
    - search.suggest          # Search autocomplete
    - search.highlight        # Highlight search results
    - search.share            # Share search results
    - content.code.copy       # Copy code button
    - content.action.edit     # Edit on GitHub button
    - content.action.view     # View on GitHub button

# Plugins
plugins:
  - search
  # - glightbox:                # Image zooming
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  # - minify:                   # Minify HTML/JS/CSS
  #     minify_html: true
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: timeago

# Markdown Extensions
markdown_extensions:
  # Standard
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions (pymdownx)
  # - pymdownx.arithmatex:      # Math support (LaTeX)
  #     generic: true
  # - pymdownx.betterem:        # Better bold/italic
  #     smart_enable: all
  # - pymdownx.caret
  # - pymdownx.details          # Collapsible details/summaries
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  # - pymdownx.highlight:       # Syntax highlighting
  #     anchor_linenums: true
  #     line_spans: __span
  #     pygments_lang_class: true
  # - pymdownx.inlinehilite
  # - pymdownx.keys
  # - pymdownx.mark
  # - pymdownx.smartsymbols
  # - pymdownx.snippets         # Embed files
  - pymdownx.superfences:     # Mermaid & nested blocks
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:          # Tabs
      alternate_style: true
  # - pymdownx.tasklist:
  #     custom_checkbox: true
  # - pymdownx.tilde

# Extra CSS/JS (Generated/Copied by Toolkit)
extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js
