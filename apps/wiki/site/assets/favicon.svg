<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favicon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006064"/>
      <stop offset="50%" style="stop-color:#008099"/>
      <stop offset="100%" style="stop-color:#00acc1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#favicon-gradient)"/>
  
  <!-- Simple book icon -->
  <g fill="white">
    <rect x="8" y="6" width="16" height="20" rx="1.5" fill="white" opacity="0.95"/>
    <rect x="8" y="6" width="2.5" height="20" rx="1" fill="white"/>
    <line x1="12" y1="12" x2="20" y2="12" stroke="#006064" stroke-width="1" opacity="0.8"/>
    <line x1="12" y1="16" x2="20" y2="16" stroke="#006064" stroke-width="1" opacity="0.8"/>
    <line x1="12" y1="20" x2="18" y2="20" stroke="#006064" stroke-width="1" opacity="0.8"/>
  </g>
</svg>