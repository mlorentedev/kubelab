<!doctype html>
<html lang="es" class="no-js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="{{SECTION_DESCRIPTION}}">
  <title>{{SECTION_TITLE}} • mlorente.dev Wiki</title>
  <link rel="canonical" href="/{{BRANCH_SLUG}}/{{SECTION_PATH}}/">
  
  <!-- Material-UI Stylesheets (matching main wiki) -->
  <link rel="stylesheet" href="../assets/stylesheets/main.7e37652d.min.css">
  <link rel="stylesheet" href="../assets/stylesheets/palette.06af60db.min.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,300i,400,400i,700,700i%7CJetBrains+Mono:400,400i,700,700i&display=fallback">
  
  <!-- Wiki custom styles -->
  <link rel="stylesheet" href="../assets/branch-switcher.css">
  <link rel="stylesheet" href="../assets/extra.css">
  <link rel="icon" href="../assets/favicon.svg">
  
  <style>:root{--md-text-font:"Inter";--md-code-font:"JetBrains Mono"}</style>
  
  <!-- Branch data and switcher -->
  <script>__md_scope=new URL(".",location),__md_hash=e=>[...e].reduce(((e,_)=>(e<<5)-e+_.charCodeAt(0)),0),__md_get=(e,_=localStorage,t=__md_scope)=>JSON.parse(_.getItem(t.pathname+"."+e)),__md_set=(e,_,t=localStorage,a=__md_scope)=>{try{t.setItem(a.pathname+"."+e,JSON.stringify(_))}catch(e){}}</script>
</head>
<body dir="ltr" data-md-color-scheme="default" data-md-color-primary="teal" data-md-color-accent="cyan">

<!-- Mobile drawer toggle -->
<input class="md-toggle" data-md-toggle="drawer" type="checkbox" id="__drawer" autocomplete="off">
<input class="md-toggle" data-md-toggle="search" type="checkbox" id="__search" autocomplete="off">
<label class="md-overlay" for="__drawer"></label>

<!-- Header matching main wiki -->
<header class="md-header md-header--shadow md-header--lifted" data-md-component="header">
  <nav class="md-header__inner md-grid" aria-label="Cabecera">
    <a href="/{{BRANCH_SLUG}}/" title="mlorente.dev Wiki" class="md-header__button md-logo" aria-label="mlorente.dev Wiki">
      <img src="../assets/logo.svg" alt="logo">
    </a>
    
    <label class="md-header__button md-icon" for="__drawer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/>
      </svg>
    </label>
    
    <div class="md-header__title" data-md-component="header-title">
      <div class="md-header__ellipsis">
        <div class="md-header__topic">
          <span class="md-ellipsis">mlorente.dev Wiki</span>
        </div>
        <div class="md-header__topic">
          <span class="md-ellipsis">{{SECTION_TITLE}}</span>
        </div>
      </div>
    </div>
    
    <!-- Branch switcher will be injected here -->
    <div class="md-header__options"></div>
  </nav>
  
</header>

<div class="md-container" data-md-component="container">
  <main class="md-main" data-md-component="main">
    <div class="md-main__inner md-grid">
      
      <!-- Navigation sidebar -->
      <div class="md-sidebar md-sidebar--primary" data-md-component="sidebar" data-md-type="navigation">
        <div class="md-sidebar__scrollwrap">
          <div class="md-sidebar__inner">
            <nav class="md-nav md-nav--primary md-nav--lifted" aria-label="Navegación" data-md-level="0">
              <label class="md-nav__title" for="__drawer">
                <a href="/{{BRANCH_SLUG}}/" title="mlorente.dev Wiki" class="md-nav__button md-logo" aria-label="mlorente.dev Wiki" data-md-component="logo">
                  <img src="../assets/logo.svg" alt="logo">
                </a>
                mlorente.dev Wiki
              </label>
              <ul class="md-nav__list" data-md-scrollfix>
                <li class="md-nav__item">
                  <a href="/{{BRANCH_SLUG}}/" class="md-nav__link">
                    <span class="md-ellipsis">mlorente.dev - Documentación Técnica</span>
                  </a>
                </li>
                <li class="md-nav__item md-nav__item--nested {{APPS_ACTIVE}}">
                  <div class="md-nav__link md-nav__container">
                    <a href="/{{BRANCH_SLUG}}/apps/" class="md-nav__link">
                      <span class="md-ellipsis">1. Aplicaciones</span>
                    </a>
                  </div>
                </li>
                <li class="md-nav__item md-nav__item--nested {{INFRA_ACTIVE}}">
                  <div class="md-nav__link md-nav__container">
                    <a href="/{{BRANCH_SLUG}}/infra/" class="md-nav__link">
                      <span class="md-ellipsis">2. Infraestructura</span>
                    </a>
                  </div>
                </li>
                <li class="md-nav__item {{SCRIPTS_ACTIVE}}">
                  <a href="/{{BRANCH_SLUG}}/scripts/" class="md-nav__link">
                    <span class="md-ellipsis">3. Scripts</span>
                  </a>
                </li>
                <li class="md-nav__item md-nav__item--nested {{GUIDES_ACTIVE}}">
                  <div class="md-nav__link md-nav__container">
                    <a href="/{{BRANCH_SLUG}}/guides/" class="md-nav__link">
                      <span class="md-ellipsis">4. Guías</span>
                    </a>
                  </div>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>

      <!-- Main content -->
      <div class="md-content" data-md-component="content">
        <article class="md-content__inner md-typeset">
          
          <!-- Page title and description -->
          <h1 id="{{SECTION_PATH}}">{{SECTION_ICON}} {{SECTION_TITLE}}</h1>
          <p><strong>{{SECTION_DESCRIPTION}}</strong></p>
          <hr>
          
          <!-- Content -->
          {{CONTENT_PLACEHOLDER}}
          
        </article>
      </div>
      
    </div>
  </main>
</div>

<!-- Footer matching main wiki -->
<footer class="md-footer">
  <div class="md-footer-meta md-typeset">
    <div class="md-footer-meta__inner">
      <div>© mlorente.dev Wiki • Rama: {{BRANCH_SLUG}}</div>
    </div>
  </div>
</footer>

<!-- Scripts matching main wiki -->
<script src="../assets/javascripts/bundle.92b07e13.min.js"></script>
<script src="../assets/branch-data.js"></script>
<script src="../assets/branch-switcher.js"></script>


</body>
</html>
