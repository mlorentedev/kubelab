services:
  minio:
    image: minio/minio:latest
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    env_file:
      - ./.env.dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - minio_data:/data
    networks:
      - proxy

volumes:
  minio_data:

networks:
  proxy:
    external: true
