services:
  web:
    image: "${REGISTRY}/${IMAGE_NAME}:${TAG}"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME}
    restart: always
    expose:
      - ${PORT}  
    env_file:
      - ./.env
    volumes:
      - ./astro-site:/app
      - .env:/app/.env
    user: "0:0"      
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"] 
    networks:
      - proxy
      
networks:
  proxy:
    external: true
