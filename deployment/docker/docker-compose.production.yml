services:
  jekyll-production:
    image: "${DOCKERHUB_USERNAME}/${ARTIFACT_NAME}:production-latest"
    container_name: jekyll-production
    restart: always
    expose:
      - "4000"
    env_file:
      - .env   
    labels:
      - "traefik.enable=false" # Disable Traefik for this service by default
      - "traefik.http.routers.jekyll-production.rule=Host(`${PRODUCTION_DOMAIN}`)"
      - "traefik.http.routers.jekyll-production.entrypoints=websecure"
      - "traefik.http.routers.jekyll-production.tls.certresolver=myresolver"
      - "traefik.http.services.jekyll-production.loadbalancer.server.port=4000"
    networks:
      - traefik_network

networks:
  traefik_network:
    name: traefik_network
    external: true
