services:
  jekyll-staging:
    image: "${DOCKERHUB_USERNAME}/${ARTIFACT_NAME}:staging-latest"
    container_name: jekyll-staging
    restart: always
    expose:
      - "4000"
    env_file:
      - .env   
    labels:
      - "traefik.enable=false" # Disable Traefik for this service by default
      - "traefik.http.routers.jekyll-staging.rule=Host(`${STAGING_DOMAIN}`)"
      - "traefik.http.routers.jekyll-staging.entrypoints=websecure"
      - "traefik.http.routers.jekyll-staging.tls.certresolver=myresolver"
      - "traefik.http.services.jekyll-staging.loadbalancer.server.port=4000"   
    networks:
      - traefik_network

networks:
  traefik_network:
    name: traefik_network
    external: true
