http:
  routers:
    traefik-dashboard:
      rule: "Host(`{{TRAEFIK_DASHBOARD_HOST}}`)"
      entryPoints:
        - {{TRAEFIK_DASHBOARD_ENTRYPOINT}}
      service: api@internal
      tls:
        certResolver: {{CERT_RESOLVER}}
      middlewares:
        - '{{TRAEFIK_DASHBOARD_AUTH_MIDDLEWARE}}'
        - '{{TRAEFIK_DASHBOARD_SECURITY_MIDDLEWARE}}'