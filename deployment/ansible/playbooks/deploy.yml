---
- name: Deploy application
  hosts: "{{ env }}"
  become: false
  vars:
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
    backup_dir: "{{ deploy_path }}/backups/{{ timestamp }}"
    traefik_path: "/opt/traefik"
    compose_path: "{{ deploy_path }}/docker-compose"
    project_root: "{{ playbook_dir | dirname | dirname }}"
    docker_files: "{{ project_root }}/docker"
    traefik_files: "{{ project_root }}/traefik"
    compose_file: "docker-compose.{{ env }}.yml"

  tasks:
    - name: Debug project paths
      debug:
        msg:
          - "Project Root: {{ project_root }}"
          - "Docker Files: {{ docker_files }}"
          - "Traefik Files: {{ traefik_files }}"
          - "Playbook Dir: {{ playbook_dir }}"
          - "Deploy Path: {{ deploy_path }}"
          - "Domain: {{ domain }}"
          - "Environment: {{ env }}"
          - "Compose File: {{ compose_file }}"          
      run_once: true

    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Backup existing docker-compose directory (if present)
      copy:
        src: "{{ compose_path }}/"
        dest: "{{ backup_dir }}/docker-compose/"
        remote_src: yes
      ignore_errors: true

    - name: Backup existing traefik directory (if present)
      copy:
        src: "{{ traefik_path }}/"
        dest: "{{ backup_dir }}/traefik/"
        remote_src: yes
      ignore_errors: true

    - name: Ensure docker-compose directory exists
      file:
        path: "{{ compose_path }}"
        state: directory
        mode: '0755'

    - name: Ensure traefik directory exists
      file:
        path: "{{ traefik_path }}"
        state: directory
        mode: '0755'

    - name: Check if environment-specific compose file exists
      stat:
        path: "{{ docker_files }}/{{ compose_file }}"
      register: compose_file_stat
      delegate_to: localhost

    - name: Fail if compose file doesn't exist
      fail:
        msg: "Docker compose file {{ compose_file }} not found in {{ docker_files }}/"
      when: not compose_file_stat.stat.exists

    - name: Copy environment-specific docker-compose file only
      copy:
        src: "{{ docker_files }}/{{ compose_file }}"
        dest: "{{ compose_path }}/{{ compose_file }}"
        force: yes
        mode: '0644'

    - name: Ensure traefik subdirectories exist
      file:
        path: "{{ traefik_path }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "dynamic_conf"
        - "logs"

    - name: Copy dynamic_conf directory (overwrite always)
      copy:
        src: "{{ traefik_files }}/dynamic_conf/"
        dest: "{{ traefik_path }}/dynamic_conf/"
        force: yes
        mode: '0644'

    - name: Copy traefik.yml (overwrite always)
      copy:
        src: "{{ traefik_files }}/traefik.yml"
        dest: "{{ traefik_path }}/traefik.yml"
        force: yes
        mode: '0644'

    - name: Copy docker-compose.traefik.yml (overwrite always)
      copy:
        src: "{{ traefik_files }}/docker-compose.traefik.yml"
        dest: "{{ traefik_path }}/docker-compose.traefik.yml"
        force: yes
        mode: '0644'

    - name: Ensure acme.json exists with correct permissions
      file:
        path: "{{ traefik_path }}/acme.json"
        state: touch
        mode: '0600'

    - name: Copy .env file to remote folders
      copy:
        src: "{{ docker_files }}/.env"
        dest: "{{ item }}"
        force: yes
        mode: '0644'
      loop:
        - "{{ traefik_path }}/.env"
        - "{{ compose_path }}/.env"
      ignore_errors: true

    - name: Stop and remove existing application containers
      docker_compose:
        project_src: "{{ compose_path }}/"
        files:
          - "docker-compose.{{ env }}.yml"
        state: absent
      ignore_errors: true

    - name: Stop and remove existing Traefik container
      docker_compose:
        project_src: "{{ traefik_path }}/"
        files:
          - "docker-compose.traefik.yml"
        state: absent
      ignore_errors: true

    - name: Deploy Traefik
      docker_compose:
        project_src: "{{ traefik_path }}/"
        files:
          - "docker-compose.traefik.yml"
      environment:
        DOMAIN: "{{ domain }}"
        TRAEFIK_USERS: "{{ traefik_users }}"

    - name: Deploy application containers
      docker_compose:
        project_src: "{{ compose_path }}/"
        files:
          - "docker-compose.{{ env }}.yml"
      environment:
        DOMAIN: "{{ domain }}"

    - name: Wait for services to be ready
      pause:
        seconds: 10

    - name: Check container status
      shell: docker ps | grep jekyll-{{ env }}
      register: container_status
      failed_when: container_status.rc != 0

    - name: Deployment finished successfully
      debug:
        msg: "Deployment to {{ env }} successful!"
