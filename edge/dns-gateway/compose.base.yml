services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "80:80/tcp"
    volumes:
      - pihole_data:/etc/pihole
      - ./pihole-forwarding.conf:/etc/dnsmasq.d/pihole-forwarding.conf:ro
    environment:
      - TZ=America/Denver
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "localhost", "+short"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  coredns:
    container_name: coredns
    image: coredns/coredns:1.12.1
    restart: unless-stopped
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
    command: ["-conf", "/etc/coredns/Corefile"]
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "-p", "53", "status.kubelab.live", "+short"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pihole_data:
