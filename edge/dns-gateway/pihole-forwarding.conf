# Pi-hole conditional forwarding to CoreDNS
# Deployed to /etc/dnsmasq.d/ on RPi4 (kubelab-rpi4)
#
# All *.kubelab.live queries → CoreDNS on host port 5353
# Uses Docker bridge gateway (not 127.0.0.1 — Pi-hole runs in Docker)
# Covers both *.staging.kubelab.live and bare-metal *.kubelab.live
server=/kubelab.live/172.17.0.1#5353
