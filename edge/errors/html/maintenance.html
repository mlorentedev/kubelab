<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Roboto',system-ui,-apple-system,sans-serif;background:#fff;color:#0f1219;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
        .bar{position:fixed;top:0;left:0;right:0;height:4px;background:#0e7490}
        .container{max-width:540px;padding:2rem}
        .icon{font-size:5rem;line-height:1;margin-bottom:1rem}
        h1{font-size:1.75rem;font-weight:700;color:#0e7490;margin-bottom:.75rem}
        p{color:#64748b;font-size:1.125rem;line-height:1.6;margin-bottom:.5rem}
        .subtle{color:#94a3b8;font-size:.875rem;margin-top:1.5rem}
        @media(max-width:640px){.icon{font-size:3.5rem}h1{font-size:1.5rem}}
    </style>
</head>
<body>
    <div class="bar"></div>
    <div class="container">
        <div class="icon">&#9881;</div>
        <h1>Be right back</h1>
        <p>Working on some improvements. Won't take long.</p>
        <p class="subtle">If something looks off, shoot me an email.</p>
    </div>
</body>
</html>
