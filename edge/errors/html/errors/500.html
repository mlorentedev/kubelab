<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Roboto',system-ui,sans-serif;background:#fff;color:#0f1219;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
        .bar{position:fixed;top:0;left:0;right:0;height:4px;background:#0e7490}
        .container{max-width:540px;padding:2rem}
        .code{font-size:8rem;font-weight:900;color:#0e7490;line-height:1;letter-spacing:-.04em}
        p{color:#64748b;font-size:1.125rem;line-height:1.6;margin-top:1rem}
        @media(max-width:640px){.code{font-size:5rem}}
    </style>
</head>
<body>
    <div class="bar"></div>
    <div class="container">
        <div class="code">500</div>
        <img src="/errors/404-southpark.webp" alt="Move along, nothing to see here" style="max-width:320px;margin:1rem auto;display:block;border-radius:.5rem">
        <p>Algo salió mal. Estamos en ello.</p>
    </div>
</body>
</html>
