<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Error interno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Roboto',system-ui,-apple-system,sans-serif;background:#fff;color:#0f1219;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
        .bar{position:fixed;top:0;left:0;right:0;height:4px;background:#0e7490}
        .container{max-width:540px;padding:2rem}
        .code{font-size:8rem;font-weight:900;color:#0e7490;line-height:1;letter-spacing:-.04em}
        h1{font-size:1.5rem;font-weight:700;margin:1rem 0 .75rem}
        p{color:#64748b;font-size:1.125rem;line-height:1.6;margin-bottom:2rem}
        .btn{display:inline-block;padding:.75rem 2rem;background:#0f1219;color:#fff;text-decoration:none;border-radius:.5rem;font-family:'Roboto',sans-serif;font-weight:500;font-size:.875rem;transition:background .2s}
        .btn:hover{background:#1e293b}
        @media(max-width:640px){.code{font-size:5rem}h1{font-size:1.25rem}}
    </style>
</head>
<body>
    <div class="bar"></div>
    <div class="container">
        <div class="code">500</div>
        <h1>Error interno</h1>
        <p>Algo salió mal. Estamos trabajando para solucionarlo.</p>
        <a href="/" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
