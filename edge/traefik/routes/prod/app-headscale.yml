# Headscale control plane — TCP passthrough (Noise protocol needs end-to-end TLS)
# Ref: apps/web/site/src/content/notes/headscale-self-hosted-tailscale.mdx
# Deploy: make deploy-traefik-vps
# NOTE: /health endpoint not accessible through TCP passthrough — monitor via docker healthcheck
tcp:
  routers:
    headscale:
      rule: "HostSNI(`vpn.kubelab.live`)"
      entryPoints:
        - websecure
      service: headscale-tcp
      tls:
        passthrough: true

  services:
    headscale-tcp:
      loadBalancer:
        servers:
          - address: "headscale:8080"
