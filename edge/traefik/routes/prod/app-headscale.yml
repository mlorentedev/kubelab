# Headscale control plane — HTTP proxy (Traefik terminates TLS)
# Headscale v0.28 docs: TLS delegated to reverse proxy, Noise over HTTP/WebSocket
# Ref: https://headscale.net/0.28.0/ref/integration/reverse-proxy
# Deploy: make deploy-traefik-vps
# Health: https://vpn.kubelab.live/health
# Rollback: change http→tcp, add tls.passthrough, address instead of url
http:
  routers:
    headscale:
      rule: "Host(`vpn.kubelab.live`)"
      entryPoints:
        - websecure
      service: headscale
      tls:
        certResolver: letsencrypt

  services:
    headscale:
      loadBalancer:
        servers:
          - url: "http://headscale:8080"
