# Uptime Kuma status page — proxied from VPS to RPi3 via Tailscale
# Deploy: scp to VPS /opt/traefik/dynamic/app-status.yml
# Requires: Cloudflare A record status.kubelab.live → 162.55.57.175
http:
  routers:
    status:
      rule: "Host(`status.kubelab.live`)"
      entryPoints:
        - websecure
      service: status
      tls:
        certResolver: letsencrypt

  services:
    status:
      loadBalancer:
        servers:
          - url: "http://100.64.0.6:3001"
