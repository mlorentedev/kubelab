# ==========================================================================
# STAGING SETTINGS
# ==========================================================================
environment: staging
global:
  base_domain: staging.cubelab.cloud
  restart_policy: unless-stopped

# ==========================================================================
# RUNTIME
# ==========================================================================
log_level: DEBUG
debug_mode: true

# ==========================================================================
# PROTOCOLS & NETWORKING
# ==========================================================================
protocol: https

# ==========================================================================
# SERVICE DISCOVERY (Internal endpoints)
# ==========================================================================
endpoints:
  api: http://api:8080

# ==========================================================================
# EDGE SETTINGS
# ==========================================================================
edge:
  traefik:
    domain: staging.traefik.cubelab.cloud
    disable_https: false
    acme_server: https://acme-v02.api.letsencrypt.org/directory

  nginx:
    domain: staging.errors.cubelab.cloud

  cloudflared:
    enabled: true

# ==========================================================================
# APPS SETTINGS
# ==========================================================================
apps:
  # Platform applications (custom-built)
  platform:
    api:
      domain: staging.api.cubelab.cloud
      site_domain: staging.cubelab.cloud
      site_url: https://staging.cubelab.cloud
      email_secure: true

    web:
      backend_url: "https://staging.api.cubelab.cloud"
      allowed_hosts: "localhost,web,127.0.0.1,.cubelab.cloud,cubelab.cloud"
      domain: staging.cubelab.cloud
      site_domain: staging.cubelab.cloud
      site_url: http://staging.cubelab.cloud
      enable_blog: false
      enable_homelabs: false
      enable_contact: false

  # Third-party services
  services:
    core:
      portainer:
        domain: staging.portainer.cubelab.cloud

    observability:
      loki:
        domain: staging.loki.cubelab.cloud

      uptime_kuma:
        domain: staging.status.cubelab.cloud

      grafana:
        domain: staging.grafana.cubelab.cloud
