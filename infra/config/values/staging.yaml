# ==========================================================================
# STAGING SETTINGS
# ==========================================================================
environment: staging
global:
  base_domain: staging.cubelab.cloud
  restart_policy: unless-stopped

# ==========================================================================
# RUNTIME
# ==========================================================================
log_level: DEBUG
debug_mode: true

# ==========================================================================
# PROTOCOLS & NETWORKING
# ==========================================================================
protocol: https

# ==========================================================================
# SERVICE DISCOVERY (Internal endpoints)
# ==========================================================================
endpoints:
  api: http://api:8080

# ==========================================================================
# EDGE SETTINGS
# ==========================================================================
edge:
  traefik:
    domain: traefik.staging.cubelab.cloud
    disable_https: false
    acme_server: https://acme-v02.api.letsencrypt.org/directory

  nginx:
    domain: errors.staging.cubelab.cloud

  cloudflared:
    enabled: false  # Tailscale replaces cloudflared for staging access

# ==========================================================================
# APPS SETTINGS
# ==========================================================================
apps:
  # Platform applications (custom-built)
  platform:
    api:
      domain: api.staging.cubelab.cloud
      site_domain: staging.cubelab.cloud
      site_url: https://staging.cubelab.cloud
      email_secure: true

    web:
      backend_url: "https://api.staging.cubelab.cloud"
      allowed_hosts: "localhost,web,127.0.0.1,.staging.cubelab.cloud"
      domain: web.staging.cubelab.cloud
      site_domain: staging.cubelab.cloud
      site_url: https://web.staging.cubelab.cloud
      enable_blog: false
      enable_homelabs: false
      enable_contact: false

  # Third-party services
  services:
    core:
      portainer:
        domain: portainer.staging.cubelab.cloud

    observability:
      loki:
        domain: loki.staging.cubelab.cloud

      uptime_kuma:
        domain: status.staging.cubelab.cloud

      grafana:
        domain: grafana.staging.cubelab.cloud

    security:
      authelia:
        domain: auth.staging.cubelab.cloud
        issuer_domain: staging.cubelab.cloud
        default_domain_root: staging.cubelab.cloud

      crowdsec:
        domain: crowdsec.staging.cubelab.cloud

    data:
      minio:
        domain: minio.staging.cubelab.cloud
        console_domain: console.minio.staging.cubelab.cloud
