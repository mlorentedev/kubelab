# ==========================================================================
# STAGING SETTINGS
# ==========================================================================
environment: staging
global:
  base_domain: staging.kubelab.live
  restart_policy: unless-stopped
# ==========================================================================
# RUNTIME
# ==========================================================================
log_level: DEBUG
debug_mode: true
# ==========================================================================
# PROTOCOLS & NETWORKING
# ==========================================================================
protocol: https
# ==========================================================================
# SERVICE DISCOVERY (Internal endpoints)
# ==========================================================================
endpoints:
  api: http://api:8080
# ==========================================================================
# EDGE SETTINGS
# ==========================================================================
edge:
  traefik:
    domain: traefik.staging.kubelab.live
    disable_https: false
    acme_server: https://acme-v02.api.letsencrypt.org/directory
  nginx:
    domain: errors.staging.kubelab.live
  cloudflared:
    enabled: false  # Tailscale replaces cloudflared for staging access
# ==========================================================================
# APPS SETTINGS
# ==========================================================================
apps:
  # Platform applications (custom-built)
  platform:
    api:
      domain: api.staging.kubelab.live
      site_domain: staging.kubelab.live
      site_url: https://staging.kubelab.live
      email_secure: true
    web:
      backend_url: "https://api.staging.kubelab.live"
      allowed_hosts: "localhost,web,127.0.0.1,.staging.kubelab.live,.staging.mlorente.dev"
      domain: staging.mlorente.dev
      site_domain: staging.mlorente.dev
      site_url: https://staging.mlorente.dev
      enable_blog: false
      enable_homelabs: false
      enable_contact: false
  # Third-party services
  services:
    core:
      # portainer: removed (PROD-K3S-000f, 2026-03-21)

      gitea:
        domain: gitea.staging.kubelab.live

      n8n:
        domain: n8n.staging.kubelab.live

    observability:
      loki:
        domain: loki.staging.kubelab.live
      uptime_kuma:
        domain: status.staging.kubelab.live
      grafana:
        domain: grafana.staging.kubelab.live
    security:
      authelia:
        domain: auth.staging.kubelab.live
        issuer_domain: staging.kubelab.live
        default_domain_root: staging.kubelab.live
        disable_require_tls: false
      crowdsec:
        domain: crowdsec.staging.kubelab.live
    ai:
      ollama:
        domain: ollama.staging.kubelab.live
    data:
      minio:
        domain: minio.staging.kubelab.live
        console_domain: console.minio.staging.kubelab.live
  web:
    version: 0.0.0-rc.0
  api:
    version: 0.0.0-rc.0
