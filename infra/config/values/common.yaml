# ==========================================================================
# GLOBAL SETTINGS
# ==========================================================================
project_name: kubelab
log_format: json

global:
  timezone: Europe/Madrid
  restart_policy: unless-stopped
  base_domain: kubelab.live

# ===========================================================================
# NETWORKING & VPN
# ===========================================================================
# Single source of truth for all network addresses.
# All consumers (K8s manifests, Ansible, Corefile, tests, toolkit)
# should reference these values — never hardcode IPs elsewhere.
networking:
  lan_cidr: "172.16.1.0/24"
  tailscale_cidr: "100.64.0.0/10"
  # Staging DNS zones — resolved via Headscale split DNS → RPi4 CoreDNS → K3s
  # Add new domains here; deploy-vps, Corefile, and Pi-hole all consume this list.
  staging_zones:
    - "staging.kubelab.live"
    - "staging.mlorente.dev"
  ipv6_prefix: "fd7a:115c:a1e0::/48"
  ssh_key: "~/.ssh/id_ed25519"
  vps:
    hostname: "kubelab-vps"
    public_ip: "162.55.57.175"
    tailscale_ip: "100.64.0.2"
    ssh_user: "deployer"
    ansible_groups: ["vps", "docker_hosts"]  # prod.yaml adds k3s_servers
    docker_network: "kubelab"  # Migrated from "proxy" by traefik_vps role (ADR-020 Phase 2b)
    backup:
      root: "/opt/backups"
      retention: 3
      filesystem_paths:
        - "/opt/traefik"
        - "/opt/headscale"
      exclude_volumes:
        - "jekyll-staging-data"
        - "jekyll-staging-site-data"
  nodes:
    # ADR-023 Phase 1: bare metal MiniPCs replace Proxmox VMs
    # Old k3s_server (.10), k3s_agent_1 (.11), k3s_agent_2 (.12) removed
    ace1:
      hostname: "ace1"
      tailscale_ip: "100.64.0.11"
      lan_ip: "172.16.1.2"
      lan_interface: "enp1s0"
      ssh_user: "manu"
      ansible_groups: ["k3s_servers", "docker_hosts", "minipc"]
    ace2:
      hostname: "ace2"
      tailscale_ip: "100.64.0.5"
      lan_ip: "172.16.1.5"
      lan_interface: "enp1s0"
      ssh_user: "manu"
      ansible_groups: ["platform_nodes", "docker_hosts", "minipc"]
    rpi4:
      hostname: "rpi4"
      tailscale_ip: "100.64.0.10"
      lan_ip: "172.16.1.1"
      ssh_user: "manu"
      ansible_groups: ["gateway", "dns_hosts", "docker_hosts"]
    rpi3:
      hostname: "rpi3"
      tailscale_ip: "100.64.0.6"
      ssh_user: "manu"
      ansible_groups: ["monitoring", "docker_hosts"]
    beelink:
      hostname: "beelink"
      tailscale_ip: "100.64.0.3"
      lan_ip: "172.16.1.3"
      ssh_user: "manu"
      ansible_groups: ["compute", "docker_hosts"]
    jetson:
      hostname: "jetson"
      tailscale_ip: "100.64.0.8"
      lan_ip: "172.16.1.4"
      ssh_user: "manu"
      ansible_groups: ["compute"]
      legacy_python: true

# ===========================================================================
# INFRASTRUCTURE & DOCKER
# ===========================================================================
registry: docker.io/mlorentedev
network_name: kubelab
python_version: "3.12"

resources:
  default_memory_limit: 512m
  default_memory_reservation: 256m
  default_cpu_limit: 0.5
  default_cpu_reservation: 0.25

# ===========================================================================
# HEALTHCHECK DEFAULTS
# ===========================================================================
healthcheck:
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 10s

# ===========================================================================
# DEPLOY STRATEGY
# ===========================================================================
deploy:
  update_order: start-first
  update_failure_action: rollback
  update_delay: 5s
  rollback_parallelism: 1
  rollback_delay: 5s

# ===========================================================================
# K3S CLUSTER
# ===========================================================================
k3s:
  version: "v1.34.4+k3s1"
  api_port: 6443
  install_script_url: "https://get.k3s.io"
  traefik:
    http_port: 80
    https_port: 443

# ===========================================================================
# EDGE SERVICES (Reverse Proxy, Gateway, CDN)
# ===========================================================================
edge:
  errors:
    name: errors
    image_name: kubelab-errors
    version: "1.1.1"
    port: 8080
    health_path: /health
    resources:
      cpu_limit: "0.25"
      memory_limit: 128M
      cpu_reservation: "0.1"
      memory_reservation: 64M

  traefik:
    name: traefik
    image: traefik:v3.6
    dashboard_port: 8080
    health_path: /ping
    # Core
    entrypoint: websecure
    insecure: false
    dashboard: true
    dashboard_auth_middleware: authelia@file
    dashboard_security_middleware: secure-headers@file
    # Docker provider
    docker_endpoint: unix:///var/run/docker.sock
    docker_exposed_by_default: false
    watch_dynamic_conf: true
    # SSL certificates
    use_local_certs: false
    cert_resolver: letsencrypt
    acme_email: mlorentedev@gmail.com
    # DNS
    dns_provider: cloudflare
    dns_resolver_1: 1.1.1.1:53
    dns_resolver_2: 8.8.8.8:53
    dns_delay_before_check: 30
    # Logging
    access_log_format: json
    headers_default_mode: keep
    headers_user_agent: keep
    headers_authorization: drop
    headers_content_type: keep
    # Security
    headers_frame_deny: true
    headers_xss_filter: true
    headers_nosniff: true
    headers_sts_seconds: 31536000
    headers_sts_include_subdomains: true
    headers_sts_preload: true
    headers_ssl_redirect: true
    # HTTPS/TLS
    https_permanent_redirect: true
    tls_options: default
    tls_min_version: VersionTLS12
    tls_cipher_suite_1: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    tls_cipher_suite_2: TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    tls_cipher_suite_3: TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    tls_cipher_suite_4: TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    tls_cipher_suite_5: TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
    tls_cipher_suite_6: TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
    # Rate limiting
    rate_limit_average: 50
    rate_limit_burst: 25
    rate_limit_period: 1s
    # ACME
    acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    acme_domains:
      - main: mlorente.dev
        sans:
          - "*.mlorente.dev"
      - main: kubelab.live
        sans:
          - "*.kubelab.live"
    # Resources
    resources:
      cpu_limit: "1.0"
      memory_limit: 256M
      cpu_reservation: "0.5"
      memory_reservation: 128M

  cloudflared:
    name: cloudflared
    image: cloudflare/cloudflared:latest
    resources:
      cpu_limit: "0.25"
      memory_limit: 128M
      cpu_reservation: "0.1"
      memory_reservation: 64M

# ===========================================================================
# CUSTOM APPLICATIONS
# ===========================================================================
apps:
  # Platform applications (custom-built)
  platform:
    api:
      name: api
      domain: api.kubelab.live
      image_name: kubelab-api
      version: dev
      enable_auth: false
      auth_level: bypass
      default_port: 8080
      health_path: /health
      site_title: mlorentedev
      email_host: smtp.gmail.com
      email_port: 587

    web:
      name: web
      domain: web.kubelab.live
      image_name: kubelab-web
      version: dev
      enable_auth: false
      auth_level: bypass
      default_port: 4321
      health_path: /
      backend_url: "https://api.kubelab.live"
      allowed_hosts: "localhost,web,127.0.0.1"
      # Site Info
      site_title: "Manu Lorente"
      site_description: "Cloud Native Automation in Spanish"
      site_mail: "info@mlorente.dev"
      site_author: "Manu Lorente"
      site_keywords: "devops, cloud, kubernetes, aws, azure, python, go"
      # Social Media
      buy_me_a_coffee_url: "https://www.buymeacoffee.com/mlorente"
      calendly_url: "https://calendly.com/mlorentedev/videollamada"
      twitter_url: "https://x.com/mlorentedev"
      youtube_url: "https://www.youtube.com/@mlorentedev"
      github_url: "https://github.com/mlorentedev"
      # Analytics
      google_analytics_id: "G-PLL8SP2YFC"
      google_tag_manager_id: "GTM-XXXXXX"
      # Feature flags
      enable_blog: true
      enable_homelabs: true
      enable_contact: true

    # portfolio: removed — renamed to web (WEB-001, 2026-03-15)
    # blog: removed — killed (2026-03-15)
    # wiki: removed — integrated in toolkit as `kubelab docs` (see B1/TOOLKIT-008)

  # Third-party services
  services:
    # Core infrastructure services
    core:
      traefik:
        name: traefik
        domain: traefik.kubelab.live
        enable_auth: true
        auth_level: one_factor
        default_port: 443

      n8n:
        name: n8n
        image: n8nio/n8n:2.12.3
        domain: n8n.kubelab.live
        enable_auth: false
        auth_level: bypass
        default_port: 5678
        health_path: /healthz

      gitea:
        name: gitea
        image: gitea/gitea:1.25.5
        domain: gitea.kubelab.live
        app_name: "KubeLab Git"
        enable_auth: false
        auth_level: bypass
        default_port: 3000
        ssh_port: 2222
        health_path: /api/healthz
        admin_email: mlorentedev@gmail.com

      headscale:
        name: headscale
        image: headscale/headscale:v0.28.0
        domain: vpn.kubelab.live
        # Headscale v0.28 CLI uses numeric user IDs (not names)
        # Users: 1=manu (personal), 2=kubelab (infra nodes), 3=work (Windows PCs)
        infra_user_id: 2
        enable_auth: false
        auth_level: bypass
        default_port: 8080
        stun_port: 3478
        health_path: /health

    # Automation & CI/CD
    automation:
      github_runner:
        name: github-runner
        image: myoung34/github-runner:latest
        repo_url: https://github.com/mlorentedev/kubelab
        runner_group: default
        labels: self-hosted,linux,docker
        resources:
          cpu_limit: "1.0"
          memory_limit: 1G
          cpu_reservation: "0.25"
          memory_reservation: 512M

    # Data services (storage, databases)
    data:
      minio:
        name: minio
        image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
        domain: minio.kubelab.live
        console_domain: console.minio.kubelab.live
        enable_auth: false
        auth_level: bypass
        default_port_api: 9000
        default_port_console: 9001
        health_path: /minio/health/live

    # Observability (monitoring, logging, alerting)
    observability:
      grafana:
        name: grafana
        domain: grafana.kubelab.live
        enable_auth: true
        auth_level: one_factor
        default_port: 3000
        health_path: /api/health
        image: grafana/grafana-oss
        # Permite que Authelia registre usuarios en Grafana si no existen
        oauth_allow_sign_up: true
        oauth_client_id: grafana-oidc


      loki:
        name: loki
        domain: loki.kubelab.live
        image: grafana/loki:3.6.4
        vector_image: timberio/vector:0.43.1-alpine
        enable_auth: true
        auth_level: one_factor
        default_port: 3100
        health_path: /ready
        resources:
          cpu_limit: "0.5"
          memory_limit: 512M
          cpu_reservation: "0.25"
          memory_reservation: 256M

      uptime_kuma:
        name: uptime-kuma
        domain: status.kubelab.live
        image: louislam/uptime-kuma:2.2.1
        enable_auth: true
        auth_level: one_factor
        default_port: 3001
        health_path: /

    # Security (authentication, authorization, secrets)
    security:
      authelia:
        name: authelia
        image: authelia/authelia:4.39.15
        redis_image: redis:7-alpine
        enable_auth: false
        domain: auth.kubelab.live
        default_port: 9091
        health_path: /api/health
        issuer_domain: kubelab.live
        display_name: KubeLab
        default_domain_root: kubelab.live
        resources:
          cpu_limit: "0.5"
          memory_limit: 128M
          cpu_reservation: "0.1"
          memory_reservation: 64M
        log_level: info
        log_format: json
        metrics_port: 9959
        totp_algorithm: sha1
        totp_digits: 6
        totp_period: 30
        totp_skew: 1
        totp_secret_size: 32
        webauthn_attestation_conveyance_preference: indirect
        webauthn_selection_criteria_user_verification: preferred
        webauthn_timeout: 60s
        session_name: authelia_session
        session_same_site: lax
        session_inactivity: 1h
        session_expiration: 8h
        session_remember_me: 1M
        regulation_max_retries: 3
        regulation_find_time: 2m
        regulation_ban_time: 5m
        notifier_disable_startup_check: false
        jwt_secret_reset_password: some_dummy_secret_for_jwt_reset
        # Moved OIDC client definitions to a list structure
        oidc_clients:
          - client_id: kubelab-oidc
            client_name: KubeLab OIDC Client (General)
            redirect_uris:
              - https://auth.kubelab.live/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
          - client_id: grafana-oidc
            client_name: Grafana OIDC Client
            redirect_uris:
              - https://grafana.kubelab.live/login/generic_oauth
            scopes:
              - openid
              - profile
              - email
              - groups
          - client_id: minio-oidc
            client_name: MinIO OIDC Client
            redirect_uris:
              - https://console.minio.kubelab.live/oauth_callback
            scopes:
              - openid
              - profile
              - email
              - groups
        oidc_jwks_url: https://auth.kubelab.live/.well-known/jwks.json
        # User configuration (passwords stored in SOPS secrets)
        users:
          - username: admin
            displayname: Administrator
            email: mlorentedev@gmail.com
            disabled: false
            groups:
              - admins
              - users
          - username: testuser
            displayname: "E2E Test User"
            email: "testuser@kubelab.test"
            groups:
              - users

      crowdsec:
        name: crowdsec
        domain: crowdsec.kubelab.live
        image: crowdsecurity/crowdsec:v1.7.6
        bouncer_image: fbonalair/traefik-crowdsec-bouncer:latest
        bouncer_name: crowdsec-bouncer-traefik
        enable_bouncer_middleware: true  # Set false in dev — bouncer blocks localhost traffic
        enable_auth: true
        auth_level: one_factor
        default_port: 8080
        health_path: /health
        bouncer_api_key: secrets://apps.services.security.crowdsec.bouncer_api_key

    # AI / ML services (bare-metal, accessed via Tailscale)
    ai:
      ollama:
        name: ollama
        domain: ollama.kubelab.live
        enable_auth: false
        auth_level: bypass
        default_port: 11434
        health_path: /api/tags
