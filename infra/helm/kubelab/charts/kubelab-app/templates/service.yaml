{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kubelab-app.labels" (dict "name" $name "component" ($app.component | default "app")) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kubelab-app.selectorLabels" (dict "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}
