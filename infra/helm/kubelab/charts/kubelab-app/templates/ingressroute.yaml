{{- range $name, $app := .Values.apps }}
{{- if and $app.enabled $app.ingress }}
{{- if $app.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}
  labels:
    {{- include "kubelab-app.labels" (dict "name" $name "component" ($app.component | default "app")) | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $app.ingress.domain }}`)
      kind: Rule
      services:
        - name: {{ $name }}
          port: 80
      {{- if $app.ingress.middlewares }}
      middlewares:
        {{- range $app.ingress.middlewares }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
  tls:
    certResolver: {{ $app.ingress.certResolver | default "letsencrypt" }}
{{- end }}
{{- end }}
{{- end }}
