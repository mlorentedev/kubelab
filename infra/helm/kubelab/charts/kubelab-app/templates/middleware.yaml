{{- range $name, $app := .Values.apps }}
{{- if and $app.enabled $app.middleware }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $app.middleware.name }}
  labels:
    {{- include "kubelab-app.labels" (dict "name" $name "component" ($app.component | default "app")) | nindent 4 }}
spec:
  errors:
    status:
      {{- range $app.middleware.status }}
      - {{ . | quote }}
      {{- end }}
    service:
      name: {{ $name }}
      port: 80
    query: {{ $app.middleware.query | quote }}
{{- end }}
{{- end }}
