{{- range $name, $app := .Values.apps }}
{{- if and $app.enabled $app.catchAll }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catch-all
  labels:
    {{- include "kubelab-app.labels" (dict "name" $name "component" ($app.component | default "edge")) | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ $app.catchAll.match }}
      kind: Rule
      priority: 1
      services:
        - name: {{ $name }}
          port: 80
  tls:
    certResolver: {{ $app.catchAll.certResolver | default "letsencrypt" }}
    {{- if $app.catchAll.domains }}
    domains:
      {{- range $app.catchAll.domains }}
      - main: {{ .main | quote }}
        sans:
          {{- range .sans }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
