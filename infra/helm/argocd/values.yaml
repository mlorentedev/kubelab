# Argo CD — non-HA, tuned for t4g.small (2 vCPU, 2GB RAM)
# Ref: ADR-023 Phase 3, upgraded from t4g.micro (2026-03-28)

global:
  domain: argo.kubelab.live

server:
  replicas: 1
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi
  extraArgs:
    - --insecure  # TLS terminated by prod Traefik, not Argo CD server

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

dex:
  enabled: false  # Native OIDC via Authelia — dex not needed

notifications:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
  notifiers:
    service.slack: |
      token: $slack-token
  triggers:
    trigger.on-sync-failed: |
      - when: app.status.sync.status == 'Unknown' || app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]
    trigger.on-sync-succeeded: |
      - when: app.status.operationState.phase == 'Succeeded'
        send: [app-sync-succeeded]
  templates:
    template.app-sync-failed: |
      slack:
        attachments: |
          [{
            "color": "#E96D76",
            "title": "❌ {{.app.metadata.name}} sync failed",
            "text": "Sync failed. Revision: {{.app.status.sync.revision}}",
            "fields": [
              {"title": "App", "value": "{{.app.metadata.name}}", "short": true},
              {"title": "Env", "value": "{{.app.metadata.labels.kubelab_live/env}}", "short": true}
            ]
          }]
    template.app-health-degraded: |
      slack:
        attachments: |
          [{
            "color": "#F4C030",
            "title": "⚠️ {{.app.metadata.name}} health degraded",
            "text": "Application {{.app.metadata.name}} is Degraded.",
            "fields": [
              {"title": "App", "value": "{{.app.metadata.name}}", "short": true},
              {"title": "Health", "value": "{{.app.status.health.status}}", "short": true}
            ]
          }]
    template.app-sync-succeeded: |
      slack:
        attachments: |
          [{
            "color": "#18BE52",
            "title": "✅ {{.app.metadata.name}} synced",
            "text": "Application {{.app.metadata.name}} synced successfully.",
            "fields": [
              {"title": "App", "value": "{{.app.metadata.name}}", "short": true},
              {"title": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "short": true}
            ]
          }]
  subscriptions:
    - recipients:
        - slack:kubelab-argocd
      triggers:
        - on-sync-failed
        - on-health-degraded
        - on-sync-succeeded

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

configs:
  params:
    server.insecure: true  # TLS at Traefik level, not Argo
  cm:
    # Remove default EndpointSlice exclusion — kubelab uses manual EndpointSlices
    # for external services (ollama, uptime-kuma, headscale, argocd).
    # Auto-managed EndpointSlices aren't in Git, so prune won't touch them
    # (Argo CD only prunes resources with its tracking label).
    resource.exclusions: ""
    resource.customizations.health.batch_CronJob: |
      hs = {}
      hs.status = "Healthy"
      return hs
    # Admin local account: API key only (CLI fallback), no web login
    accounts.admin: apiKey
    # OIDC via Authelia (ARGO-010) — native OIDC, no dex
    url: https://argo.kubelab.live
    oidc.config: |
      name: Authelia
      issuer: https://auth.kubelab.live
      clientID: argocd
      clientSecret: $oidc.authelia.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
  rbac:
    policy.csv: |
      g, admins, role:admin
    policy.default: role:readonly
    scopes: '[groups]'
  secret:
    # GitHub webhook secret — triggers instant sync on push (no 3min polling delay)
    # Configure webhook in GitHub repo → Settings → Webhooks:
    #   URL: https://argo.kubelab.live/api/webhook
    #   Content-type: application/json
    #   Secret: (same value as webhook.github.secret below)
    #   Events: Just the push event
    githubSecret: ""  # Injected at deploy time via --set
    extra:
      oidc.authelia.clientSecret: ""  # Injected at deploy time via --set
