services:
  blog:
    # Override default CMD to include staging configuration
    # We must use 'bundle exec' because the entrypoint might not be set up for multiple configs automatically
    command:
      - bundle
      - exec
      - jekyll
      - serve
      - --host=0.0.0.0
      - --port=4000
      - --config=_config.yml,_config.staging.yml
    deploy:
      update_config:
        order: ${DEPLOY_UPDATE_ORDER}
        failure_action: ${DEPLOY_UPDATE_FAILURE_ACTION}
        delay: ${DEPLOY_UPDATE_DELAY}
      rollback_config:
        parallelism: ${DEPLOY_ROLLBACK_PARALLELISM}
        delay: ${DEPLOY_ROLLBACK_DELAY}
      resources:
        limits:
          cpus: '${RESOURCES_DEFAULT_CPU_LIMIT}'
          memory: ${RESOURCES_DEFAULT_MEMORY_LIMIT}
        reservations:
          cpus: '${RESOURCES_DEFAULT_CPU_RESERVATION}'
          memory: ${RESOURCES_DEFAULT_MEMORY_RESERVATION}
