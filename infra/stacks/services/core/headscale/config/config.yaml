# Headscale v0.28 configuration for KubeLab
# Source of truth for domain: infra/config/values/common.yaml (apps.services.core.headscale.domain)
# Docs: https://github.com/juanfont/headscale

server_url: https://vpn.kubelab.live
listen_addr: 0.0.0.0:8080

# Metrics (internal only, not exposed via Traefik)
metrics_listen_addr: 127.0.0.1:9090

# gRPC for CLI remote access (container-local only)
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: false

# Noise protocol (TS2021) — auto-generated on first run
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# IP allocation for mesh nodes
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# DERP relay (built-in + Tailscale public fallback)
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "kubelab"
    region_name: "KubeLab Homelab"
    verify_clients: true
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
    automatically_add_embedded_derp_region: true
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true
  update_frequency: 24h

# DNS — MagicDNS for internal mesh resolution
dns:
  magic_dns: true
  base_domain: kubelab.vpn
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 1.0.0.1
    split:
      staging.kubelab.live:
        - 100.64.0.5  # networking.nodes.rpi4.tailscale_ip (CoreDNS for staging only)
  search_domains: []
  extra_records:
    - name: ollama.kubelab.live
      type: A
      value: 100.64.0.3    # networking.nodes.beelink.tailscale_ip
    - name: jetson.kubelab.live
      type: A
      value: 100.64.0.8    # networking.nodes.jet1.tailscale_ip

# Database (SQLite — correct for homelab scale)
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

ephemeral_node_inactivity_timeout: 30m
disable_check_updates: true

# Unix socket for CLI
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

# Taildrop (file sharing between nodes)
taildrop:
  enabled: true

# Logging
log:
  level: info
  format: text

# Logtail disabled — no logs to Tailscale Inc.
logtail:
  enabled: false

# ACL policy (file-based, empty for now — permissive default)
policy:
  mode: file
  path: ""
