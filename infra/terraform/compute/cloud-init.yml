#cloud-config
# KubeLab VPS bootstrap — minimal setup for Ansible to take over

hostname: ${hostname}
timezone: ${timezone}
manage_etc_hosts: true

users:
  - name: ${deploy_user}
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - git
  - python3
  - python3-pip
  - ca-certificates

# Disable root SSH after deployer is created
runcmd:
  - sed -i 's/^PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
  - systemctl restart sshd
