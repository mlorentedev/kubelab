---
# =============================================================================
# ace2 Provisioning — On-Demand LLM Compute Node (ADR-028)
#
# Full provisioning: base system, SSH hardening, Docker, Tailscale,
# then deploys Ollama in Docker (replaces legacy MinIO + GH Runner).
#
# Usage:
#   make provision NODE=ace2 ENV=staging
#   toolkit infra ansible run -p provision-ace2 -e staging
#   toolkit infra ansible run -p provision-ace2 -e staging --tags services
#
# First run (before Tailscale): use BOOTSTRAP=1 to auto-use LAN IP
#   make provision NODE=ace2 ENV=staging BOOTSTRAP=1
# =============================================================================

# ---------------------------------------------------------------------------
# Play 0: Pre-flight validation (no changes to target)
# ---------------------------------------------------------------------------
- name: "Pre-flight: validate ace2 connectivity"
  hosts: ace2
  gather_facts: false
  become: false
  tags: [always]   # Pre-flight checks must run regardless of --tags filter
  tasks:
    - name: Verify SSH + Python connectivity
      ansible.builtin.ping:

    - name: Verify become (sudo) works
      command: sudo -n true
      become: true
      changed_when: false

    - name: Verify SSH private key exists on controller
      stat:
        path: "{{ _ssh_key_path }}"
      delegate_to: localhost
      register: _ssh_key
      failed_when: not _ssh_key.stat.exists
      vars:
        _ssh_key_path: "{{ ansible_ssh_private_key_file | default('~/.ssh/id_ed25519') }}"

    - name: Verify target has internet (apt, Docker, Tailscale need it)
      command: curl -sf --connect-timeout 5 https://get.docker.com -o /dev/null
      changed_when: false

    - name: Verify VPS reachable (needed for Headscale pre-auth key)
      command: ssh -o ConnectTimeout=5 -o BatchMode=yes deployer@100.64.0.2 echo ok
      delegate_to: localhost
      changed_when: false
      register: _vps_check
      failed_when: _vps_check.rc != 0

# ---------------------------------------------------------------------------
# Play 1: Full provisioning
# ---------------------------------------------------------------------------
- name: Provision ace2 — On-demand LLM compute node
  hosts: ace2
  become: true
  gather_facts: true

  vars:
    deploy_env: staging

  pre_tasks:
    - name: Load base config (SSOT)
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/common.yaml"
        name: common
      tags: [always]

    - name: Load environment overrides
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/{{ deploy_env }}.yaml"
        name: env_overrides
      tags: [always]

    - name: Merge configs (env overrides win)
      set_fact:
        config: "{{ common | combine(env_overrides, recursive=True) }}"
      tags: [always]

    - name: Decrypt common secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/common.enc.yaml
      register: sops_common
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Decrypt env secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/{{ deploy_env }}.enc.yaml
      register: sops_env
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Merge secrets (env overrides common)
      set_fact:
        secrets: "{{ (sops_common.stdout | from_yaml) | combine(sops_env.stdout | from_yaml, recursive=True) }}"
      no_log: true

    - name: Generate Headscale pre-auth key (via VPS)
      command: >
        docker exec headscale headscale preauthkeys create
        --user {{ config.apps.services.core.headscale.infra_user_id }} --reusable --expiration 1h
      delegate_to: kubelab-vps
      become: false
      changed_when: false
      register: _headscale_preauth
      tags: [tailscale]

    - name: Set Tailscale auth key fact
      set_fact:
        _tailscale_auth_key: "{{ _headscale_preauth.stdout | trim }}"
      no_log: true
      tags: [tailscale]

    - name: Allow Ollama port on Tailscale interface
      community.general.ufw:
        rule: allow
        interface_in: tailscale0
        port: "{{ config.apps.services.ai.ollama.default_port }}"
        proto: tcp

  roles:
    - role: ../roles/base_system
      tags: [base]
      vars:
        system_timezone: "{{ config.global.timezone }}"
        netplan_interface: "{{ config.networking.nodes.ace2.lan_interface }}"
        netplan_address: "{{ config.networking.nodes.ace2.lan_ip }}/24"
        netplan_gateway: "{{ config.networking.nodes.rpi4.lan_ip }}"

    - role: ../roles/ssh_hardening
      tags: [ssh]

    - role: ../roles/docker
      tags: [docker]

    - role: ../roles/tailscale
      tags: [tailscale]
      vars:
        tailscale_headscale_url: "https://{{ config.apps.services.core.headscale.domain }}"
        tailscale_accept_routes: false  # LAN node — must NOT accept subnet routes
        tailscale_auth_key: "{{ _tailscale_auth_key | default('') }}"

    - role: ../roles/ace2_services
      tags: [services, ollama]
      vars:
        restart_policy: "{{ config.global.restart_policy }}"
        tailscale_ip: "{{ config.networking.nodes.ace2.tailscale_ip }}"
        ollama_image: "{{ config.apps.services.ai.ollama.image }}"
        ollama_port: "{{ config.apps.services.ai.ollama.default_port }}"
        ollama_keep_alive: "{{ config.apps.services.ai.ollama.keep_alive }}"
        ollama_memory_limit: "{{ config.apps.services.ai.ollama.memory_limit }}"
        ollama_models: "{{ config.apps.services.ai.ollama.models }}"

    - role: ../roles/glances
      tags: [monitoring, glances]
      vars:
        restart_policy: "{{ config.global.restart_policy }}"
        tailscale_ip: "{{ config.networking.nodes.ace2.tailscale_ip }}"
        glances_image: "{{ config.apps.services.observability.glances.image }}"
        glances_port: "{{ config.apps.services.observability.glances.default_port }}"
        glances_cpu_limit: "{{ config.apps.services.observability.glances.resources.cpu_limit }}"
        glances_memory_limit: "{{ config.apps.services.observability.glances.resources.memory_limit }}"
