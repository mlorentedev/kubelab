---
# =============================================================================
# RPi4 Gateway Provisioning
#
# Full provisioning of the RPi4 gateway node: base system, SSH hardening,
# gateway networking (nftables NAT, dnsmasq DHCP, IP forwarding),
# Docker, Tailscale VPN, Pi-hole, and CoreDNS.
#
# Prerequisites:
#   - Ubuntu Server flashed on SD card with netplan configured
#   - See vault runbook: 02-runbooks/rpi4-bootstrap.md
#
# Usage:
#   make provision NODE=rpi4 ENV=prod
#   toolkit infra ansible run -p provision-rpi4 -e prod -K
#   toolkit infra ansible run -p provision-rpi4 -e prod -K --tags gateway
#   toolkit infra ansible run -p provision-rpi4 -e prod -K --tags coredns
# =============================================================================
- name: Provision RPi4 gateway
  hosts: gateway
  become: true
  gather_facts: true

  vars:
    # RPi4 is infrastructure — always uses prod config (base_domain: kubelab.live)
    # Hardcoded to prevent CLI -e deploy_env=staging from breaking CoreDNS zones
    _rpi4_env: prod

  pre_tasks:
    - name: Load base config (SSOT)
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/common.yaml"
        name: common

    - name: Load environment overrides
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/{{ _rpi4_env }}.yaml"
        name: env_overrides

    - name: Merge configs (env overrides win)
      set_fact:
        config: "{{ common | combine(env_overrides, recursive=True) }}"

    - name: Decrypt common secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/common.enc.yaml
      register: sops_common
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Decrypt env secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/{{ _rpi4_env }}.enc.yaml
      register: sops_env
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Merge secrets (env overrides common)
      set_fact:
        secrets: "{{ (sops_common.stdout | from_yaml) | combine(sops_env.stdout | from_yaml, recursive=True) }}"
      no_log: true

  roles:
    - role: ../roles/base_system
      tags: [base]
      vars:
        base_system_hostname: "{{ config.networking.nodes.rpi4.hostname }}"
        base_system_timezone: "{{ config.global.timezone }}"

    - role: ../roles/ssh_hardening
      tags: [ssh]

    - role: ../roles/gateway
      tags: [gateway]
      vars:
        gateway_interface: "eth0"
        gateway_lan_cidr: "{{ config.networking.nodes.rpi4.lan_ip }}/24"
        gateway_uplink_interfaces:
          - "enx*"
          - "wlan0"
        gateway_vpn_domain: "{{ config.apps.services.core.headscale.domain }}"
        gateway_vpn_public_ip: "{{ config.networking.vps.public_ip }}"
        gateway_dhcp_reservations:
          - { mac: "68:1D:EF:38:C5:6F", hostname: "kubelab-ace1", ip: "{{ config.networking.nodes.ace1.lan_ip }}" }
          - { mac: "68:1D:EF:38:C5:8B", hostname: "kubelab-ace2", ip: "{{ config.networking.nodes.ace2.lan_ip }}" }
          - { mac: "78:55:36:06:18:14", hostname: "kubelab-bee", ip: "{{ config.networking.nodes.beelink.lan_ip }}" }
          - { mac: "00:04:4b:e5:5f:28", hostname: "kubelab-jet1", ip: "{{ config.networking.nodes.jetson.lan_ip }}" }

    - role: ../roles/docker
      tags: [docker]

    - role: ../roles/tailscale
      tags: [tailscale]
      vars:
        tailscale_headscale_url: "https://{{ config.apps.services.core.headscale.domain }}"
        tailscale_accept_dns: false
        tailscale_accept_routes: false
        tailscale_advertise_routes: "{{ config.networking.lan_cidr }}"

    - role: ../roles/coredns
      tags: [coredns]
      vars:
        base_domain: "{{ config.global.base_domain }}"
        staging_domain: "staging.{{ config.global.base_domain }}"
        vps_public_ip: "{{ config.networking.vps.public_ip }}"
        restart_policy: "{{ config.global.restart_policy }}"
        node_ips:
          vps: "{{ config.networking.vps.tailscale_ip }}"
          ace1: "{{ config.networking.nodes.ace1.tailscale_ip }}"
          ace2: "{{ config.networking.nodes.ace2.tailscale_ip }}"
          rpi3: "{{ config.networking.nodes.rpi3.tailscale_ip }}"
          rpi4: "{{ config.networking.nodes.rpi4.tailscale_ip }}"
          beelink: "{{ config.networking.nodes.beelink.tailscale_ip }}"
          jetson: "{{ config.networking.nodes.jetson.tailscale_ip }}"
        service_domains:
          vpn: "{{ config.apps.services.core.headscale.domain }}"
          status: "{{ config.apps.services.observability.uptime_kuma.domain }}"
          ollama: "ollama.{{ config.global.base_domain }}"
          jetson: "jetson.{{ config.global.base_domain }}"
