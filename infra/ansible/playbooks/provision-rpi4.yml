---
# =============================================================================
# RPi4 Gateway Provisioning
#
# Full provisioning of the RPi4 gateway node: base system, SSH hardening,
# Docker, Tailscale VPN, and CoreDNS.
#
# Usage:
#   make provision-rpi4
#   toolkit infra ansible run -p provision-rpi4 -e prod -K
#   toolkit infra ansible run -p provision-rpi4 -e prod -K --tags coredns
# =============================================================================
- name: Provision RPi4 gateway
  hosts: gateway
  become: true
  gather_facts: true

  vars:
    deploy_env: prod  # RPi4 is prod-only — override with -e deploy_env=X if needed

  pre_tasks:
    - name: Load base config (SSOT)
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/common.yaml"
        name: common

    - name: Load environment overrides
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/{{ deploy_env }}.yaml"
        name: env_overrides

    - name: Merge configs (env overrides win)
      set_fact:
        config: "{{ common | combine(env_overrides, recursive=True) }}"

    - name: Decrypt common secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/common.enc.yaml
      register: sops_common
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Decrypt env secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/{{ deploy_env }}.enc.yaml
      register: sops_env
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Merge secrets (env overrides common)
      set_fact:
        secrets: "{{ (sops_common.stdout | from_yaml) | combine(sops_env.stdout | from_yaml, recursive=True) }}"
      no_log: true

  roles:
    # --- Base system (hostname, timezone, packages) ---
    - role: ../roles/base_system
      tags: [base]
      vars:
        base_system_hostname: "{{ config.networking.nodes.rpi4.hostname }}"
        base_system_timezone: "{{ config.global.timezone }}"

    # --- SSH hardening ---
    - role: ../roles/ssh_hardening
      tags: [ssh]

    # --- Docker ---
    - role: ../roles/docker
      tags: [docker]

    # --- Tailscale VPN client ---
    - role: ../roles/tailscale
      tags: [tailscale]
      vars:
        tailscale_headscale_url: "https://{{ config.apps.services.core.headscale.domain }}"
        tailscale_extra_flags: "--accept-dns=false --advertise-routes=172.16.1.0/24"

    # --- CoreDNS (internal DNS resolution) ---
    - role: ../roles/coredns
      tags: [coredns]
      vars:
        base_domain: "{{ config.global.base_domain }}"
        staging_domain: "staging.{{ config.global.base_domain }}"
        vps_public_ip: "{{ config.networking.vps.public_ip }}"
        restart_policy: "{{ config.global.restart_policy }}"
        node_ips:
          vps: "{{ config.networking.vps.tailscale_ip }}"
          k3s_server: "{{ config.networking.nodes.k3s_server.tailscale_ip }}"
          rpi3: "{{ config.networking.nodes.rpi3.tailscale_ip }}"
          rpi4: "{{ config.networking.nodes.rpi4.tailscale_ip }}"
          beelink: "{{ config.networking.nodes.beelink.tailscale_ip }}"
          jetson: "{{ config.networking.nodes.jetson.tailscale_ip }}"
        service_domains:
          vpn: "{{ config.apps.services.core.headscale.domain }}"
          status: "{{ config.apps.services.observability.uptime_kuma.domain }}"
          ollama: "ollama.{{ config.global.base_domain }}"
          jetson: "jetson.{{ config.global.base_domain }}"
