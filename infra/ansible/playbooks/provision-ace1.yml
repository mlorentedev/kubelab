---
# =============================================================================
# ace1 Provisioning — K3s All-in-One Staging
#
# Full provisioning: base system, SSH hardening, Docker, Tailscale, K3s server.
# K3s runs in all-in-one mode (server schedules workloads, no separate agents).
#
# Usage:
#   make provision NODE=ace1 ENV=staging
#   toolkit infra ansible run -p provision-ace1 -e staging
#   toolkit infra ansible run -p provision-ace1 -e staging --tags k3s
#
# First run (before Tailscale): use BOOTSTRAP=1 to auto-use LAN IP
#   make provision NODE=ace1 ENV=staging BOOTSTRAP=1
# =============================================================================

# ---------------------------------------------------------------------------
# Play 0: Pre-flight validation (no changes to target)
# ---------------------------------------------------------------------------
- name: "Pre-flight: validate ace1 connectivity"
  hosts: ace1
  gather_facts: false
  become: false
  tasks:
    - name: Verify SSH + Python connectivity
      ansible.builtin.ping:

    - name: Verify become (sudo) works
      command: sudo -n true
      become: true
      changed_when: false

    - name: Verify SSH private key exists on controller
      stat:
        path: "{{ _ssh_key_path }}"
      delegate_to: localhost
      register: _ssh_key
      failed_when: not _ssh_key.stat.exists
      vars:
        _ssh_key_path: "{{ ansible_ssh_private_key_file | default('~/.ssh/id_ed25519') }}"

    - name: Verify target has internet (apt, Docker, K3s need it)
      command: curl -sf --connect-timeout 5 https://get.docker.com -o /dev/null
      changed_when: false

    - name: Verify VPS reachable (needed for Headscale pre-auth key)
      command: ssh -o ConnectTimeout=5 -o BatchMode=yes deployer@100.64.0.2 echo ok
      delegate_to: localhost
      changed_when: false
      register: _vps_check
      failed_when: _vps_check.rc != 0

# ---------------------------------------------------------------------------
# Play 1: Full provisioning
# ---------------------------------------------------------------------------
- name: Provision ace1 — K3s staging all-in-one
  hosts: ace1
  become: true
  gather_facts: true

  vars:
    deploy_env: staging

  pre_tasks:
    - name: Load base config (SSOT)
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/common.yaml"
        name: common

    - name: Load environment overrides
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/{{ deploy_env }}.yaml"
        name: env_overrides

    - name: Merge configs (env overrides win)
      set_fact:
        config: "{{ common | combine(env_overrides, recursive=True) }}"

    - name: Decrypt common secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/common.enc.yaml
      register: sops_common
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Decrypt env secrets (controller-side)
      command: sops -d {{ playbook_dir }}/../../config/secrets/{{ deploy_env }}.enc.yaml
      register: sops_env
      delegate_to: localhost
      become: false
      changed_when: false
      check_mode: false
      no_log: true

    - name: Merge secrets (env overrides common)
      set_fact:
        secrets: "{{ (sops_common.stdout | from_yaml) | combine(sops_env.stdout | from_yaml, recursive=True) }}"
      no_log: true

    - name: Generate Headscale pre-auth key (via VPS)
      command: >
        docker exec headscale headscale preauthkeys create
        --user {{ config.apps.services.core.headscale.infra_user_id }} --reusable --expiration 1h
      delegate_to: kubelab-vps
      become: false
      changed_when: false
      register: _headscale_preauth
      tags: [tailscale]

    - name: Set Tailscale auth key fact
      set_fact:
        _tailscale_auth_key: "{{ _headscale_preauth.stdout | trim }}"
      no_log: true
      tags: [tailscale]

    - name: Build TLS SAN list
      set_fact:
        _k3s_tls_san: >-
          {{ [ansible_host] +
             ([config.networking.nodes.ace1.lan_ip]
              if config.networking.nodes.ace1.lan_ip is defined else []) }}

  roles:
    - role: ../roles/base_system
      tags: [base]
      vars:
        system_timezone: "{{ config.global.timezone }}"
        netplan_interface: "{{ config.networking.nodes.ace1.lan_interface }}"
        netplan_address: "{{ config.networking.nodes.ace1.lan_ip }}/24"
        netplan_gateway: "{{ config.networking.nodes.rpi4.lan_ip }}"

    - role: ../roles/ssh_hardening
      tags: [ssh]

    - role: ../roles/docker
      tags: [docker]

    - role: ../roles/tailscale
      tags: [tailscale]
      vars:
        tailscale_headscale_url: "https://{{ config.apps.services.core.headscale.domain }}"
        tailscale_accept_routes: false  # LAN nodes must NOT accept subnet routes (breaks inbound LAN traffic)
        tailscale_auth_key: "{{ _tailscale_auth_key | default('') }}"

    - role: ../roles/k3s_server
      tags: [k3s]
      vars:
        k3s_version: "{{ config.k3s.version }}"
        k3s_install_script_url: "{{ config.k3s.install_script_url }}"
        k3s_tls_san: "{{ _k3s_tls_san }}"
        k3s_configure_traefik: true
        k3s_traefik_http_port: "{{ config.k3s.traefik.http_port }}"
        k3s_traefik_https_port: "{{ config.k3s.traefik.https_port }}"
        k3s_traefik_acme_enabled: true
        k3s_traefik_acme_email: "{{ config.edge.traefik.acme_email }}"
        k3s_traefik_acme_dns_provider: "{{ config.edge.traefik.dns_provider }}"
        k3s_traefik_acme_dns_resolvers: "{{ config.edge.traefik.dns_resolver_1 }},{{ config.edge.traefik.dns_resolver_2 }}"
        k3s_traefik_acme_cloudflare_token: "{{ secrets.cloudflare.api_token }}"
        k3s_fetch_kubeconfig: true
        k3s_kubeconfig_local_path: "~/.kube/kubelab-{{ deploy_env }}-config"
        k3s_api_address: "{{ ansible_host }}"
