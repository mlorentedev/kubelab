---
- name: Deploy cluster of applications
  hosts: "{{ env }}"
  become: false
  pre_tasks:
  - name: Generate a single timestamp for this run
    set_fact:
      timestamp: "{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
    run_once: true
    delegate_facts: true
  - name: Build backup_dir once the timestamp exists
    set_fact:
      backup_dir: "{{ deploy_path }}/backups/{{ timestamp }}"
  vars:
    traefik_path: "/opt/traefik"
    deploy_base: "{{ deploy_path }}"
    project_root: "{{ playbook_dir | dirname | dirname | dirname }}"
    traefik_files: "{{ project_root }}/infra/traefik"
    apps_path: "{{ project_root }}/apps"
    apps:
      - { name: "api", compose: "docker-compose.prod.yml" }
      - { name: "blog", compose: "docker-compose.prod.yml" }
      - { name: "web", compose: "docker-compose.prod.yml" }
      - { name: "n8n", compose: "docker-compose.yml" }
      - { name: "monitoring", compose: "docker-compose.yml" }
      - { name: "portainer", compose: "docker-compose.yml" }
    deploy_apps: "{{ apps | map(attribute='name') | list }}"

  tasks:
    - name: Debug deployment info
      debug:
        msg:
          - "Deploying to: {{ domain }}"
          - "Apps: {{ deploy_apps | join(', ') }}"
          - "Timestamp: {{ timestamp }}"        
      run_once: true

    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: Backup existing docker-compose directory (if present)
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: yes
      loop:
        - { src: "{{ traefik_path }}/", dest: "{{ backup_dir }}/traefik/" }
        - { src: "{{ deploy_base }}/apps/", dest: "{{ backup_dir }}/apps/" }
      ignore_errors: true

    - name: Ensure traefik directories exist
      file:
        path: "{{ traefik_path }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "dynamic"
        - "logs"
        - "certs"

    - name: Copy traefik configuration files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        force: yes
        mode: '0644'
      loop:
        - { src: "{{ traefik_files }}/traefik.yml", dest: "{{ traefik_path }}/traefik.yml" }
        - { src: "{{ traefik_files }}/docker-compose.yml", dest: "{{ traefik_path }}/docker-compose.yml" }
        - { src: "{{ traefik_files }}/.env", dest: "{{ traefik_path }}/.env" }

    - name: Copy traefik dynamic configuration
      copy:
        src: "{{ traefik_files }}/dynamic/"
        dest: "{{ traefik_path }}/dynamic/"
        force: yes
        mode: '0644'

    - name: Setup acme.json for SSL certificates
      block:
        - name: Backup existing acme.json if it exists
          copy:
            src: "{{ traefik_path }}/certs/acme.json"
            dest: "{{ backup_dir }}/traefik/certs/acme.json"
            remote_src: yes
          ignore_errors: true

        - name: Ensure acme.json exists with correct permissions
          file:
            path: "{{ traefik_path }}/certs/acme.json"
            state: touch
            mode: '0600'

    - name: Create app directories
      file:
        path: "{{ deploy_base }}/apps/{{ app.name }}"
        state: directory
        mode: '0755'
      loop: "{{ apps }}"
      loop_control:
        loop_var: app

    - name: Copy app configurations
      copy:
        src: "{{ apps_path }}/{{ app.name }}/{{ app.compose }}"
        dest: "{{ deploy_base }}/apps/{{ app.name }}/docker-compose.yml"
        force: yes
        mode: '0644'
      loop: "{{ apps }}"
      loop_control:
        loop_var: app
      ignore_errors: true

    - name: Copy app environment files
      copy:
        src: "{{ apps_path }}/{{ app.name }}/.env"
        dest: "{{ deploy_base }}/apps/{{ app.name }}/.env"
        force: yes
        mode: '0644'
      loop: "{{ apps }}"
      loop_control:
        loop_var: app
      ignore_errors: true

    - name: Check if nginx exists in infra
      stat:
        path: "{{ project_root }}/infra/nginx/docker-compose.yml"
      register: nginx_exists
      delegate_to: localhost

    - name: Setup nginx if it exists
      block:
        - name: Ensure nginx directory exists
          file:
            path: "{{ deploy_base }}/nginx"
            state: directory
            mode: '0755'
        
        - name: Copy nginx configuration
          copy:
            src: "{{ project_root }}/infra/nginx/"
            dest: "{{ deploy_base }}/nginx/"
            force: yes
            mode: '0644'
      when: nginx_exists.stat.exists

    - name: Stop existing containers
      shell: |
        cd {{ traefik_path }} && docker compose down || true
        cd {{ deploy_base }}/apps/{{ app.name }} && docker compose down || true
      loop: "{{ apps }}"
      loop_control:
        loop_var: app
      ignore_errors: true

    - name: Stop nginx if exists
      shell: |
        cd {{ deploy_base }}/nginx && docker compose down || true
      when: nginx_exists.stat.exists
      ignore_errors: true

    - name: Create Docker proxy network
      docker_network:
        name: proxy
        state: present
      ignore_errors: true

    - name: Pull latest images
      shell: docker compose pull
      args:
        chdir: "{{ deploy_base }}/apps/{{ app.name }}"
      loop: "{{ apps }}"
      loop_control:
        loop_var: app

    - name: Start Traefik
      shell: |
        cd {{ traefik_path }}
        docker compose up -d
      environment:
        DOMAIN: "{{ domain }}"

    - name: Wait for Traefik to start
      pause:
        seconds: 15

    - name: Start applications
      shell: |
        cd {{ deploy_base }}/apps/{{ app.name }}
        docker compose up -d
      loop: "{{ apps }}"
      loop_control:
        loop_var: app
      environment:
        DOMAIN: "{{ domain }}"

    - name: Start nginx
      shell: |
        cd {{ deploy_base }}/nginx
        docker compose up -d
      when: nginx_exists.stat.exists
      environment:
        DOMAIN: "{{ domain }}"

    - name: Wait for core apps to start
      pause:
        seconds: 20

    - name: Check running containers
      shell: |
        {% raw %}
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        {% endraw %}
      register: containers_status

    - name: Display container status
      debug:
        msg: "{{ containers_status.stdout_lines }}"

    - name: Health check for blog
      uri:
        url: "https://{{ domain }}"
        method: GET
        status_code: 200
        timeout: 30
      register: blog_health
      failed_when: false
      when: "'blog' in deploy_apps"

    - name: Health check for API
      uri:
        url: "https://api.{{ domain }}/health"
        method: GET
        status_code: 200
        timeout: 30
      register: api_health
      failed_when: false
      when: "'api' in deploy_apps"

    - name: Show health check results
      debug:
        msg:
          - "Blog health: {{ 'OK' if blog_health.status == 200 else 'FAILED' }}"
          - "API health: {{ 'OK' if api_health.status == 200 else 'FAILED' }}"
      when: blog_health is defined or api_health is defined

    - name: Deployment completed successfully
      debug:
        msg: 
          - "Production deployment completed!"
          - "Domain: https://{{ domain }}"
          - "Apps deployed: {{ deploy_apps | join(', ') }}"
          - "Backup created: {{ backup_dir }}"
          - "Traefik dashboard: https://{{ domain }}/dashboard/"
