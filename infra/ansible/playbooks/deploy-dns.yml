---
- name: Deploy DNS gateway (CoreDNS + Pi-hole)
  hosts: gateway
  gather_facts: false

  vars:
    deploy_env: prod  # RPi4 DNS gateway serves all envs — prod config is the baseline

  pre_tasks:
    - name: Load base config (SSOT)
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/common.yaml"
        name: common

    - name: Load environment overrides
      include_vars:
        file: "{{ playbook_dir }}/../../config/values/{{ deploy_env }}.yaml"
        name: env_overrides

    - name: Merge configs (env overrides win)
      set_fact:
        config: "{{ common | combine(env_overrides, recursive=True) }}"

  roles:
    - role: ../roles/coredns
      tags: [dns, coredns]
      vars:
        # RPi4 serves DNS for ALL envs — use common.yaml base (not env override)
        base_domain: "{{ common.global.base_domain }}"
        staging_domain: "staging.{{ common.global.base_domain }}"
        staging_zones: "{{ common.networking.staging_zones }}"
        vps_public_ip: "{{ common.networking.vps.public_ip }}"
        restart_policy: "{{ common.global.restart_policy }}"
        node_ips:
          vps: "{{ common.networking.vps.tailscale_ip }}"
          ace1: "{{ common.networking.nodes.ace1.tailscale_ip }}"
          ace2: "{{ common.networking.nodes.ace2.tailscale_ip }}"
          rpi3: "{{ common.networking.nodes.rpi3.tailscale_ip }}"
          rpi4: "{{ common.networking.nodes.rpi4.tailscale_ip }}"
          beelink: "{{ common.networking.nodes.beelink.tailscale_ip }}"
          jetson: "{{ common.networking.nodes.jetson.tailscale_ip }}"
        service_domains:
          vpn: "{{ common.apps.services.core.headscale.domain }}"
          status: "{{ common.apps.services.observability.uptime_kuma.domain }}"
          ollama: "ollama.{{ common.global.base_domain }}"
          jetson: "jetson.{{ common.global.base_domain }}"
