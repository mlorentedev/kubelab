---
- name: Deploy hardened sshd_config
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "sshd -t -f %s"
  notify: restart sshd

- name: Ensure SSH key is authorized
  authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ lookup('file', ansible_ssh_private_key_file + '.pub') }}"
    state: present
  when: ansible_ssh_private_key_file is defined
