---
# Gateway role: IP forwarding, nftables NAT, dnsmasq DHCP, DNS resilience
# Assumes netplan was configured pre-boot (see vault runbook: 02-runbooks/rpi4-bootstrap.md)

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-gateway.conf
    reload: true

- name: Disable systemd-resolved
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
    masked: true
  failed_when: false

- name: Disable avahi-daemon
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - avahi-daemon.service
    - avahi-daemon.socket
  failed_when: false

- name: Set static resolv.conf
  shell: |
    chattr -i /etc/resolv.conf 2>/dev/null || true
    rm -f /etc/resolv.conf
    printf 'nameserver 8.8.8.8\nnameserver 1.1.1.1\n' > /etc/resolv.conf
    chmod 644 /etc/resolv.conf
  changed_when: false

- name: Set UFW default forward policy to ACCEPT
  lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: reload ufw

- name: Install gateway packages
  apt:
    name:
      - nftables
      - dnsmasq
    state: present

- name: Deploy nftables NAT config
  template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
  notify: restart nftables

- name: Enable nftables
  systemd:
    name: nftables
    state: started
    enabled: true

- name: Deploy dnsmasq DHCP config
  template:
    src: kubelab-dhcp.conf.j2
    dest: /etc/dnsmasq.d/kubelab-dhcp.conf
    mode: "0644"
  notify: restart dnsmasq

- name: Enable dnsmasq
  systemd:
    name: dnsmasq
    state: started
    enabled: true

- name: Ensure VPN domain resolves to public IP (/etc/hosts)
  lineinfile:
    path: /etc/hosts
    regexp: "{{ gateway_vpn_domain }}$"
    line: "{{ gateway_vpn_public_ip }} {{ gateway_vpn_domain }}"
    state: present
  when: gateway_vpn_domain != '' and gateway_vpn_public_ip != ''
