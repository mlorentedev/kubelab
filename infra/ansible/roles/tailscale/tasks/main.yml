---
- name: Check if Tailscale is installed
  command: tailscale version
  register: tailscale_check
  changed_when: false
  failed_when: false

- name: Install Tailscale
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
  when: tailscale_check.rc != 0

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Check Tailscale status
  command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Build Tailscale up command
  set_fact:
    tailscale_up_cmd: >-
      tailscale up
      --login-server={{ tailscale_headscale_url }}
      --accept-dns={{ tailscale_accept_dns | lower }}
      --accept-routes={{ tailscale_accept_routes | lower }}
      {% if tailscale_advertise_routes %}--advertise-routes={{ tailscale_advertise_routes }}{% endif %}
      {% if tailscale_auth_key %}--authkey={{ tailscale_auth_key }}{% endif %}

- name: Register with Headscale (async — tailscale may disrupt SSH briefly)
  command: "{{ tailscale_up_cmd }} --timeout=30s"
  when: >
    tailscale_auth_key != '' and
    (tailscale_status.rc != 0 or
     (tailscale_status.stdout | from_json).BackendState | default('') != 'Running')
  async: 60
  poll: 0
  register: tailscale_register

- name: Wait for Tailscale registration to complete
  async_status:
    jid: "{{ tailscale_register.ansible_job_id }}"
  register: tailscale_result
  until: tailscale_result.finished
  retries: 12
  delay: 5
  when: tailscale_register is changed

- name: Show manual auth instructions
  debug:
    msg: >-
      Tailscale is installed but not registered. Run manually on this host:
      {{ tailscale_up_cmd }}
      Then approve the node in Headscale.
  when: >
    tailscale_auth_key == '' and
    (tailscale_status.rc != 0 or
     (tailscale_status.stdout | from_json).BackendState | default('') != 'Running')

- name: Verify Tailscale connectivity
  command: tailscale status
  register: tailscale_verify
  changed_when: false
  failed_when: false
