---
# =============================================================================
# VPS Services — Glances only (DASH-DT-014)
# Replicates beelink_services tailscale-bind pattern so the Homepage cockpit
# VPS widget (configured for http://{vps.tailscale_ip}:61208) gets a backend.
# =============================================================================

- name: Create Glances deployment directory
  file:
    path: "{{ vps_services_deploy_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Template Glances Docker Compose stack
  template:
    src: compose.yml.j2
    dest: "{{ vps_services_deploy_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart vps glances

- name: Pull Glances image
  command: docker compose -f {{ vps_services_deploy_dir }}/compose.yml pull
  register: _pull
  changed_when: "'Pull complete' in _pull.stderr or 'Downloaded' in _pull.stderr"

- name: Start Glances container
  command: docker compose -f {{ vps_services_deploy_dir }}/compose.yml up -d
  register: _compose_up
  changed_when: "'Started' in _compose_up.stderr or 'Created' in _compose_up.stderr"

- name: Verify Glances health
  uri:
    url: "http://{{ tailscale_ip }}:{{ glances_port }}/api/4/quicklook"
    method: GET
    status_code: 200
    timeout: 10
  retries: 5
  delay: 5

- name: Report Glances status
  debug:
    msg: "Glances live on http://{{ tailscale_ip }}:{{ glances_port }}/api/4/quicklook"
