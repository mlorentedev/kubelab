---
# --- Pre-checks ---
- name: Validate required variables
  assert:
    that:
      - k3s_version | length > 0
      - k3s_server_url | length > 0
      - k3s_join_token | length > 0
    fail_msg: "k3s_version, k3s_server_url, and k3s_join_token must be provided"

- name: Check if K3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Get installed K3s version
  command: k3s --version
  register: k3s_installed_version
  changed_when: false
  failed_when: false
  when: k3s_binary.stat.exists

- name: Determine if install is required
  set_fact:
    k3s_install_required: >-
      {{ not k3s_binary.stat.exists or
         k3s_version not in (k3s_installed_version.stdout | default('')) }}

# --- Config ---
- name: Create K3s config directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Template K3s agent config
  template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  register: k3s_config
  no_log: true
  notify: Restart K3s agent

# --- Install ---
- name: Download K3s install script
  get_url:
    url: "{{ k3s_install_script_url }}"
    dest: "{{ k3s_install_script_path }}"
    mode: "0755"
  when: k3s_install_required

- name: Run K3s agent install
  command: "{{ k3s_install_script_path }}"
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "agent"
  changed_when: true
  when: k3s_install_required

# --- Readiness ---
- name: Ensure K3s agent service is started and enabled
  systemd:
    name: k3s-agent
    state: started
    enabled: true

- name: Wait for K3s agent to be active
  systemd:
    name: k3s-agent
  register: k3s_agent_active
  retries: "{{ k3s_readiness_retries }}"
  delay: "{{ k3s_readiness_delay }}"
  until: k3s_agent_active.status.ActiveState == 'active'
