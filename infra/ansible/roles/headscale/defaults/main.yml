---
headscale_image: ""
headscale_domain: ""
headscale_listen_port: 8080
headscale_stun_port: 3478
headscale_remote_dir: "/opt/headscale"
headscale_config_dir: "{{ headscale_remote_dir }}/config"

vps_public_ip: ""
docker_network: "kubelab"
docker_dns_servers: ["1.1.1.1", "8.8.8.8"]
restart_policy: "unless-stopped"

# Tailscale CIDR for IP allocation
tailscale_cidr: "100.64.0.0/10"

# DNS config for Headscale's split DNS
headscale_dns_split: {}
headscale_dns_extra_records: []

# DERP relay
headscale_derp_enabled: true
headscale_derp_region_id: 999
headscale_derp_region_code: "kubelab"
headscale_derp_region_name: "KubeLab Homelab"
headscale_derp_verify_clients: true

# Database
headscale_db_type: "sqlite"

# ACL policy (ADR-041 / VPN-ACL-001). In-container path of the HuJSON policy file.
# Default "" keeps Headscale allow-all (no policy loaded). Set to a path under
# /etc/headscale (bind-mounted from ./config) to enable file-mode segmentation;
# the role renders policy.hujson.j2 there and SIGHUP-reloads on change.
headscale_policy_path: ""

# ACL host aliases (name -> Tailscale IP / CIDR) rendered into policy.hujson's
# "hosts" block. SSOT: built from networking.* in the deploy playbook. Empty by
# default (policy task is dormant until headscale_policy_path is set).
headscale_policy_hosts: {}
