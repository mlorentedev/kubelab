---
- name: Create Headscale directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ headscale_remote_dir }}"
    - "{{ headscale_config_dir }}"

- name: Template docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ headscale_remote_dir }}/docker-compose.yml"
    mode: "0644"
  register: headscale_compose

- name: Template Headscale config
  template:
    src: config.yaml.j2
    dest: "{{ headscale_config_dir }}/config.yaml"
    mode: "0644"
  register: headscale_config

# ADR-041 / VPN-ACL-002: keep the last-applied policy for auto-revert. failed_when:false
# tolerates the first activation, when no prior policy exists yet.
- name: Back up current ACL policy (for auto-revert)
  copy:
    src: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}"
    dest: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}.prev"
    remote_src: true
    mode: "0644"
  when: headscale_policy_path | length > 0
  failed_when: false

# ADR-041 / VPN-ACL-001: render the HuJSON ACL policy into the bind-mounted
# config dir (appears at headscale_policy_path inside the container). Dormant
# while headscale_policy_path is "" (default → allow-all). On change this fires
# the SIGHUP `reload headscale` handler — a hot reload, never a restart, so the
# policy path is decoupled from the config.yaml restart path above.
- name: Template Headscale ACL policy
  template:
    src: policy.hujson.j2
    dest: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}"
    mode: "0644"
  when: headscale_policy_path | length > 0
  notify: reload headscale
  register: headscale_policy

- name: Ensure Docker network exists
  community.docker.docker_network:
    name: "{{ docker_network }}"
    state: present
    driver: bridge

- name: Pull Headscale image
  command: docker compose -f {{ headscale_remote_dir }}/docker-compose.yml pull
  changed_when: false

- name: Start Headscale
  command: docker compose -f {{ headscale_remote_dir }}/docker-compose.yml up -d
  register: headscale_start
  changed_when: "'Started' in headscale_start.stderr or 'Created' in headscale_start.stderr"

# Only the server config.yaml / compose file need a restart (read at startup).
# Policy-file changes take the SIGHUP path above. Readiness is gated by the
# always-run health-wait task below (finding #5: the old `wait for headscale`
# handler duplicated it).
- name: Restart Headscale on config change
  command: docker compose -f {{ headscale_remote_dir }}/docker-compose.yml restart
  when: headscale_config.changed or headscale_compose.changed

- name: Wait for Headscale to be healthy
  command: docker inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' headscale
  register: headscale_health
  retries: 12
  delay: 5
  until: headscale_health.stdout | trim == 'healthy'
  changed_when: false
  check_mode: false

# ADR-041 / VPN-ACL-002: after a policy reload, actively probe the preserved
# mesh flows from the controller. On v0.28 `policy check` is syntax-only, so this
# external probe is what proves reachability. If it fails, AUTO-REVERT to the
# previous policy (reload is reversible in seconds) and fail the play.
- name: Verify mesh + auto-revert on probe failure
  when: headscale_policy_path | length > 0 and (headscale_policy.changed | default(false))
  block:
    - name: Apply the pending SIGHUP policy reload now
      meta: flush_handlers

    # The new network map takes a few seconds to propagate to clients after a
    # reload; retry so a propagation-window blip is not misread as a broken flow.
    - name: Probe preserved mesh flows from the controller
      command: toolkit infra headscale probe
      args:
        chdir: "{{ playbook_dir }}/../../.."
      delegate_to: localhost
      register: hs_probe
      retries: 4
      delay: 5
      until: hs_probe.rc == 0
      changed_when: false
  rescue:
    - name: Look for a previous policy to revert to
      stat:
        path: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}.prev"
      register: hs_prev

    - name: Restore the previous known-good policy
      copy:
        src: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}.prev"
        dest: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}"
        remote_src: true
        mode: "0644"
      when: hs_prev.stat.exists

    # First activation (no .prev): there is nothing to restore, so revert to an EXPLICIT
    # allow-all — a failed probe must never strand the mesh on the just-loaded ACL (Codex P1).
    - name: First activation — revert to an explicit allow-all policy
      copy:
        dest: "{{ headscale_config_dir }}/{{ headscale_policy_path | basename }}"
        mode: "0644"
        content: |
          // AUTO-REVERT fallback (no prior policy on first activation): explicit allow-all,
          // so a failed connectivity probe cannot strand the mesh on a partial ACL.
          { "acls": [ { "action": "accept", "src": ["*"], "dst": ["*:*"] } ] }
      when: not hs_prev.stat.exists

    - name: Reload the reverted policy (SIGHUP)
      command: docker kill --signal=HUP headscale

    - name: Fail — connectivity probe failed, policy reverted
      fail:
        msg: >-
          Connectivity probe failed after the policy reload; reverted to
          {{ 'the previous known-good policy' if hs_prev.stat.exists
             else 'an explicit allow-all (first activation, no prior policy)' }}.
          Inspect `toolkit infra headscale probe`.
