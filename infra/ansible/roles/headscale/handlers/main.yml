---
# Headscale v0.28 has no HTTP /health endpoint — use docker inspect
- name: wait for headscale
  command: docker inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' headscale
  register: headscale_health
  retries: 12
  delay: 5
  until: headscale_health.stdout | trim == 'healthy'
  changed_when: false
