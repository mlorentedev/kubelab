---
# Reload the file-mode ACL policy with NO downtime (ADR-041 / VPN-ACL-001).
# Headscale hot-reloads ONLY the policy file, and only on SIGHUP. This deployment
# is Docker Compose (no systemd), so signal PID 1 (the `headscale serve` process)
# inside the container directly. This is NOT a restart — existing sessions are
# untouched. The server config.yaml is read only at startup and still needs a
# restart (handled in tasks/main.yml), hence the two separate change paths.
- name: reload headscale
  command: docker kill --signal=HUP headscale
  changed_when: true
