---
# --- Install ---
- name: Detect system architecture
  set_fact:
    docker_arch: "{{ 'arm64' if ansible_facts.architecture == 'aarch64' else 'amd64' }}"

- name: Remove old Docker packages
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Remove legacy Docker GPG key (.gpg format)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/keyrings/docker.gpg
    - /etc/apt/keyrings/docker.gpg~
  register: _legacy_gpg

- name: Remove old Docker repository entries (migration from .gpg to .asc)
  shell: rm -f /etc/apt/sources.list.d/*docker*
  when: _legacy_gpg is changed
  changed_when: true

- name: Ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts.distribution_release }} stable"
    state: present
    update_cache: true

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

# --- Configure (before starting daemon) ---
- name: Configure Docker daemon
  copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "{{ docker_log_max_size }}",
          "max-file": "{{ docker_log_max_files }}"
        },
        "storage-driver": "overlay2",
        "live-restore": true,
        "userland-proxy": false,
        "experimental": false,
        "ipv6": false,
        "fixed-cidr": "172.17.0.0/16",
        "default-address-pools": [
          {
            "base": "{{ docker_address_pool_base }}",
            "size": {{ docker_address_pool_size }}
          }
        ]
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: restart docker

- name: Configure system limits for containers
  copy:
    content: |
      # Container resource limits
      * soft nofile 65536
      * hard nofile 65536
      * soft nproc 32768
      * hard nproc 32768
      root soft nofile 65536
      root hard nofile 65536
    dest: /etc/security/limits.d/99-container-limits.conf
    mode: '0644'

- name: Configure sysctl for containers
  copy:
    content: |
      # Kernel parameters for containers
      vm.max_map_count=262144
      fs.file-max=2097152
      net.core.somaxconn=1024
      net.ipv4.ip_local_port_range=1024 65535
    dest: /etc/sysctl.d/99-container.conf
    mode: '0644'
  notify: reload sysctl

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

# --- Start daemon (config already in place) ---
- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Flush handlers (ensure Docker restarts if daemon.json changed)
  meta: flush_handlers

- name: Wait for Docker daemon to be ready
  command: docker info
  register: _docker_ready
  retries: 5
  delay: 3
  until: _docker_ready.rc == 0
  changed_when: false

# --- Post-start (daemon is running) ---
- name: Reset SSH connection for group changes
  meta: reset_connection

- name: Create Docker networks
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
    driver: bridge
  loop: "{{ [docker_network] + docker_additional_networks }}"

# --- Verification ---
- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Verify Docker Compose installation
  command: docker compose version
  register: docker_compose_version
  changed_when: false

- name: Display Docker versions
  debug:
    msg:
      - "Docker version: {{ docker_version.stdout }}"
      - "Docker Compose version: {{ docker_compose_version.stdout }}"

- name: Test Docker functionality
  command: docker run --rm hello-world
  register: docker_test
  changed_when: false
  ignore_errors: true

- name: Verify Docker is working
  assert:
    that:
      - docker_test.rc == 0
    fail_msg: "Docker installation test failed"
    success_msg: "Docker installation verified successfully"
