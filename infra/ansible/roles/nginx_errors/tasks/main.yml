---
# Error page source files live in edge/nginx/ (shared by dev, staging, prod).
# This role copies them to the remote host — zero duplication in the repo.

- name: Create nginx errors directory
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nginx_errors_remote_dir }}"
    - "{{ nginx_errors_remote_dir }}/errors"

- name: Copy nginx config
  copy:
    src: "{{ inventory_dir }}/../../../edge/nginx/configs/nginx.prod.conf"
    dest: "{{ nginx_errors_remote_dir }}/nginx.conf"
    mode: "0644"
  register: nginx_conf

- name: Copy error page assets
  copy:
    src: "{{ inventory_dir }}/../../../edge/nginx/assets/errors/"
    dest: "{{ nginx_errors_remote_dir }}/errors/"
    mode: "0644"
  register: nginx_assets

- name: Remove existing container (if config changed)
  community.docker.docker_container:
    name: "{{ nginx_errors_container_name }}"
    state: absent
  when: nginx_conf.changed or nginx_assets.changed

- name: Run nginx error pages container
  community.docker.docker_container:
    name: "{{ nginx_errors_container_name }}"
    image: "{{ nginx_errors_image }}"
    state: started
    restart_policy: "{{ restart_policy }}"
    networks:
      - name: "{{ docker_network }}"
    volumes:
      - "{{ nginx_errors_remote_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
      - "{{ nginx_errors_remote_dir }}/errors:/usr/share/nginx/html/errors:ro"
