---
- name: Configure passwordless sudo for ansible user
  copy:
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ ansible_user }}"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Ensure hostname resolves locally
  lineinfile:
    path: /etc/hosts
    regexp: '127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Configure static IP (netplan)
  copy:
    content: |
      network:
        version: 2
        ethernets:
          {{ netplan_interface }}:
            addresses:
              - {{ netplan_address }}
            routes:
              - to: default
                via: {{ netplan_gateway }}
            nameservers:
              addresses: {{ netplan_dns | default([netplan_gateway, '8.8.8.8']) }}
    dest: /etc/netplan/50-cloud-init.yaml
    mode: "0600"
  when: netplan_address is defined
  notify: apply netplan

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  when: not (legacy_python | default(false))

- name: Upgrade all packages
  apt:
    upgrade: dist
  when: not (legacy_python | default(false))

- name: Install base packages
  apt:
    name: "{{ base_packages }}"
    state: present
  when: not (legacy_python | default(false))

- name: Install base packages (legacy Python host)
  raw: apt-get update && apt-get install -y {{ base_packages | join(' ') }}
  when: legacy_python | default(false)

- name: Set timezone
  community.general.timezone:
    name: "{{ system_timezone }}"
  when: not (legacy_python | default(false))

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"
  when: inventory_hostname != ansible_facts.hostname | default('')

- name: Install UFW
  apt:
    name: ufw
    state: present
  when: firewall_enabled and not (legacy_python | default(false))

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  when: firewall_enabled and not (legacy_python | default(false))

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  when: firewall_enabled and not (legacy_python | default(false))

- name: Allow firewall ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
  loop: "{{ firewall_allowed_ports }}"
  when: firewall_enabled and not (legacy_python | default(false))

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled and not (legacy_python | default(false))
  notify: restart ufw

- name: Create deploy base directory
  file:
    path: "{{ deploy_base_dir }}"
    state: directory
    mode: "0755"

# --- Persistent journald (ANSIBLE-023) -------------------------------------
# rpi3 outage 2026-05-11 lost crash forensics because journald ran volatile.
# Storage=auto is unreliable on hosts where /var/log/journal lacks a machine-id
# subdir at journald start. Force persistent + cap size for low-disk nodes.
- name: Ensure persistent journal directory exists
  file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: "2755"
  tags: [base, logging, journald]

- name: Ensure journald drop-in dir exists
  file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [base, logging, journald]

# Filename prefix '99-' is intentional. On Raspberry Pi OS / Debian RPi images,
# /usr/lib/systemd/journald.conf.d/40-rpi-volatile-storage.conf ships
# Storage=volatile by default (preserves SD card life). systemd merges drop-ins
# lexicographically across /etc and /usr/lib, so '00-' would lose to '40-'.
# '99-' wins. Trade-off accepted: we cap SystemMaxUse to 20M to bound SD wear.
- name: Drop in kubelab journald config
  template:
    src: journald-kubelab.conf.j2
    dest: /etc/systemd/journald.conf.d/99-kubelab.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart systemd-journald
    - flush journald to persistent storage
  tags: [base, logging, journald]

- name: Remove legacy 00-kubelab.conf if present (renamed to 99-kubelab.conf)
  file:
    path: /etc/systemd/journald.conf.d/00-kubelab.conf
    state: absent
  notify:
    - restart systemd-journald
    - flush journald to persistent storage
  tags: [base, logging, journald]

# --- Logrotate cadence (ANSIBLE-023) ---------------------------------------
# Default logrotate.timer runs daily. A burst between runs can fill the FS
# even with per-file `size` directives, because those only evaluate when the
# timer fires. Hourly + jitter keeps disk bounded across the fleet.
- name: Ensure logrotate timer drop-in dir exists
  file:
    path: /etc/systemd/system/logrotate.timer.d
    state: directory
    mode: "0755"
  tags: [base, logging, logrotate]

- name: Drop in kubelab logrotate.timer override
  template:
    src: logrotate-timer-kubelab.conf.j2
    dest: /etc/systemd/system/logrotate.timer.d/00-kubelab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart logrotate timer
  tags: [base, logging, logrotate]

# --- rsyslog size cap (ANSIBLE-023) ----------------------------------------
# Skipped on nodes where /etc/logrotate.d/rsyslog is absent or empty (Debian
# trixie + rpi3 use journald-only). Only patches when a /var/log/syslog block
# is actually present so logrotate has something to rotate.
- name: Probe /etc/logrotate.d/rsyslog
  stat:
    path: /etc/logrotate.d/rsyslog
  register: _rsyslog_logrotate
  tags: [base, logging, logrotate]

- name: Detect /var/log/syslog block in rsyslog logrotate config
  command: grep -q '^/var/log/syslog$' /etc/logrotate.d/rsyslog
  register: _rsyslog_has_syslog_block
  changed_when: false
  failed_when: false
  when:
    - _rsyslog_logrotate.stat.exists
    - _rsyslog_logrotate.stat.size | int > 0
  tags: [base, logging, logrotate]

# ANSIBLE-025: the previous lineinfile used `insertafter: ^/var/log/syslog$`,
# which lands the directive BETWEEN the syslog path and the next entry — i.e.
# outside the `{ ... }` block, where logrotate treats it as a second path and
# silently ignores the cap. Ubuntu's stock rsyslog config groups 6 paths
# (syslog, mail.log, kern.log, auth.log, user.log, cron.log) into a single
# block, so the directive must land inside the shared `{ ... }`.
- name: Scrub mis-inserted size line after /var/log/syslog path (ANSIBLE-023 bug)
  ansible.builtin.replace:
    path: /etc/logrotate.d/rsyslog
    regexp: '(^/var/log/syslog\n)\s*size\s+\S+\n'
    replace: '\1'
  when:
    - _rsyslog_logrotate.stat.exists
    - _rsyslog_logrotate.stat.size | int > 0
    - _rsyslog_has_syslog_block.rc | default(1) == 0
  tags: [base, logging, logrotate]

# Capture the full path-group that contains /var/log/syslog up to and
# including the opening `{`, then inject the size cap immediately inside.
# Negative lookahead `(?!\s*size\s)` makes the task idempotent — on re-run,
# the next line after `{` is already `<ws>size <N>`, so no match.
- name: Cap shared /var/log/syslog block at {{ rsyslog_logrotate_size_cap }}
  ansible.builtin.replace:
    path: /etc/logrotate.d/rsyslog
    regexp: '(^(?:/var/log/\S+\n)*?/var/log/syslog\n(?:/var/log/\S+\n)*\{\n)(?!\s*size\s)'
    replace: '\1    size {{ rsyslog_logrotate_size_cap }}\n'
  when:
    - _rsyslog_logrotate.stat.exists
    - _rsyslog_logrotate.stat.size | int > 0
    - _rsyslog_has_syslog_block.rc | default(1) == 0
  tags: [base, logging, logrotate]
