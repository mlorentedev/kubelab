---
- name: Create deployment directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ minipc2_deploy_dir }}"
    - "{{ minipc2_minio_data_dir }}"
    - "{{ minipc2_runner_work_dir }}"

- name: Install QEMU user static for multi-arch builds
  apt:
    name: qemu-user-static
    state: present

- name: Register QEMU binfmt_misc
  command: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
  changed_when: true

- name: Create Docker buildx builder
  command: docker buildx create --name multiarch --driver docker-container --use
  become: false
  register: buildx_create
  changed_when: buildx_create.rc == 0
  failed_when: false

- name: Template Docker Compose stack
  template:
    src: compose.yml.j2
    dest: "{{ minipc2_deploy_dir }}/compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  notify: Restart minipc2 services

- name: Pull service images
  command: docker compose -f {{ minipc2_deploy_dir }}/compose.yml pull
  changed_when: false

- name: Start services
  command: docker compose -f {{ minipc2_deploy_dir }}/compose.yml up -d
  changed_when: true

- name: Wait for services to stabilize
  pause:
    seconds: 10

- name: Verify MinIO health
  uri:
    url: "http://localhost:{{ minio_api_port }}/minio/health/live"
    method: GET
    status_code: 200
    timeout: 10
  retries: 5
  delay: 5

- name: Report service status
  debug:
    msg: "MinIO healthy on port {{ minio_api_port }}, console on {{ minio_console_port }}"
