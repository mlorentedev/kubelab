# Argo CD Application — prod environment
# Syncs the full Kustomize overlay to the prod spoke
# Applied via: make deploy-apps
#
# selfHeal: true (ADR-037)
#
# Prod is the system of record. Any drift from master HEAD is a bug or an
# intrusion; Argo CD must self-correct it immediately. The companion
# `applications/staging.yaml` keeps `selfHeal: false` because staging is
# a mutable test bed. See ADR-037 for the full rationale.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubelab-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubelab
    kubelab.live/env: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mlorentedev/kubelab.git
    targetRevision: master
    path: infra/k8s/overlays/prod
  destination:
    name: prod
    namespace: kubelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
