# Argo CD Application — staging environment
# Syncs the full Kustomize overlay to the staging spoke
# Applied via: make deploy-apps
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubelab-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kubelab
    kubelab.live/env: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mlorentedev/kubelab.git
    targetRevision: master
    path: infra/k8s/overlays/staging
  destination:
    name: staging
    namespace: kubelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
