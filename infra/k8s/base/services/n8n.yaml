---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
data:
  # Domain from: apps.services.core.n8n.domain (staging.yaml)
  N8N_HOST: "n8n.staging.kubelab.live"
  N8N_PROTOCOL: "https"
  WEBHOOK_URL: "https://n8n.staging.kubelab.live/"
  N8N_PROXY_HOPS: "1"
  DB_TYPE: "sqlite"
  GENERIC_TIMEZONE: "Europe/Madrid"
  N8N_LOG_LEVEL: "info"
  N8N_LOG_OUTPUT: "console"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: kubelab
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: core
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:2.12.3
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 512Mi
              cpu: "1.0"
            requests:
              memory: 256Mi
              cpu: "0.2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: kubelab
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: kubelab
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: crowdsec-bouncer
      services:
        - name: n8n
          port: 5678
  tls:
    certResolver: letsencrypt
