---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
data:
  # Domain from: apps.services.core.gitea.domain (staging.yaml)
  GITEA__database__DB_TYPE: "sqlite3"
  GITEA__server__DOMAIN: "gitea.staging.kubelab.live"
  GITEA__server__ROOT_URL: "https://gitea.staging.kubelab.live/"
  GITEA__server__SSH_PORT: "30222"
  GITEA__server__SSH_LISTEN_PORT: "2222"
  GITEA__server__SSH_DOMAIN: "gitea.staging.kubelab.live"
  GITEA__service__DISABLE_REGISTRATION: "true"
  GITEA__openid__ENABLE_OPENID_SIGNIN: "false"
  GITEA__openid__ENABLE_OPENID_SIGNUP: "false"
  GITEA__log__MODE: "console"
  GITEA__log__LEVEL: "Info"
  # OIDC discovery URL — overridden in prod overlay
  GITEA_OIDC_DISCOVERY_URL: "https://auth.staging.kubelab.live/.well-known/openid-configuration"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/component: core
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.25.5
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 2222
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gitea-config
          env:
            - name: GITEA__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: SECRET_KEY
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_USER
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_PASSWORD
            - name: GITEA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_EMAIL
            - name: GITEA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: OIDC_CLIENT_SECRET
          # Idempotent bootstrap: admin user + OIDC provider on every start.
          # Script in ConfigMap — maintainable, versionable, testable.
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "/scripts/bootstrap.sh"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: bootstrap-scripts
              mountPath: /scripts
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: bootstrap-scripts
          configMap:
            name: gitea-bootstrap
            defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-bootstrap
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
data:
  bootstrap.sh: |
    #!/bin/sh
    # Gitea idempotent bootstrap: admin user + OIDC provider.
    # Runs as postStart hook on every pod start.
    # Env vars: GITEA_ADMIN_USER, GITEA_ADMIN_PASSWORD, GITEA_ADMIN_EMAIL,
    #           GITEA_OIDC_CLIENT_SECRET, GITEA_OIDC_DISCOVERY_URL

    log() { echo "[gitea-bootstrap] $1"; }

    # --- Wait for Gitea ready ---
    for i in $(seq 1 15); do
      wget -qO- http://localhost:3000/api/v1/version >/dev/null 2>&1 && break
      sleep 2
    done
    if ! wget -qO- http://localhost:3000/api/v1/version >/dev/null 2>&1; then
      log "ERROR: Gitea not ready after 30s"
      exit 1
    fi

    # --- Admin user (idempotent + migration) ---
    USER_LIST=$(su git -c "gitea admin user list" 2>/dev/null || true)

    if echo "$USER_LIST" | grep -q "$GITEA_ADMIN_USER"; then
      log "Admin user '$GITEA_ADMIN_USER' exists"
    elif echo "$USER_LIST" | grep -q "admin"; then
      # Migration: old "admin" user exists, rename via SQLite
      log "Migrating admin user: admin -> $GITEA_ADMIN_USER"
      GITEA_DB="/data/gitea/gitea.db"
      if [ -f "$GITEA_DB" ]; then
        LOWER=$(echo "$GITEA_ADMIN_USER" | tr '[:upper:]' '[:lower:]')
        sqlite3 "$GITEA_DB" \
          "UPDATE user SET name='$GITEA_ADMIN_USER', lower_name='$LOWER' WHERE lower_name='admin' AND is_admin=1;"
        log "Migration complete (SQLite updated)"
      else
        log "WARNING: DB not found at $GITEA_DB, creating new user instead"
        su git -c "gitea admin user create --admin \
          --username $GITEA_ADMIN_USER \
          --password $GITEA_ADMIN_PASSWORD \
          --email $GITEA_ADMIN_EMAIL \
          --must-change-password=false"
        log "Created admin user '$GITEA_ADMIN_USER'"
      fi
    else
      # Fresh install
      su git -c "gitea admin user create --admin \
        --username $GITEA_ADMIN_USER \
        --password $GITEA_ADMIN_PASSWORD \
        --email $GITEA_ADMIN_EMAIL \
        --must-change-password=false"
      log "Created admin user '$GITEA_ADMIN_USER'"
    fi

    # --- OIDC provider (idempotent) ---
    if [ -z "$GITEA_OIDC_CLIENT_SECRET" ] || [ -z "$GITEA_OIDC_DISCOVERY_URL" ]; then
      log "OIDC env vars not set, skipping OIDC setup"
      exit 0
    fi

    AUTH_ID=$(su git -c "gitea admin auth list" 2>/dev/null \
      | grep -i authelia | awk '{print $1}' || true)

    if [ -n "$AUTH_ID" ]; then
      su git -c "gitea admin auth update-oauth --id $AUTH_ID \
        --name authelia \
        --provider openidConnect \
        --key gitea \
        --secret $GITEA_OIDC_CLIENT_SECRET \
        --auto-discover-url $GITEA_OIDC_DISCOVERY_URL \
        --scopes openid,profile,email,groups"
      log "Updated OIDC provider (ID=$AUTH_ID)"
    else
      su git -c "gitea admin auth add-oauth \
        --name authelia \
        --provider openidConnect \
        --key gitea \
        --secret $GITEA_OIDC_CLIENT_SECRET \
        --auto-discover-url $GITEA_OIDC_DISCOVERY_URL \
        --scopes openid,profile,email,groups"
      log "Created OIDC provider"
    fi
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-ssh
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
      nodePort: 30222
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: gitea
          port: 3000
  tls:
    certResolver: letsencrypt
