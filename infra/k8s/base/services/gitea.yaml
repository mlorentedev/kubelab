---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
data:
  # Domain from: apps.services.core.gitea.domain (staging.yaml)
  GITEA__database__DB_TYPE: "sqlite3"
  GITEA__server__DOMAIN: "gitea.staging.kubelab.live"
  GITEA__server__ROOT_URL: "https://gitea.staging.kubelab.live/"
  GITEA__server__SSH_PORT: "30222"
  GITEA__server__SSH_LISTEN_PORT: "2222"
  GITEA__server__SSH_DOMAIN: "gitea.staging.kubelab.live"
  GITEA__service__DISABLE_REGISTRATION: "true"
  GITEA__openid__ENABLE_OPENID_SIGNIN: "false"
  GITEA__openid__ENABLE_OPENID_SIGNUP: "false"
  GITEA__log__MODE: "console"
  GITEA__log__LEVEL: "Info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
        app.kubernetes.io/component: core
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.25.5
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 2222
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gitea-config
          env:
            - name: GITEA__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: SECRET_KEY
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_USER
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_PASSWORD
            - name: GITEA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: ADMIN_EMAIL
          # Auto-create admin user on first start (idempotent)
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 5
                    su git -c "gitea admin user list 2>/dev/null | grep -q $GITEA_ADMIN_USER" || \
                    su git -c "gitea admin user create \
                      --admin \
                      --username $GITEA_ADMIN_USER \
                      --password $GITEA_ADMIN_PASSWORD \
                      --email $GITEA_ADMIN_EMAIL \
                      --must-change-password=false" 2>/dev/null || true
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-ssh
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
      nodePort: 30222
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: kubelab
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: gitea
          port: 3000
  tls:
    certResolver: letsencrypt
