- Network:
    - Cloudflare:
        icon: si-cloudflare
        href: https://dash.cloudflare.com
        description: DNS analytics
        widget:
          type: customapi
          url: https://api.cloudflare.com/client/v4/graphql
          method: POST
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_CLOUDFLARE_TOKEN}}"
            Content-Type: application/json
          requestBody:
            # yamllint disable-line rule:line-length
            query: '{ viewer { zones(filter: {zoneTag: "a708cb04dd4572e76eb6da42cc09507d"}) { httpRequests1dGroups(limit: 1, filter: {date_gt: "2026-03-26"}) { sum { requests threats } } } } }'
          mappings:
            - field: data.viewer.zones.0.httpRequests1dGroups.0.sum.requests
              label: Requests
              format: number
            - field: data.viewer.zones.0.httpRequests1dGroups.0.sum.threats
              label: Threats
              format: number
    - Uptime Kuma:
        icon: si-uptimekuma
        href: https://status.kubelab.live
        description: RPi3 · Status
        widget:
          type: uptimekuma
          url: http://100.64.0.6:3001
          slug: kubelab
    - Traefik Stg:
        icon: si-traefikproxy
        href: https://traefik.staging.kubelab.live/dashboard/
        description: Staging proxy
        widget:
          type: traefik
          url: http://10.43.86.38:9000
    - Traefik Prod:
