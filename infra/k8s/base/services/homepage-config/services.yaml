    - Cloudflare:
        icon: si-cloudflare
        href: https://dash.cloudflare.com
        description: DNS analytics
        widget:
          type: customapi
          url: https://api.cloudflare.com/client/v4/graphql
          method: POST
          headers:
            Authorization: "Bearer {{HOMEPAGE_VAR_CLOUDFLARE_TOKEN}}"
            Content-Type: application/json
          requestBody:
            # yamllint disable-line rule:line-length
            query: '{ viewer { zones(filter: {zoneTag: "a708cb04dd4572e76eb6da42cc09507d"}) { httpRequests1dGroups(limit: 1, filter: {date_gt: "2026-03-25"}) { sum { requests threats } } } } }'
          mappings:
            - field: data.viewer.zones.0.httpRequests1dGroups.0.sum.requests
              label: Requests
              format: number
            - field: data.viewer.zones.0.httpRequests1dGroups.0.sum.threats
              label: Threats
              format: number
