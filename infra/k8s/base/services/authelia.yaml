---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: authelia
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authelia
        app.kubernetes.io/component: security
        app.kubernetes.io/part-of: kubelab
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: authelia
          image: authelia/authelia:4.39.15
          ports:
            - name: http
              containerPort: 9091
              protocol: TCP
          env:
            - name: AUTHELIA_SESSION_SECRET_FILE
              value: /run/secrets/session_secret
            - name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
              value: /run/secrets/storage_encryption_key
            - name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
              value: /run/secrets/jwt_secret
            - name: AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE
              value: /run/secrets/smtp_password
            - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE
              value: /run/secrets/oidc_hmac_secret
            - name: AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY_FILE
              value: /run/secrets/oidc_jwks_key
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: users
              mountPath: /config/users
              readOnly: true
            - name: assets
              mountPath: /config/assets
              readOnly: true
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: assets
          configMap:
            name: authelia-assets
        - name: users
          secret:
            secretName: authelia-users
        - name: secrets
          secret:
            secretName: authelia-secrets
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: authelia
  ports:
    - name: http
      port: 9091
      targetPort: http
      protocol: TCP
---
# Traefik ForwardAuth Middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  forwardAuth:
    address: http://authelia.kubelab.svc.cluster.local:9091/api/authz/forward-auth
    trustForwardHeader: true
    authRequestHeaders:
      - Cookie
      - Accept
      - X-Forwarded-For
      - X-Forwarded-Host
      - X-Forwarded-Proto
      - X-Forwarded-URI
      - X-Forwarded-Method
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name
---
# Authelia portal IngressRoute — secure-headers applied so HSTS is present
# on all responses (including redirects from other services via forwardAuth).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
      services:
        - name: authelia
          port: 9091
  tls:
    certResolver: letsencrypt
