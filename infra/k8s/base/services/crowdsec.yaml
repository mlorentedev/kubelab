---
# Log acquisition config — no sources in base; extend per-overlay if needed
apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-acquis
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
data:
  acquis.yaml: |
    # File source pointing to an emptyDir volume — satisfies CrowdSec's
    # "at least one datasource" requirement while running as LAPI-only.
    # Replace with real Traefik log path to enable actual log parsing.
    filenames:
      - /var/log/traefik/access.log
    labels:
      type: traefik
---
# Whitelist for Tailscale VPN subnet — prevents CrowdSec from creating
# ban decisions for internal traffic coming through the VPN mesh.
# Source of truth: networking.tailscale_cidr in infra/config/values/common.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-whitelist
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
data:
  tailscale-whitelist.yaml: |
    name: local/tailscale-whitelist
    description: "Whitelist Tailscale VPN subnet"
    whitelist:
      reason: "Tailscale VPN internal traffic"
      cidr:
        - "100.64.0.0/10"  # Must match networking.tailscale_cidr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-db
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 64Mi
---
# CrowdSec LAPI agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec
        app.kubernetes.io/component: security
        app.kubernetes.io/part-of: kubelab
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: inject-whitelist
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /etc/crowdsec/postoverflows/s01-whitelist
              cp /whitelist/tailscale-whitelist.yaml /etc/crowdsec/postoverflows/s01-whitelist/
          volumeMounts:
            - name: config
              mountPath: /etc/crowdsec
            - name: whitelist
              mountPath: /whitelist
              readOnly: true
      containers:
        - name: crowdsec
          image: crowdsecurity/crowdsec:v1.7.6
          # Idempotent bouncer registration: delete-then-add on every start.
          # BOUNCER_KEY_* auto-registers only on first run. This hook guarantees
          # the bouncer is always registered, even after DB corruption or PVC wipe.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      wget -qO- http://localhost:8080/health >/dev/null 2>&1 && break
                      sleep 2
                    done
                    if ! wget -qO- http://localhost:8080/health >/dev/null 2>&1; then
                      echo "ERROR: CrowdSec LAPI not ready after 60s" >&2
                      exit 1
                    fi
                    cscli bouncers delete crowdsec-bouncer 2>/dev/null || true
                    cscli bouncers add crowdsec-bouncer \
                      --key "$(printenv 'BOUNCER_KEY_crowdsec-bouncer')"
          ports:
            - name: lapi
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 6060
              protocol: TCP
          env:
            - name: GID
              value: "1000"
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/linux"
            - name: BOUNCER_KEY_crowdsec-bouncer
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer
                  key: api-key
          volumeMounts:
            - name: acquis
              mountPath: /etc/crowdsec/acquis.yaml
              subPath: acquis.yaml
              readOnly: true
            - name: db
              mountPath: /var/lib/crowdsec/data
            - name: config
              mountPath: /etc/crowdsec
            - name: traefik-logs
              mountPath: /var/log/traefik
          livenessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: acquis
          configMap:
            name: crowdsec-acquis
        - name: whitelist
          configMap:
            name: crowdsec-whitelist
        - name: db
          persistentVolumeClaim:
            claimName: crowdsec-db
        - name: config
          persistentVolumeClaim:
            claimName: crowdsec-config
        - name: traefik-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: crowdsec
  ports:
    - name: lapi
      port: 8080
      targetPort: lapi
      protocol: TCP
---
# CrowdSec Traefik bouncer plugin (SEC-003: replaces deprecated fbonalair ForwardAuth sidecar)
# Runs natively inside Traefik — no separate pod required.
# API key read from file mounted by Traefik via HelmChartConfig volumes.
# Key source: K8s Secret "crowdsec-bouncer-traefik" in kube-system namespace.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec-bouncer
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec-bouncer
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
spec:
  plugin:
    bouncer:
      enabled: true
      crowdsecMode: stream
      updateIntervalSeconds: 60
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec.kubelab.svc.cluster.local:8080
      crowdsecLapiKeyFile: /etc/traefik/crowdsec/api-key
      clientTrustedIPs:
        - "100.64.0.0/10"  # Must match networking.tailscale_cidr in common.yaml
