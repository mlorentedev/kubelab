---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apprise-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: apprise
    app.kubernetes.io/component: automation
    app.kubernetes.io/part-of: kubelab
data:
  # Delivery gateway (ADR-044: "converge the brain, specialize the egress").
  # n8n is the brain ({domain,severity}→tag); Apprise owns the tag→URL routing
  # table (Option B). STATEFUL_MODE=simple maps a {KEY} straight to /config/{KEY}.yml,
  # so n8n POSTs /notify/kubelab with a tag and Apprise resolves the channel(s).
  # The config is mounted read-only from the apprise-secrets Secret (rendered from
  # SOPS by the toolkit) — no writable volume, no PVC.
  APPRISE_STATEFUL_MODE: "simple"
  # Cap gunicorn workers: the image defaults to (2*CPUs)+1, which OOMs on a
  # multi-core node. This is a low-QPS internal egress muxer — 2 is ample.
  APPRISE_WORKER_COUNT: "2"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: kubelab
  labels:
    app.kubernetes.io/name: apprise
    app.kubernetes.io/component: automation
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: apprise
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apprise
        app.kubernetes.io/component: automation
        app.kubernetes.io/part-of: kubelab
    spec:
      enableServiceLinks: false
      containers:
        - name: apprise
          image: caronc/apprise:1.5.0
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: apprise-config
          volumeMounts:
            # Routing table (tag → tgram URL), rendered from SOPS into kubelab.yml.
            # simple mode reads /config/{KEY}.yml → POST /notify/kubelab resolves tags.
            - name: routing-config
              mountPath: /config
              readOnly: true
            # Apprise's stateful store lives at /config/store, but the read-only
            # Secret mount above makes /config unwritable → storage init fails,
            # apprise falls back to MEMORY mode and /status returns 417, so the
            # readiness probe never passes. Give the store its own writable
            # emptyDir (nested mount) — ephemeral is fine for an egress muxer.
            - name: apprise-store
              mountPath: /config/store
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              # 2 gunicorn workers (APPRISE_WORKER_COUNT) peak ~180Mi; 384Mi gives
              # startup headroom and avoids the OOMKill seen with the image default.
              memory: 384Mi
              cpu: "0.5"
            requests:
              memory: 96Mi
              cpu: "0.1"
      volumes:
        - name: routing-config
          secret:
            # apprise-secrets carries a single key, kubelab.yml (the rendered
            # routing table); mounted read-only as /config/kubelab.yml.
            secretName: apprise-secrets
        - name: apprise-store
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apprise
  namespace: kubelab
  labels:
    app.kubernetes.io/name: apprise
    app.kubernetes.io/component: automation
    app.kubernetes.io/part-of: kubelab
spec:
  # Cluster-internal only: no IngressRoute. Reached by n8n at http://apprise:8000/notify/
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apprise
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
