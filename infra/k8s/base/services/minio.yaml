---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
data:
  # Domain from: apps.services.data.minio.domain (staging.yaml)
  # CRITICAL: MINIO_SERVER_URL must use internal K8s service URL, NOT public HTTPS
  # See 90-lessons.md — external URL causes redirect loops
  MINIO_SERVER_URL: "http://minio:9000"
  MINIO_BROWSER_REDIRECT_URL: "https://console.minio.staging.kubelab.live"
  # OIDC via Authelia — domain from: apps.services.security.authelia.domain
  MINIO_IDENTITY_OPENID_CONFIG_URL: "https://auth.staging.kubelab.live/.well-known/openid-configuration"
  MINIO_IDENTITY_OPENID_CLIENT_ID: "minio"
  MINIO_IDENTITY_OPENID_DISPLAY_NAME: "Authelia"
  MINIO_IDENTITY_OPENID_SCOPES: "openid,profile,email"
  MINIO_IDENTITY_OPENID_REDIRECT_URI: "https://console.minio.staging.kubelab.live/oauth_callback"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: data
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-02-18T16-25-55Z
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: minio-config
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_IDENTITY_OPENID_CLIENT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 512Mi
              cpu: "1.0"
            requests:
              memory: 256Mi
              cpu: "0.2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
---
# MinIO API IngressRoute
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-api
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minio.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: minio
          port: 9000
  tls:
    certResolver: letsencrypt
---
# MinIO Console IngressRoute (OIDC login — no authelia middleware)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: minio-console
  namespace: kubelab
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`console.minio.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: minio
          port: 9001
  tls:
    certResolver: letsencrypt
