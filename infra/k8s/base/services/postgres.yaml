---
# Shared data-service (ADR-051, implements ADR-050 D7). House style mirrors
# gitea.yaml: Deployment(replicas:1, Recreate) + separate PVC + ClusterIP Service.
# Single replica, no HA — matches every stateful service in the repo (ADR-029).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: kubelab
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kubelab
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: data
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            # POSTGRES_DB / POSTGRES_USER are non-secrets — literals mirroring the
            # common.yaml SSOT keys (gitea pattern: static base manifest, SSOT in
            # a comment). The password is the only secret (infra.postgres.password
            # in SOPS → postgres-secrets, applied via `toolkit secrets apply`).
            - name: POSTGRES_DB
              value: "kubelab"  # infra.postgres.database
            - name: POSTGRES_USER
              value: "kubelab"  # infra.postgres.username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            # PGDATA in a sub-directory of the mount — the official image's
            # recommended layout when the volume is mounted at the data root.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: [pg_isready, -U, kubelab, -d, kubelab]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: [pg_isready, -U, kubelab, -d, kubelab]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubelab
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
