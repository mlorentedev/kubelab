---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector-logs
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector-logs
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector-logs
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: kubelab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: kubelab
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: kubelab
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        self_node_name: "${VECTOR_SELF_NODE_NAME}"

    transforms:
      parse_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          .namespace = .kubernetes.pod_namespace
          .pod = .kubernetes.pod_name
          .container = .kubernetes.container_name
          .node = .kubernetes.pod_node_name
          del(.kubernetes)
          del(.file)
          del(.source_type)

    sinks:
      loki:
        type: loki
        inputs:
          - parse_logs
        endpoint: http://loki.kubelab.svc.cluster.local:3100
        encoding:
          codec: text
        labels:
          namespace: "{{ namespace }}"
          pod: "{{ pod }}"
          container: "{{ container }}"
          node: "{{ node }}"
        remove_label_fields: true
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: kubelab
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: kubelab
    spec:
      serviceAccountName: vector
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: vector
          image: timberio/vector:0.43.1-alpine
          args:
            - --config-dir
            - /etc/vector/
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: api
              containerPort: 8686
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /vector-data-dir
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib-docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: pods-log
              mountPath: /var/log/pods
              readOnly: true
          resources:
            limits:
              memory: 128Mi
              cpu: "0.25"
            requests:
              memory: 64Mi
              cpu: "0.1"
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib-docker
          hostPath:
            path: /var/lib/docker
        - name: pods-log
          hostPath:
            path: /var/log/pods
