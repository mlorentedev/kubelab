---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: kubelab
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: kubelab
    spec:
      automountServiceAccountToken: false
      containers:
        - name: portfolio
          # Image tag managed by CI — staging uses rc tags, prod uses release tags
          image: mlorentedev/kubelab-portfolio:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: kubelab
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: portfolio
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# Staging IngressRoute — domain: portfolio.staging.kubelab.live
# Prod overlay patches to mlorente.dev
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portfolio
  namespace: kubelab
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`portfolio.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: portfolio
          port: 8080
  tls:
    certResolver: letsencrypt
