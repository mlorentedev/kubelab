apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubelab

resources:
  - namespace.yaml
  - external/ollama.yaml
  - edge/nginx-errors.yaml
  - services/grafana.yaml
  - services/loki.yaml
  - services/vector.yaml
  - services/redis.yaml

configMapGenerator:
  - name: grafana-dashboards
    namespace: kubelab
    files:
      - services/grafana-dashboards/kubelab-logs-overview.json
    options:
      disableNameSuffixHash: true
