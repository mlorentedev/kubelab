apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubelab

resources:
  - namespace.yaml
  - external/ollama.yaml
  - edge/nginx-errors.yaml
  - services/grafana.yaml
  - services/loki.yaml
  - services/vector.yaml
  - services/redis.yaml
  - services/authelia.yaml

configMapGenerator:
  - name: authelia-assets
    namespace: kubelab
    files:
      - services/authelia-assets/logo.png
      - services/authelia-assets/favicon.ico
    options:
      disableNameSuffixHash: true

  - name: grafana-dashboards
    namespace: kubelab
    files:
      - services/grafana-dashboards/kubelab-logs-overview.json
    options:
      disableNameSuffixHash: true
