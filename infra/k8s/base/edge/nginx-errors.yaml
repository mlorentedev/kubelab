              color: var(--color-text);
              height: 100vh; margin: 0;
              display: flex; align-items: center;
              justify-content: center; text-align: center;
            }
            .container { max-width: 600px; padding: 2rem; }
            h1 { font-size: 6rem; margin: 0; color: var(--color-accent); line-height: 1; font-weight: 700; }
            h2 { font-size: 2rem; margin: 1rem 0 0.5rem; font-weight: 600; }
            p { color: var(--color-gray); font-size: 1.125rem; line-height: 1.6; margin-bottom: 2rem; }
            .btn {
              display: inline-block;
              padding: 0.75rem 1.5rem;
              background-color: var(--color-text);
              color: white; text-decoration: none;
              border-radius: 0.5rem; font-weight: 500;
              transition: opacity 0.2s;
            }
            .btn:hover { opacity: 0.9; }
            @media (max-width: 640px) { h1 { font-size: 4rem; } h2 { font-size: 1.5rem; } }
        </style>
    </head>
