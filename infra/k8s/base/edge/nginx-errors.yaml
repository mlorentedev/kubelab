        <title>403 - Acceso Denegado</title>
        <style>
            :root { --color-bg: #f8f9fa; --color-text: #0f1219; --color-accent: #2337ff; --color-gray: #60739f; }
            body {
              font-family: system-ui, -apple-system, sans-serif;
