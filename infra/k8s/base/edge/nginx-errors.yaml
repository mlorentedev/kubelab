---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-errors
  namespace: kubelab
  labels:
    app.kubernetes.io/name: nginx-errors
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: kubelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-errors
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-errors
        app.kubernetes.io/component: edge
        app.kubernetes.io/part-of: kubelab
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: error-pages
              mountPath: /usr/share/nginx/html/errors
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits:
              memory: 64Mi
              cpu: "0.1"
            requests:
              memory: 32Mi
              cpu: "0.05"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-errors-config
        - name: error-pages
          configMap:
            name: nginx-errors-pages
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-errors
  namespace: kubelab
  labels:
    app.kubernetes.io/name: nginx-errors
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: kubelab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nginx-errors
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: error-pages
  namespace: kubelab
  labels:
    app.kubernetes.io/name: nginx-errors
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: kubelab
spec:
  errors:
    status:
      - "400"
      - "402-599"
    service:
      name: nginx-errors
      port: 80
    query: "/errors/{status}.html"
---
# Catch-all route: any unmatched *.staging.kubelab.live → error page
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catch-all
  namespace: kubelab
  labels:
    app.kubernetes.io/name: nginx-errors
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostRegexp(`.+\.staging\.kubelab\.live`)
      kind: Rule
      priority: 1
      services:
        - name: nginx-errors
          port: 80
  tls:
    certResolver: letsencrypt
