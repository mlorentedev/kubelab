---
# Hairpin DNS: allow K3s pods to resolve staging/prod domains.
#
# Problem: K3s CoreDNS (10.43.0.10) only knows K8s service names.
# Pods calling external domains (e.g. Gitea→Authelia OIDC token exchange)
# fail with "no such host". This is standard K8s split-horizon DNS.
#
# Solution: forward staging zones to RPi4 CoreDNS (100.64.0.10) which is
# already the authoritative resolver for staging domains.
#
# K3s loads this via: import /etc/coredns/custom/*.server
# Applied separately (kube-system, NOT via the Kustomize kubelab overlay) by the toolkit
# through the cluster_bootstrap layer (ADR-047/TOOL-009): `RESOLVE_RPI4_TAILSCALE_IP` is
# rendered via MagicDNS at deploy time (RPi4's Tailscale IP rotates on re-registration,
# ADR-025) and server-side applied by `make deploy-k8s`. Declared in common.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  kubelab-hairpin.server: |
    staging.kubelab.live:53 {
      forward . RESOLVE_RPI4_TAILSCALE_IP
    }
    staging.mlorente.dev:53 {
      forward . RESOLVE_RPI4_TAILSCALE_IP
    }
    kubelab.live:53 {
      rewrite name regex (.*)\.kubelab\.live traefik.kube-system.svc.cluster.local
      forward . 10.43.0.10
    }
    mlorente.dev:53 {
      rewrite name regex (.*)\.mlorente\.dev traefik.kube-system.svc.cluster.local
      forward . 10.43.0.10
    }
