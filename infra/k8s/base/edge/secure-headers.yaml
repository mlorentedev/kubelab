---
# Traefik Middleware: Security headers applied to all IngressRoutes.
# Equivalent of secure-headers@file in Docker Compose Traefik config.
# Source of truth for header values: edge.traefik.headers_* in common.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: kubelab
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: kubelab
spec:
  headers:
    frameDeny: true
    browserXssFilter: true
    contentTypeNosniff: true
    referrerPolicy: strict-origin-when-cross-origin
    # yamllint disable-line rule:line-length
    contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.github.com https://api.cloudflare.com; frame-ancestors 'self'"
    permissionsPolicy: camera=(), microphone=(), geolocation=(), payment=()
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    sslRedirect: true
