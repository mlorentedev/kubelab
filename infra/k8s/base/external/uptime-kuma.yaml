# External service proxy for Uptime Kuma running on RPi3
# RPi3 is NOT part of K3s — standalone Docker host
# Proxied through K3s Traefik for HTTPS termination and security headers
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: kubelab
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: kubelab
    kubelab.live/location: external
  annotations:
    kubelab.live/host: kubelab-rpi3
    kubelab.live/description: "Uptime Kuma on RPi3 bare metal (100.64.0.6)"
spec:
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: uptime-kuma-external
  namespace: kubelab
  labels:
    kubernetes.io/service-name: uptime-kuma
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: kubelab
addressType: IPv4
ports:
  - name: http
    port: 3001
    protocol: TCP
endpoints:
  # networking.nodes.rpi3.tailscale_ip (common.yaml)
  - addresses:
      - "100.64.0.6"
    conditions:
      ready: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: kubelab
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`status.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
        - name: error-pages
        - name: crowdsec-bouncer
      services:
        - name: uptime-kuma
          port: 3001
