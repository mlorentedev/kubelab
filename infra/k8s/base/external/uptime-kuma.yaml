---
# Uptime Kuma — external service on RPi3 (100.64.0.6:3001)
# Proxied through K3s Traefik as status.{staging.}kubelab.live
# Source of truth: networking.nodes.rpi3.tailscale_ip in common.yaml
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: kubelab
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
    kubelab.live/location: external
  annotations:
    kubelab.live/host: kubelab-rpi3
    kubelab.live/description: "Uptime Kuma on RPi3 bare metal (100.64.0.6)"
spec:
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: uptime-kuma-external
  namespace: kubelab
  labels:
    kubernetes.io/service-name: uptime-kuma
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
addressType: IPv4
ports:
  - name: http
    port: 3001
    protocol: TCP
endpoints:
  - addresses:
      - "RESOLVE_RPI3_TAILSCALE_IP"  # resolved at deploy time via: dig rpi3.kubelab.internal
    conditions:
      ready: true
---
# IngressRoute for status.staging.kubelab.live (base = staging domain)
# Prod overlay patches this to status.kubelab.live
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: kubelab
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
    kubelab.live/location: external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`status.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: error-pages
      services:
        - name: uptime-kuma
          port: 3001
  tls:
    certResolver: letsencrypt
