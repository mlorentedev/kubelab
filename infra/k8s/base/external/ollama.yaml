apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kubelab
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: llm
    app.kubernetes.io/part-of: kubelab
    kubelab.live/location: external
  annotations:
    kubelab.live/host: kubelab-bee
    kubelab.live/description: "Ollama LLM API on Beelink bare metal (172.16.1.3)"
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama-external
  namespace: kubelab
  labels:
    kubernetes.io/service-name: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: llm
    app.kubernetes.io/part-of: kubelab
addressType: IPv4
ports:
  - name: http
    port: 11434
    protocol: TCP
endpoints:
  - addresses:
      - "172.16.1.3"
    conditions:
      ready: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ollama
  namespace: kubelab
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: llm
    app.kubernetes.io/part-of: kubelab
    kubelab.live/location: external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ollama.staging.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: kubelab
        - name: crowdsec-bouncer
          namespace: kubelab
      services:
        - name: ollama
          port: 11434
  tls:
    certResolver: letsencrypt
