---
# PUBLIC: No auth, internet-facing (crowdsec + error-pages)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api
  namespace: kubelab
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: kubelab
    app.kubernetes.io/managed-by: toolkit
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: kubelab
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: error-pages
          namespace: kubelab
      services:
        - name: api
          port: 8080
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
  namespace: kubelab
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: kubelab
    app.kubernetes.io/managed-by: toolkit
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mlorente.dev`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: kubelab
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: error-pages
          namespace: kubelab
      services:
        - name: web
          port: 8080
  tls:
    certResolver: letsencrypt
