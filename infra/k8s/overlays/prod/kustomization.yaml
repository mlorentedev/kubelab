apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubelab

resources:
  - ../../base
  - generated/deployments.yaml
  - generated/services.yaml
  - generated/configmaps.yaml
  - generated/ingress.yaml
  - redirect-kubelab.yaml
  - backup.yaml
  - traefik-dashboard.yaml
  - headscale.yaml
  # argocd.yaml excluded — has RESOLVE_AWS1_TAILSCALE_IP placeholder,
  # applied by `make deploy-argocd` with dynamic IP resolution (MagicDNS)
  # secrets managed via: toolkit infra k8s apply-secrets --env prod (ADR-014)

# Override base resources with prod-specific domains and config
patches:
  - path: patches.yaml
