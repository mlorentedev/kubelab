apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubelab

resources:
  - ../../base
  - deployments.yaml
  - services.yaml
  - configmaps.yaml
  - ingress.yaml
  - secrets.yaml

# Override base resources with prod-specific domains and config
patches:
  - path: patches.yaml
