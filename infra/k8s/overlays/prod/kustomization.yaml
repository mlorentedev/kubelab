apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubelab

resources:
  - ../../base
  - generated/deployments.yaml
  - generated/services.yaml
  - generated/configmaps.yaml
  - generated/ingress.yaml
  - redirect-kubelab.yaml
  - backup.yaml
  - traefik-dashboard.yaml
  - headscale.yaml
  - ollama-throttle.yaml
  # argocd.yaml excluded — has RESOLVE_AWS1_TAILSCALE_IP placeholder,
  # applied by `make deploy-argocd` with dynamic IP resolution (MagicDNS)
  # secrets managed via: toolkit infra k8s apply-secrets --env prod (ADR-014)

# Override base authelia-config with prod-specific domains, policies, OIDC clients.
# Hash suffix triggers auto rolling restart on change (SECRET-RELOAD-001a refactor).
# Replaces the base-generated authelia-config ConfigMap.
configMapGenerator:
  - name: authelia-config
    namespace: kubelab
    behavior: replace
    files:
      - authelia-config/configuration.yml

# Override base resources with prod-specific domains and config
patches:
  - path: patches.yaml
