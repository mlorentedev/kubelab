---
# Override base uptime-kuma IngressRoute with prod domain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`status.kubelab.live`)
      kind: Rule
      middlewares:
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: error-pages
      services:
        - name: uptime-kuma
          port: 3001
  tls:
    certResolver: letsencrypt
---
# Override base catch-all IngressRoute with prod wildcard cert
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: catch-all
  namespace: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostRegexp(`.+\.kubelab\.live`)
      kind: Rule
      priority: 1
      services:
        - name: errors
          port: 80
  tls:
    certResolver: letsencrypt
    domains:
      - main: "kubelab.live"
        sans:
          - "*.kubelab.live"
