---
# Override base grafana-config with prod domain
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: kubelab
data:
  GF_SERVER_ROOT_URL: "https://grafana.kubelab.live"
  GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.kubelab.live/api/oidc/authorization"
  GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.kubelab.live/api/oidc/token"
  GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.kubelab.live/api/oidc/userinfo"
  GF_LOG_LEVEL: "info"
---
# Override base grafana IngressRoute with prod domain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: kubelab
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: authelia
          namespace: kubelab
        - name: error-pages
          namespace: kubelab
      services:
        - name: grafana
          port: 3000
  tls:
    certResolver: letsencrypt
---
# Override base authelia IngressRoute with prod domain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.kubelab.live`)
      kind: Rule
      middlewares:
        - name: crowdsec-bouncer
          namespace: kubelab
      services:
        - name: authelia
          port: 9091
  tls:
    certResolver: letsencrypt
---
# Override base loki IngressRoute — internal only in prod (no public access)
# Route to a non-existent domain so it never matches real traffic
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki
  namespace: kubelab
  annotations:
    kubelab.dev/note: "Loki is internal-only in prod — no public ingress"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`loki.internal.kubelab.local`)
      kind: Rule
      middlewares:
        - name: authelia
          namespace: kubelab
      services:
        - name: loki
          port: 3100
  tls: {}  # No certResolver — .local TLD can't get ACME certs
---
# Override base gitea ConfigMap with prod domain
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: kubelab
data:
  GITEA__database__DB_TYPE: "sqlite3"
  GITEA__server__DOMAIN: "gitea.kubelab.live"
  GITEA__server__ROOT_URL: "https://gitea.kubelab.live/"
  GITEA__server__SSH_PORT: "30222"
  GITEA__server__SSH_LISTEN_PORT: "2222"
  GITEA__server__SSH_DOMAIN: "gitea.kubelab.live"
  GITEA__service__DISABLE_REGISTRATION: "true"
  GITEA__openid__ENABLE_OPENID_SIGNIN: "false"
  GITEA__openid__ENABLE_OPENID_SIGNUP: "false"
  GITEA__log__MODE: "console"
  GITEA__log__LEVEL: "Warn"
  GITEA_OIDC_DISCOVERY_URL: "https://auth.kubelab.live/.well-known/openid-configuration"
---
# Override base gitea IngressRoute with prod domain
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: kubelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gitea.kubelab.live`)
      kind: Rule
      middlewares:
        - name: secure-headers
          namespace: kubelab
        - name: crowdsec-bouncer
          namespace: kubelab
        - name: error-pages
          namespace: kubelab
      services:
        - name: gitea
          port: 3000
  tls:
    certResolver: letsencrypt
