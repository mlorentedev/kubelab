---
# Prod secrets — populate before first deployment (B6: PROD-K3S-002)
# These values should come from SOPS-encrypted infra/config/secrets/prod.enc.yaml
# via `toolkit config generate secrets --env prod`
#
# WARNING: Do NOT commit real secret values. This file uses placeholders.
# Replace with actual values from SOPS or generate new ones before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: crowdsec-bouncer
  namespace: kubelab
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  api-key: "REPLACE_WITH_SOPS_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: kubelab
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  password: "REPLACE_WITH_SOPS_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: authelia-users
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  # NOTE: this stringData is a static placeholder. At deploy time,
  # `make apply-secrets` rebuilds users_database.yml dynamically from
  # config (toolkit/features/k8s_secrets.py:_build_users_database) using
  # the SSOT (apps.auth.admin_username + apps.contact.email) — that
  # rendered value is what ends up in the K8s Secret.
  users_database.yml: |
    users:
      operator:
        disabled: false
        displayname: Administrator
        email: info@kubelab.live
        groups:
          - admins
          - users
        password: "REPLACE_WITH_ARGON2_HASH"
---
apiVersion: v1
kind: Secret
metadata:
  name: authelia-secrets
  namespace: kubelab
  labels:
    app.kubernetes.io/name: authelia
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  session_secret: "REPLACE_WITH_SOPS_VALUE"
  storage_encryption_key: "REPLACE_WITH_SOPS_VALUE"
  jwt_secret: "REPLACE_WITH_SOPS_VALUE"
  smtp_password: "REPLACE_WITH_SOPS_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: kubelab
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: data
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  # Postgres password (ADR-051). Source: SOPS infra.postgres.password.
  # Applied via `toolkit secrets apply` — this file is documentation only.
  POSTGRES_PASSWORD: "REPLACE_WITH_SOPS_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: kubelab
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: kubelab
type: Opaque
stringData:
  # SMTP password from shared infra namespace (ADR-036). User/from/host/port
  # are non-secrets in common.yaml (ConfigMap path). Authelia consumes the
  # same value via its Jinja template, not a separate K8s envFrom.
  INFRA_SMTP_PASS: "REPLACE_WITH_SOPS_VALUE"
  BEEHIIV_API_KEY: "REPLACE_WITH_SOPS_VALUE"
  ZOHO_CLIENT_ID: "REPLACE_WITH_SOPS_VALUE"
  ZOHO_CLIENT_SECRET: "REPLACE_WITH_SOPS_VALUE"
