http:
  routers:
    {{APP_PORTAINER_NAME}}:
      rule: "Host(`{{APP_PORTAINER_HOST}}`)"
      entryPoints:
        - {{TRAEFIK_ENTRYPOINT}}
      service: {{APP_PORTAINER_NAME}}
      middlewares:
        - auth@file
        - secure-headers@file
        - rate-limit@file
        - error-pages

  services:
    {{APP_PORTAINER_NAME}}:
      loadBalancer:
        servers:
          - url: "http://{{APP_PORTAINER_NAME}}:{{APP_PORTAINER_PORT}}"