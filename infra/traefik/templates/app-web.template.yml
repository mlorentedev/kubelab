http:
  routers:
    {{APP_WEB_NAME}}:
      rule: "Host(`{{APP_WEB_HOST}}`)"
      entryPoints:
        - {{TRAEFIK_ENTRYPOINT}}
      service: {{APP_WEB_NAME}}
      tls:
        certResolver: {{CERT_RESOLVER}}
      middlewares:
        - secure-headers@file
        - rate-limit@file

  services:
    {{APP_WEB_NAME}}:
      loadBalancer:
        servers:
          - url: "http://{{APP_WEB_NAME}}:{{APP_WEB_PORT}}"