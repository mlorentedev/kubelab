http:
  routers:
    traefik-dashboard:
      rule: "Host(`{{TRAEFIK_DASHBOARD_HOST}}`)"
      entryPoints:
        - {{TRAEFIK_ENTRYPOINT}}
      service: api@internal
      middlewares:
        - auth@file
        - secure-headers@file
        - compress@file
        - rate-limit@file
        - error-pages