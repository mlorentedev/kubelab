http:
  routers:
    {{APP_UPTIME_KUMA_NAME}}:
      rule: "Host(`{{APP_UPTIME_KUMA_HOST}}`)"
      entryPoints:
        - {{TRAEFIK_ENTRYPOINT}}
      service: {{APP_UPTIME_KUMA_NAME}}
      middlewares:
        - auth@file
        - secure-headers@file
        - rate-limit@file
        - compress@file
        - error-pages

  services:
    {{APP_UPTIME_KUMA_NAME}}:
      loadBalancer:
        servers:
          - url: "http://{{APP_UPTIME_KUMA_NAME}}:{{APP_UPTIME_KUMA_PORT}}"